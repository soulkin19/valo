<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VALORANT 2D - HARDCORE</title>
    <style>
        body { margin: 0; background: #0f1923; overflow: hidden; touch-action: none; font-family: 'Arial Black', sans-serif; }
        canvas { display: block; background: #161d24; cursor: crosshair; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; }
        #hp-bar { width: 200px; height: 10px; background: #333; margin-top: 5px; border: 1px solid #fff; }
        #hp-fill { width: 100%; height: 100%; background: #00eeff; transition: 0.1s; }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #ff4655; font-size: 80px; display: none; text-shadow: 4px 4px 0px #000; }
    </style>
</head>
<body>
    <canvas id="game"></canvas>
    <div id="ui">
        <div style="font-size: 14px; color: #8b978f;">ARMOR: 50 | HP</div>
        <div id="hp-val" style="font-size: 32px; font-weight: bold;">100</div>
        <div id="hp-bar"><div id="hp-fill"></div></div>
    </div>
    <div id="msg">ELIMINATED</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const hpVal = document.getElementById('hp-val');
const hpFill = document.getElementById('hp-fill');
const msg = document.getElementById('msg');

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.onresize = resize; resize();

// --- プレイヤー設定 ---
let p = { x: 150, y: 300, r: 16, ang: 0, hp: 100, recoil: 0 };
let keys = {};
let bullets = [];
let particles = [];

// --- 地形 ---
const walls = [
    {x: 400, y: 0, w: 80, h: 400}, {x: 400, y: 600, w: 80, h: 800},
    {x: 700, y: 350, w: 300, h: 80}, {x: 1100, y: 0, w: 80, h: 500}
];

// --- BOT設定（最強クラス） ---
let bots = [
    { x: 900, y: 200, hp: 100, r: 16, lastShot: 0, reaction: 0, targetX: 900, targetY: 200 },
    { x: 1300, y: 700, hp: 100, r: 16, lastShot: 0, reaction: 0, targetX: 1300, targetY: 700 }
];

// --- 操作：クリック/タップで即座にその方向へ向いて発射 ---
window.addEventListener('pointerdown', (e) => {
    if (p.hp <= 0) return;
    
    // 1. 座標を取得して角度を即座に更新（エイム修正）
    const tx = e.clientX;
    const ty = e.clientY;
    p.ang = Math.atan2(ty - p.y, tx - p.x);
    
    // 2. 発射
    shoot(p, tx, ty, 'player');
});

function shoot(who, tx, ty, owner) {
    const angle = Math.atan2(ty - who.y, tx - who.x);
    // ストッピング判定（移動中は大きく散る）
    const isMoving = keys['w'] || keys['a'] || keys['s'] || keys['d'];
    const spread = (owner === 'player') ? (isMoving ? 0.2 : 0.01 + p.recoil) : 0.02;
    const finalAngle = angle + (Math.random() - 0.5) * spread;

    bullets.push({
        x: who.x, y: who.y,
        vx: Math.cos(finalAngle) * 35,
        vy: Math.sin(finalAngle) * 35,
        owner: owner
    });
    
    if(owner === 'player') p.recoil = Math.min(p.recoil + 0.05, 0.2);
}

window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

function isWall(nx, ny, r) {
    return walls.some(w => nx > w.x-r && nx < w.x+w.w+r && ny > w.y-r && ny < w.y+w.h+r);
}

function canSee(a, b) {
    const dist = Math.hypot(b.x - a.x, b.y - a.y);
    const ang = Math.atan2(b.y - a.y, b.x - a.x);
    for(let d=0; d<dist; d+=20) {
        if(isWall(a.x + Math.cos(ang)*d, a.y + Math.sin(ang)*d, 2)) return false;
    }
    return true;
}

function update() {
    if (p.hp <= 0) return;

    // プレイヤー移動
    let dx = 0, dy = 0;
    const speed = keys['shift'] ? 2.5 : 5;
    if (keys['w']) dy -= speed; if (keys['s']) dy += speed;
    if (keys['a']) dx -= speed; if (keys['d']) dx += speed;
    
    if (!isWall(p.x + dx, p.y, p.r)) p.x += dx;
    if (!isWall(p.x, p.y + dy, p.r)) p.y += dy;
    if (dx === 0 && dy === 0) p.recoil = Math.max(0, p.recoil - 0.01);

    // BOT AI (エリートモード)
    bots.forEach(bot => {
        if (bot.hp <= 0) return;

        const visible = canSee(bot, p);
        if (visible) {
            bot.reaction++;
            // 反応速度 0.15秒 (約9フレーム)
            if (bot.reaction > 9) {
                if (Date.now() - bot.lastShot > 400) {
                    shoot(bot, p.x, p.y, 'bot');
                    bot.lastShot = Date.now();
                }
            }
        } else {
            bot.reaction = 0;
            // プレイヤーがいない時はランダムに巡回移動
            if (Math.random() < 0.02) {
                bot.targetX = bot.x + (Math.random()-0.5)*200;
                bot.targetY = bot.y + (Math.random()-0.5)*200;
            }
        }
        
        // BOTの微細な移動（エイムをそらす）
        const bdx = (bot.targetX - bot.x) * 0.05;
        const bdy = (bot.targetY - bot.y) * 0.05;
        if (!isWall(bot.x + bdx, bot.y + bdy, bot.r)) {
            bot.x += bdx; bot.y += bdy;
        }
    });

    // 弾丸処理
    bullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;
        
        if (isWall(b.x, b.y, 2)) { bullets.splice(i, 1); return; }

        if (b.owner === 'player') {
            bots.forEach(bot => {
                if (bot.hp > 0 && Math.hypot(b.x - bot.x, b.y - bot.y) < bot.r + 5) {
                    bot.hp -= 40; bullets.splice(i, 1);
                    createBlood(bot.x, bot.y);
                }
            });
        } else {
            if (Math.hypot(b.x - p.x, b.y - p.y) < p.r + 5) {
                p.hp -= 34; // 3発で死ぬ
                bullets.splice(i, 1);
                createBlood(p.x, p.y);
                hpVal.innerText = Math.max(0, Math.ceil(p.hp));
                hpFill.style.width = Math.max(0, p.hp) + "%";
                if(p.hp <= 0) msg.style.display = 'block';
            }
        }
    });
}

function createBlood(x, y) {
    for(let i=0; i<8; i++) particles.push({x, y, vx:(Math.random()-0.5)*10, vy:(Math.random()-0.5)*10, life:20});
}

function draw() {
    ctx.fillStyle = '#101823';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 壁
    ctx.fillStyle = '#2d3741';
    walls.forEach(w => {
        ctx.fillRect(w.x, w.y, w.w, w.h);
        ctx.strokeStyle = '#ff4655'; ctx.lineWidth = 2; ctx.strokeRect(w.x, w.y, w.w, w.h);
    });

    // 血しぶき
    particles.forEach((part, i) => {
        part.x += part.vx; part.y += part.vy; part.life--;
        ctx.fillStyle = `rgba(255, 70, 85, ${part.life/20})`;
        ctx.fillRect(part.x, part.y, 4, 4);
        if(part.life <= 0) particles.splice(i, 1);
    });

    // プレイヤー
    if (p.hp > 0) {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.ang);
        // 体
        ctx.fillStyle = '#00eeff';
        ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI*2); ctx.fill();
        // 銃（エイム方向）
        ctx.fillStyle = 'white'; ctx.fillRect(10, -3, 20, 6);
        ctx.restore();
    }

    // BOT
    bots.forEach(bot => {
        if (bot.hp <= 0) return;
        ctx.fillStyle = '#ff4655';
        ctx.beginPath(); ctx.arc(bot.x, bot.y, bot.r, 0, Math.PI*2); ctx.fill();
        // 視覚的な向き（プレイヤーの方を向く）
        const ang = Math.atan2(p.y - bot.y, p.x - bot.x);
        ctx.save(); ctx.translate(bot.x, bot.y); ctx.rotate(ang);
        ctx.fillStyle = 'black'; ctx.fillRect(10, -2, 15, 4); ctx.restore();
    });

    // 弾丸
    ctx.fillStyle = '#fff200';
    bullets.forEach(b => ctx.fillRect(b.x-2, b.y-2, 4, 4));

    // 暗闇エフェクト（視界）
    const grad = ctx.createRadialGradient(p.x, p.y, 50, p.x, p.y, 500);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(15,25,35,0.9)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
