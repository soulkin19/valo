<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heli Strike: Dawn Ops</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050a15; touch-action: none; font-family: 'Orbitron', sans-serif; }
        #hud {
            position: absolute; top: 30px; left: 30px; color: #00ffff;
            pointer-events: none; z-index: 10; text-shadow: 0 0 8px rgba(0,255,255,0.8);
        }
        .bar { width: 180px; height: 4px; background: rgba(0,255,255,0.2); border: 1px solid #00ffff; margin: 5px 0; }
        #hp-bar { width: 100%; height: 100%; background: #00ffff; }
        
        #target-info { position: absolute; top: 30px; right: 30px; color: #ff4444; text-align: right; display: none; }

        #move-joy { 
            position: absolute; bottom: 60px; left: 60px; width: 140px; height: 140px; 
            border: 2px solid rgba(0,255,255,0.3); border-radius: 50%; 
        }
        #move-knob { 
            position: absolute; top: 40px; left: 40px; width: 60px; height: 60px; 
            background: rgba(0,255,255,0.2); border: 2px solid #00ffff; border-radius: 50%; 
        }
        
        #fire-btn { 
            position: absolute; bottom: 60px; right: 60px; width: 120px; height: 120px; 
            background: rgba(255,0,0,0.15); border: 3px solid #ff4444; border-radius: 50%; 
            color: #fff; display: flex; align-items: center; justify-content: center; font-weight: bold;
        }

        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 40px; height: 40px;
            transform: translate(-50%, -50%); border: 1px solid rgba(0,255,255,0.5); border-radius: 50%;
        }
    </style>
</head>
<body>

    <div id="hud">
        STATUS: OPERATIONAL<br>
        <div class="bar"><div id="hp-bar"></div></div>
        SIGNAL: STABLE
    </div>

    <div id="target-info">
        WARNING: BOGEY IDENTIFIED<br>
        DISTANCE: <span id="dist">0</span>m
    </div>

    <div id="crosshair"></div>
    <div id="move-joy"><div id="move-knob"></div></div>
    <div id="fire-btn">FIRE</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1a33); // 夜明け前の空
        scene.fog = new THREE.Fog(0x0a1a33, 20, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // ライティング強化
        scene.add(new THREE.AmbientLight(0x444466, 1));
        const sun = new THREE.DirectionalLight(0xffaa88, 1.5); // 朝日の光
        sun.position.set(-50, 20, -50);
        scene.add(sun);

        // 地面
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0x111122 }));
        ground.rotation.x = -Math.PI/2;
        scene.add(ground);
        scene.add(new THREE.GridHelper(200, 50, 0x114488, 0x050a15));

        // 遮蔽物
        const walls = [];
        const wallMat = new THREE.MeshStandardMaterial({color: 0x222233});
        [[10, -10], [-15, -20], [0, -35]].forEach(p => {
            const m = new THREE.Mesh(new THREE.BoxGeometry(8, 6, 8), wallMat);
            m.position.set(p[0], 3, p[1]);
            scene.add(m);
            walls.push(new THREE.Box3().setFromObject(m));
        });

        // 敵ヘリ (発光パーツ追加)
        let heli = { mesh: new THREE.Group(), hp: 100, lastShot: 0 };
        const hBody = new THREE.Mesh(new THREE.BoxGeometry(4, 1.5, 6), new THREE.MeshStandardMaterial({color: 0x111111}));
        heli.mesh.add(hBody);
        
        // 警告灯（赤く光る）
        const lightGeo = new THREE.SphereGeometry(0.3);
        const redMat = new THREE.MeshBasicMaterial({color: 0xff0000});
        const beacon = new THREE.Mesh(lightGeo, redMat);
        beacon.position.set(0, -0.7, 0);
        heli.mesh.add(beacon);

        // プロペラ
        const rotor = new THREE.Mesh(new THREE.BoxGeometry(12, 0.05, 0.5), new THREE.MeshStandardMaterial({color: 0x000000}));
        rotor.position.y = 1; heli.mesh.add(rotor);
        scene.add(heli.mesh);

        // 操作系
        let yaw = 0, pitch = 0, targetYaw = 0, targetPitch = 0;
        let moveVec = { x: 0, y: 0 }, curMove = { x: 0, y: 0 };
        let bullets = [], playerHP = 100;

        // タッチ操作
        let tId = null, lx, ly;
        window.addEventListener('touchstart', e => {
            for(let t of e.changedTouches) if(t.clientX > window.innerWidth/3 && t.target.id !== 'fire-btn') { tId = t.identifier; lx = t.clientX; ly = t.clientY; }
        });
        window.addEventListener('touchmove', e => {
            for(let t of e.touches) if(t.identifier === tId) {
                targetYaw -= (t.clientX - lx) * 0.005; targetPitch -= (t.clientY - ly) * 0.005;
                targetPitch = Math.max(-1.4, Math.min(1.4, targetPitch));
                lx = t.clientX; ly = t.clientY;
            }
        });

        const joy = document.getElementById('move-joy');
        const knob = document.getElementById('move-knob');
        joy.addEventListener('touchmove', e => {
            const t = e.touches[0], r = joy.getBoundingClientRect();
            let dx = t.clientX - (r.left + 70), dy = t.clientY - (r.top + 70);
            const d = Math.min(Math.sqrt(dx*dx+dy*dy), 50);
            const a = Math.atan2(dy, dx);
            moveVec.x = (Math.cos(a)*d)/50; moveVec.y = (Math.sin(a)*d)/50;
            knob.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
        });
        joy.addEventListener('touchend', () => { moveVec = {x:0, y:0}; knob.style.transform = 'translate(0,0)'; });

        // 射撃
        document.getElementById('fire-btn').addEventListener('touchstart', e => {
            e.preventDefault();
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({color: 0x00ffff}));
            b.position.copy(camera.position);
            b.userData.vel = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion).multiplyScalar(3);
            bullets.push(b); scene.add(b);
        });

        function animate() {
            requestAnimationFrame(animate);
            yaw += (targetYaw - yaw) * 0.1; pitch += (targetPitch - pitch) * 0.1;
            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
            
            curMove.x += (moveVec.x - curMove.x) * 0.1; curMove.y += (moveVec.y - curMove.y) * 0.1;
            const op = camera.position.clone();
            const f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y = 0; f.normalize();
            const r = new THREE.Vector3().crossVectors(f, new THREE.Vector3(0,1,0)).negate();
            camera.position.addScaledVector(f, -curMove.y * 0.3);
            camera.position.addScaledVector(r, -curMove.x * 0.3);
            walls.forEach(w => { if(w.containsPoint(camera.position)) camera.position.copy(op); });

            // 敵ヘリ移動と視認性UP
            const time = Date.now() * 0.001;
            heli.mesh.position.set(Math.sin(time*0.5)*40, 15 + Math.sin(time)*5, Math.cos(time*0.5)*40 - 20);
            heli.mesh.lookAt(camera.position);
            rotor.rotation.y += 0.8;
            beacon.material.opacity = (Math.sin(time*10) + 1) / 2; // 点滅

            // 敵情報の更新
            const dist = Math.floor(camera.position.distanceTo(heli.mesh.position));
            document.getElementById('dist').innerText = dist;
            document.getElementById('target-info').style.display = 'block';

            bullets.forEach((b, i) => {
                b.position.add(b.userData.vel);
                if(b.position.distanceTo(heli.mesh.position) < 4) {
                    heli.hp -= 10; scene.remove(b); bullets.splice(i, 1);
                }
            });

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
