<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stinger Ops: Advanced AI</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        #hud { position: absolute; top: 20px; left: 20px; color: #00ffff; pointer-events: none; display: none; }
        
        /* 武器選択画面 */
        #menu {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
        .btn {
            width: 250px; padding: 20px; margin: 10px; border: 2px solid #00ffff;
            color: #00ffff; text-align: center; font-weight: bold; font-size: 20px;
        }

        /* UI */
        #move-joy { position: absolute; bottom: 40px; left: 40px; width: 140px; height: 140px; border: 2px solid rgba(0,255,255,0.3); border-radius: 50%; display: none; }
        #move-knob { position: absolute; top: 40px; left: 40px; width: 60px; height: 60px; background: #00ffff; border-radius: 50%; opacity: 0.3; }
        #fire-btn { 
            position: absolute; bottom: 40px; right: 40px; width: 120px; height: 120px; 
            background: rgba(255,0,0,0.4); border: 4px solid #fff; border-radius: 50%; 
            display: none; align-items: center; justify-content: center; color: #fff; font-weight: bold;
        }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; border: 1px solid #00ffff; transform: translate(-50%, -50%); border-radius: 50%; pointer-events: none; }
    </style>
</head>
<body>

    <div id="menu">
        <h2 style="color:#fff;">SELECT WEAPON</h2>
        <div class="btn" onclick="startGame('mg')">20mm MACHINE GUN</div>
        <div class="btn" onclick="startGame('stinger')">FIM-92 STINGER</div>
    </div>

    <div id="hud">HP: <span id="hp">100</span> | WEAPON: <span id="w-name">-</span></div>
    <div id="crosshair"></div>
    <div id="move-joy"><div id="move-knob"></div></div>
    <div id="fire-btn">FIRE</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050a15);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const sun = new THREE.DirectionalLight(0xaaaaff, 1);
        sun.position.set(10, 50, 10);
        scene.add(sun);
        scene.add(new THREE.GridHelper(200, 40, 0x00ffff, 0x111111));

        let selectedWeapon = '';
        let isPlaying = false;
        let playerHP = 100;
        let bullets = [], enemyBullets = [];
        let yaw = 0, pitch = 0, moveVec = {x:0, y:0};
        let heli = { mesh: new THREE.Group(), hp: 100, lastMG: 0, lastRocket: 0 };

        // 敵ヘリ構築
        const body = new THREE.Mesh(new THREE.BoxGeometry(4, 1.2, 6), new THREE.MeshStandardMaterial({color: 0x111111}));
        heli.mesh.add(body);
        const rotor = new THREE.Mesh(new THREE.BoxGeometry(10, 0.1, 0.5), new THREE.MeshBasicMaterial({color: 0x000000}));
        rotor.position.y = 1;
        heli.mesh.add(rotor);
        scene.add(heli.mesh);

        window.startGame = (type) => {
            selectedWeapon = type;
            isPlaying = true;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('move-joy').style.display = 'block';
            document.getElementById('fire-btn').style.display = 'flex';
            document.getElementById('w-name').innerText = type.toUpperCase();
            camera.position.set(0, 1.6, 10);
        };

        // タッチ制御
        let tId = null, lx, ly;
        window.addEventListener('touchstart', e => {
            for(let t of e.changedTouches) if(t.clientX > window.innerWidth/3 && t.target.id !== 'fire-btn') { tId = t.identifier; lx = t.clientX; ly = t.clientY; }
        });
        window.addEventListener('touchmove', e => {
            for(let t of e.touches) if(t.identifier === tId) {
                yaw -= (t.clientX - lx) * 0.006; pitch -= (t.clientY - ly) * 0.006;
                lx = t.clientX; ly = t.clientY;
            }
        });

        const joy = document.getElementById('move-joy');
        joy.addEventListener('touchmove', e => {
            const t = e.touches[0], r = joy.getBoundingClientRect();
            let dx = t.clientX - (r.left + 70), dy = t.clientY - (r.top + 70);
            const d = Math.min(Math.sqrt(dx*dx+dy*dy), 50);
            const a = Math.atan2(dy, dx);
            moveVec.x = (Math.cos(a)*d)/50; moveVec.y = (Math.sin(a)*d)/50;
            document.getElementById('move-knob').style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
        });
        joy.addEventListener('touchend', () => { moveVec = {x:0, y:0}; document.getElementById('move-knob').style.transform = 'translate(0,0)'; });

        // 射撃
        document.getElementById('fire-btn').addEventListener('touchstart', e => {
            e.preventDefault();
            const b = new THREE.Mesh(new THREE.SphereGeometry(selectedWeapon === 'stinger' ? 0.3 : 0.15), new THREE.MeshBasicMaterial({color: 0xffff00}));
            b.position.copy(camera.position);
            b.userData.type = selectedWeapon;
            b.userData.vel = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion).multiplyScalar(selectedWeapon === 'stinger' ? 0.8 : 3);
            bullets.push(b); scene.add(b);
        });

        function animate() {
            requestAnimationFrame(animate);
            if(!isPlaying) return;

            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
            const f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y = 0;
            camera.position.addScaledVector(f.normalize(), -moveVec.y * 0.25);

            // 敵ヘリのAI
            const t = Date.now() * 0.001;
            heli.mesh.position.set(Math.sin(t*0.4)*35, 12 + Math.sin(t)*3, Math.cos(t*0.4)*35 - 15);
            heli.mesh.lookAt(camera.position);
            rotor.rotation.y += 0.8;

            // 敵の攻撃パターン
            if(Date.now() - heli.lastMG > 150) { // 20mm機銃
                if(Math.random() > 0.9) {
                    const eb = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.5), new THREE.MeshBasicMaterial({color: 0xff0000}));
                    eb.position.copy(heli.mesh.position);
                    eb.lookAt(camera.position);
                    eb.userData.vel = new THREE.Vector3().subVectors(camera.position, heli.mesh.position).normalize().multiplyScalar(1.2);
                    enemyBullets.push(eb); scene.add(eb);
                    heli.lastMG = Date.now();
                }
            }
            if(Date.now() - heli.lastRocket > 3000) { // ロケット
                const eb = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshBasicMaterial({color: 0xffaa00}));
                eb.position.copy(heli.mesh.position);
                eb.userData.vel = new THREE.Vector3().subVectors(camera.position, heli.mesh.position).normalize().multiplyScalar(0.5);
                eb.userData.isRocket = true;
                enemyBullets.push(eb); scene.add(eb);
                heli.lastRocket = Date.now();
            }

            // 弾丸処理
            bullets.forEach((b, i) => {
                if(b.userData.type === 'stinger') {
                    const dir = new THREE.Vector3().subVectors(heli.mesh.position, b.position).normalize();
                    b.userData.vel.lerp(dir.multiplyScalar(1.5), 0.04);
                }
                b.position.add(b.userData.vel);
                if(b.position.distanceTo(heli.mesh.position) < 4) {
                    heli.hp -= 20; scene.remove(b); bullets.splice(i, 1);
                    if(heli.hp <= 0) { /* 撃墜演出省略 */ heli.hp = 100; }
                }
            });

            enemyBullets.forEach((eb, i) => {
                eb.position.add(eb.userData.vel);
                if(eb.position.distanceTo(camera.position) < 1.5) {
                    playerHP -= eb.userData.isRocket ? 20 : 2;
                    document.getElementById('hp').innerText = playerHP;
                    scene.remove(eb); enemyBullets.splice(i, 1);
                }
            });

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
