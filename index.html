<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pro Flight Combat - Mobile Edition</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; user-select: none; -webkit-user-select: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: none; }
        #hud { position: absolute; top: 10px; left: 10px; color: #0f0; pointer-events: none; text-shadow: 1px 1px 2px #000; font-size: 14px; z-index: 5; }
        
        /* ジョイスティックを大きく、少し上に配置 */
        #joystick-left-container, #joystick-right-container { 
            position: absolute; 
            bottom: 100px; /* 少し上に配置 */
            width: 160px;  /* サイズを大きく */
            height: 160px; 
            opacity: 0.5; 
            z-index: 10;
        }
        #joystick-left-container { left: 40px; }
        #joystick-right-container { right: 40px; }

        .fire-button { 
            position: absolute; 
            bottom: 280px; /* ジョイスティックの上側に配置 */
            width: 70px; 
            height: 70px; 
            background-color: rgba(255, 0, 0, 0.4); 
            border: 2px solid #fff; 
            border-radius: 50%; 
            color: #fff; 
            font-size: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            touch-action: none; 
            z-index: 10;
        }
        #fire-main { right: 120px; }
        #fire-secondary { right: 30px; background-color: rgba(0, 100, 255, 0.4); }
        
        #menu, #game-over { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: #fff; z-index: 100; text-align: center;
        }
        #menu { background: rgba(0, 0, 0, 0.9); }
        #game-over { background: rgba(150, 0, 0, 0.8); display: none; }
        select { padding: 12px; font-size: 16px; margin: 10px; width: 280px; background: #222; color: #fff; border: 1px solid #555; border-radius: 8px; }
        button { padding: 15px 40px; font-size: 20px; cursor: pointer; background: #0a0; color: #fff; border: none; border-radius: 30px; margin-top: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="menu">
        <h1>PRO FLIGHT COMBAT</h1>
        <p>MOBILE ONLY SIMULATOR</p>
        <div style="margin: 20px 0;">
            <label>MAIN:</label><br>
            <select id="main-weapon-select">
                <option value="20mm">20mm Cannon (連射型)</option>
                <option value="50mm">50mm Cannon (重火力型)</option>
            </select><br>
            <label>SECONDARY:</label><br>
            <select id="secondary-weapon-select">
                <option value="missile">AIM-9 Missile (追尾弾)</option>
            </select>
        </div>
        <button id="start-button">ENGAGE</button>
    </div>

    <div id="game-over">
        <h1>MAYDAY! MAYDAY!</h1>
        <p>MISSION FAILED - AIRCRAFT DESTROYED</p>
        <button onclick="location.reload()">REDEPLOY</button>
    </div>

    <div id="game-container">
        <div id="hud">
            SPD: <span id="speed">0</span> km/h | ALT: <span id="alt">0</span> m<br>
            HP : <span id="hp">100</span>% | BOT: <span id="bot-hp">100</span>%<br>
            AMMO: <span id="main-ammo">--</span> | SEC: <span id="sec-ammo">--</span><br>
            LOCK: <span id="target-lock">NO TARGET</span>
        </div>
        
        <div id="joystick-left-container"></div>
        <div id="joystick-right-container"></div>
        <div id="fire-main" class="fire-button">CANNON</div>
        <div id="fire-secondary" class="fire-button">MISSILE</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <script>
        // --- 設定データ ---
        const WEAPONS = {
            '20mm': { rate: 0.08, damage: 3, speed: 220, ammo: 1200, spread: 0.015 },
            '50mm': { rate: 0.4, damage: 25, speed: 180, ammo: 250, spread: 0.01 },
            'missile': { rate: 2.5, damage: 60, speed: 140, ammo: 6, homing: 0.06, range: 400 }
        };

        const PHYSICS = {
            gravity: 0.006,
            drag: 0.0008,
            lift: 0.006, // 上昇しやすく強化
            thrustPower: 0.02,
            pitchSens: 0.04,
            rollSens: 0.05,
            yawSens: 0.025
        };

        // --- シーン構築 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x6eb5ff);
        scene.fog = new THREE.Fog(0x6eb5ff, 500, 2500);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.5, 3000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('game-container').appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(200, 500, 200);
        scene.add(light, new THREE.AmbientLight(0x888888));

        // 地面と背景
        const ground = new THREE.Mesh(
            new THREE.PlaneGeometry(10000, 10000),
            new THREE.MeshPhongMaterial({ color: 0x445533 })
        );
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);
        scene.add(new THREE.GridHelper(5000, 50, 0x000000, 0x222222));

        // --- クラス ---

        class ParticleSystem {
            constructor(color, size = 0.5) {
                this.group = new THREE.Group();
                this.particles = [];
                this.mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, blending: THREE.AdditiveBlending });
                this.geo = new THREE.SphereGeometry(size, 4, 4);
                scene.add(this.group);
            }
            emit(pos, vel, life = 1.0) {
                const p = new THREE.Mesh(this.geo, this.mat.clone());
                p.position.copy(pos);
                p.userData = { vel: vel, life: life, maxLife: life };
                this.particles.push(p);
                this.group.add(p);
            }
            update(dt) {
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.position.add(p.userData.vel.clone().multiplyScalar(dt * 60));
                    p.userData.life -= dt;
                    p.material.opacity = p.userData.life / p.userData.maxLife;
                    if (p.userData.life <= 0) {
                        this.group.remove(p);
                        this.particles.splice(i, 1);
                    }
                }
            }
        }

        const smokeEffect = new ParticleSystem(0xffffff, 0.3);
        const fireEffect = new ParticleSystem(0xffaa00, 0.8);

        class Airplane extends THREE.Group {
            constructor(color) {
                super();
                this.hp = 100;
                this.vel = new THREE.Vector3(0, 0, -0.6);
                this.alive = true;
                this.thrust = 0.5;
                
                // 機体モデル
                const body = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.4, 4, 8), new THREE.MeshPhongMaterial({color: color}));
                body.rotation.x = Math.PI / 2;
                const wing = new THREE.Mesh(new THREE.BoxGeometry(6, 0.05, 1.5), new THREE.MeshPhongMaterial({color: color}));
                const tail = new THREE.Mesh(new THREE.BoxGeometry(2, 0.05, 0.8), new THREE.MeshPhongMaterial({color: color}));
                tail.position.z = 1.6;
                this.add(body, wing, tail);
                this.position.y = 150;
            }

            updatePhysics(dt, pInput, rInput, yInput) {
                if (!this.alive) return;

                // 入力による回転
                this.rotateX(pInput * PHYSICS.pitchSens);
                this.rotateZ(rInput * PHYSICS.rollSens);
                this.rotateY(yInput * PHYSICS.yawSens);

                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(this.quaternion);
                const up = new THREE.Vector3(0, 1, 0).applyQuaternion(this.quaternion);
                const speed = this.vel.length();

                // 物理計算
                const thrustForce = forward.clone().multiplyScalar(this.thrust * PHYSICS.thrustPower);
                const gravity = new THREE.Vector3(0, -PHYSICS.gravity, 0);
                const dragForce = this.vel.clone().multiplyScalar(-speed * PHYSICS.drag);
                
                // 揚力計算: 機首が上がっているほど、速度があるほど浮く
                const liftAmount = speed * speed * PHYSICS.lift;
                const liftForce = up.clone().multiplyScalar(liftAmount);

                this.vel.add(thrustForce).add(gravity).add(dragForce).add(liftForce);
                this.position.add(this.vel);

                // 排気煙
                if (this.thrust > 0.2) {
                    smokeEffect.emit(this.position.clone().add(forward.clone().multiplyScalar(-2)), new THREE.Vector3(0,0,0), 0.5);
                }

                if (this.position.y <= 0) this.crash();
            }

            crash() {
                if (!this.alive) return;
                this.alive = false;
                for(let i=0; i<20; i++) fireEffect.emit(this.position, new THREE.Vector3(Math.random()-0.5, Math.random(), Math.random()-0.5).multiplyScalar(0.5), 2);
            }
        }

        // --- ゲーム管理 ---
        let player, bot;
        let bullets = [];
        let gameRunning = false;
        let lastTime = 0;
        let controls = { p: 0, r: 0, y: 0, t: 0.5 };
        let isFiringMain = false, isFiringSec = false;

        function initJoysticks() {
            const left = nipplejs.create({ zone: document.getElementById('joystick-left-container'), mode: 'static', position: {left: '50%', top: '50%'}, color: 'white', size: 140 });
            left.on('move', (e, d) => { controls.r = -d.vector.x; controls.p = d.vector.y; });
            left.on('end', () => { controls.r = 0; controls.p = 0; });

            const right = nipplejs.create({ zone: document.getElementById('joystick-right-container'), mode: 'static', position: {left: '50%', top: '50%'}, color: 'white', size: 140 });
            right.on('move', (e, d) => { controls.y = -d.vector.x; controls.t = Math.max(0.1, d.vector.y + 0.5); });
            right.on('end', () => { controls.y = 0; });

            const fMain = document.getElementById('fire-main');
            const fSec = document.getElementById('fire-secondary');
            fMain.ontouchstart = (e) => { e.preventDefault(); isFiringMain = true; };
            fMain.ontouchend = () => isFiringMain = false;
            fSec.ontouchstart = (e) => { e.preventDefault(); isFiringSec = true; };
            fSec.ontouchend = () => isFiringSec = false;
        }

        function spawnBullet(owner, weapon, isMissile = false) {
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(owner.quaternion);
            const b = {
                mesh: new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.3, isMissile ? 2 : 4), new THREE.MeshBasicMaterial({ color: isMissile ? 0xff0000 : 0xffff00 })),
                vel: dir.clone().multiplyScalar(weapon.speed * 0.01),
                damage: weapon.damage,
                owner: owner,
                life: isMissile ? 8 : 3,
                isMissile: isMissile,
                target: isMissile ? bot : null
            };
            b.mesh.position.copy(owner.position);
            b.mesh.lookAt(owner.position.clone().add(dir));
            scene.add(b.mesh);
            bullets.push(b);
        }

        function startGame() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            
            player = new Airplane(0x333333);
            player.weaponM = WEAPONS[document.getElementById('main-weapon-select').value];
            player.weaponS = WEAPONS['missile'];
            player.ammoM = player.weaponM.ammo;
            player.ammoS = player.weaponS.ammo;
            player.lastM = 0; player.lastS = 0;
            scene.add(player);

            bot = new Airplane(0xcc0000);
            bot.position.set(0, 200, -500);
            scene.add(bot);

            initJoysticks();
            gameRunning = true;
            lastTime = performance.now();
            loop();
        }

        function loop() {
            if (!gameRunning) return;
            const now = performance.now();
            const dt = Math.min((now - lastTime) / 1000, 0.1);
            lastTime = now;

            // プレイヤー更新
            player.thrust = controls.t;
            player.updatePhysics(dt, controls.p, controls.r, controls.y);

            // 射撃
            if (isFiringMain && now - player.lastM > player.weaponM.rate * 1000 && player.ammoM > 0) {
                spawnBullet(player, player.weaponM);
                player.lastM = now; player.ammoM--;
            }
            if (isFiringSec && now - player.lastS > player.weaponS.rate * 1000 && player.ammoS > 0) {
                spawnBullet(player, player.weaponS, true);
                player.lastS = now; player.ammoS--;
            }

            // ボットAI (簡易)
            const toPlayer = player.position.clone().sub(bot.position).normalize();
            bot.quaternion.slerp(new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,0,-1), toPlayer), 0.02);
            bot.updatePhysics(dt, 0, 0, 0);

            // 弾丸更新 & 当たり判定
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                if (b.isMissile && b.target.alive) {
                    const toT = b.target.position.clone().sub(b.mesh.position).normalize();
                    b.vel.lerp(toT.multiplyScalar(0.8), 0.05);
                    b.mesh.lookAt(b.mesh.position.clone().add(b.vel));
                }
                b.mesh.position.add(b.vel);
                b.life -= dt;

                // ヒット判定
                const dist = b.mesh.position.distanceTo(b.owner === player ? bot.position : player.position);
                if (dist < 5) {
                    const victim = b.owner === player ? bot : player;
                    victim.hp -= b.damage;
                    b.life = 0;
                    if (victim.hp <= 0) victim.crash();
                }

                if (b.life <= 0) {
                    scene.remove(b.mesh);
                    bullets.splice(i, 1);
                }
            }

            // スプリングカメラ (滑らかな追従)
            const idealOffset = new THREE.Vector3(0, 5, 15).applyQuaternion(player.quaternion);
            const cameraPos = player.position.clone().add(idealOffset);
            camera.position.lerp(cameraPos, 0.1);
            camera.lookAt(player.position.clone().add(new THREE.Vector3(0, 0, -10).applyQuaternion(player.quaternion)));

            // エフェクト & HUD
            smokeEffect.update(dt);
            fireEffect.update(dt);
            
            document.getElementById('speed').innerText = (player.vel.length() * 400).toFixed(0);
            document.getElementById('alt').innerText = player.position.y.toFixed(0);
            document.getElementById('hp').innerText = Math.max(0, player.hp).toFixed(0);
            document.getElementById('bot-hp').innerText = bot.alive ? Math.max(0, bot.hp).toFixed(0) : "DOWN";
            document.getElementById('main-ammo').innerText = player.ammoM;
            document.getElementById('sec-ammo').innerText = player.ammoS;

            if (!player.alive) {
                gameRunning = false;
                setTimeout(() => document.getElementById('game-over').style.display = 'flex', 1500);
            }

            renderer.render(scene, camera);
            requestAnimationFrame(loop);
        }

        document.getElementById('start-button').onclick = startGame;
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
