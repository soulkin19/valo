<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mobile FPS - Recoil Fixed</title>
    <style>
        :root { --ui-color: #000; --ui-bg: rgba(255,255,255,0.9); }
        * { touch-action: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; overflow: hidden; background: #eee; font-family: sans-serif; -webkit-user-select: none; user-select: none; }
        
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px; border: 2px solid #333;
            border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 10;
        }
        
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: var(--ui-color); background: var(--ui-bg); 
            padding: 12px; border-radius: 8px; border: 2px solid #333; z-index: 11; font-size: 14px;
        }
        
        #msg {
            position: absolute; width: 100%; top: 30%; text-align: center;
            color: #f00; font-size: 24px; pointer-events: none; font-weight: bold; display: none; z-index: 12;
        }

        #weapon-selector {
            position: absolute; top: 20px; right: 20px;
            display: flex; flex-direction: column; gap: 8px; z-index: 30;
        }
        #weapon-selector button {
            background: var(--ui-bg); border: 2px solid #333; padding: 12px;
            border-radius: 8px; font-weight: bold; font-size: 14px; pointer-events: auto;
        }
        #weapon-selector button.active { background: #333; color: #fff; }

        #controls-right {
            position: absolute; bottom: 30px; right: 30px;
            display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 30;
        }
        .action-btn {
            width: 90px; height: 90px; border-radius: 50%;
            border: 4px solid #fff; font-weight: bold; font-size: 16px;
            display: flex; justify-content: center; align-items: center;
            color: white; pointer-events: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #fire-btn { background: rgba(255, 0, 0, 0.7); }
        #ads-btn { background: rgba(0, 128, 0, 0.6); width: 75px; height: 75px; font-size: 14px; }
        #ads-btn.active { background: rgba(0, 128, 0, 1); border-color: #0f0; }
        #reload-btn { background: rgba(0, 0, 255, 0.6); width: 70px; height: 70px; font-size: 12px; }

        #damage-flash {
            position: absolute; width: 100%; height: 100%; pointer-events: none;
            box-shadow: inset 0 0 100px rgba(255,0,0,0); transition: box-shadow 0.1s; z-index: 50;
        }

        #start-overlay {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            display: flex; justify-content: center; align-items: center; color: #fff; z-index: 100;
        }
    </style>
</head>
<body>
    <div id="damage-flash"></div>
    <div id="start-overlay" onclick="start()">TOUCH TO START</div>
    <div id="msg"></div>
    <div id="crosshair"></div>
    
    <div id="ui">
        SCORE: <span id="score">0</span><br>
        WEAPON: <span id="weapon-name">ASh-12</span><br>
        AMMO: <span id="ammo">30</span> / <span id="max-ammo">30</span><br>
        PHASE: <span id="phase">1 (Infantry)</span>
    </div>

    <div id="weapon-selector">
        <button id="btn-1" class="active">ASh-12</button>
        <button id="btn-2">HK416</button>
        <button id="btn-3">AS VAL</button>
        <button id="btn-4">Type 95</button>
        <button id="btn-5">M249</button>
    </div>

    <div id="controls-right">
        <div id="ads-btn" class="action-btn">ADS</div>
        <div id="reload-btn" class="action-btn">RELOAD</div>
        <div id="fire-btn" class="action-btn">FIRE</div>
    </div>

    <div id="joystick-base"><div id="joystick-stick"></div></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 1000);
        camera.position.set(0, 1.6, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({ color: 0x99cc99 }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);
        scene.add(new THREE.GridHelper(500, 100, 0x000000, 0x888888));

        const gunContainer = new THREE.Group();
        camera.add(gunContainer);
        scene.add(camera);

        const body = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.12, 0.5), new THREE.MeshStandardMaterial({ color: 0x222222 }));
        body.position.set(0.2, -0.25, -0.4);
        gunContainer.add(body);
        
        const sight = new THREE.Mesh(new THREE.BoxGeometry(0.01, 0.05, 0.01), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
        sight.position.set(0.2, -0.17, -0.6);
        gunContainer.add(sight);

        const weapons = {
            '1': { name: "ASh-12", ammo: 30, maxAmmo: 30, rpm: 500, speed: 800, damage: 34, recoil: { y: 0.1, x: 0.02, spreadX: 0.04, speed: 0.12 } },
            '2': { name: "HK416", ammo: 45, maxAmmo: 45, rpm: 880, speed: 1200, damage: 21, recoil: { y: 0.05, x: -0.01, spreadX: 0.02, speed: 0.2 } },
            '3': { name: "AS VAL", ammo: 45, maxAmmo: 45, rpm: 972, speed: 800, damage: 21, recoil: { y: 0.04, x: 0.01, spreadX: 0.03, speed: 0.25 } },
            '4': { name: "Type 95", ammo: 30, maxAmmo: 30, rpm: 650, speed: 1100, damage: 25, recoil: { y: 0.06, x: 0.01, spreadX: 0.02, speed: 0.15 } },
            '5': { name: "M249", ammo: 100, maxAmmo: 100, rpm: 800, speed: 1000, damage: 20, recoil: { y: 0.07, x: 0.02, spreadX: 0.01, speed: 0.1 } }
        };

        let currentWep = weapons['1'];
        let lastFireTime = 0, isReloading = false, isFiring = false, score = 0, phase = 1;
        const bullets = [], enemyBullets = [], bots = [], vehicles = [];
        let isADS = false;
        const hipPos = new THREE.Vector3(0, 0, 0), adsPos = new THREE.Vector3(-0.2, 0.17, 0.1); 
        let lon = 0, lat = 0, moveX = 0, moveZ = 0, currentRecoilY = 0, currentRecoilX = 0;

        function updateUI() {
            document.getElementById('weapon-name').innerText = currentWep.name;
            document.getElementById('ammo').innerText = currentWep.ammo;
            document.getElementById('max-ammo').innerText = currentWep.maxAmmo;
            document.getElementById('score').innerText = score;
            document.getElementById('ads-status').innerText = isADS ? "ADS ON" : "Hip Fire";
            document.getElementById('phase').innerText = phase === 1 ? "1 (Infantry)" : "2 (Heavy Armor)";
            document.getElementById('crosshair').style.display = isADS ? 'none' : 'block';
        }

        function triggerDamage() {
            score = Math.max(0, score - 50);
            document.getElementById('damage-flash').style.boxShadow = "inset 0 0 100px rgba(255,0,0,1)";
            setTimeout(() => { document.getElementById('damage-flash').style.boxShadow = "inset 0 0 100px rgba(255,0,0,0)"; }, 100);
            updateUI();
        }

        ['1','2','3','4','5'].forEach(id => {
            document.getElementById('btn-'+id).addEventListener('touchstart', (e) => { e.preventDefault(); switchWeapon(id); });
        });
        function switchWeapon(id) {
            if (isReloading) return;
            currentWep = weapons[id];
            document.querySelectorAll('#weapon-selector button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+id).classList.add('active');
            updateUI();
        }

        document.getElementById('reload-btn').addEventListener('touchstart', (e) => { 
            e.preventDefault(); 
            if (isReloading || currentWep.ammo === currentWep.maxAmmo) return;
            isReloading = true; isADS = false;
            document.getElementById('ads-btn').classList.remove('active');
            document.getElementById('msg').innerText = "RELOADING...";
            document.getElementById('msg').style.display = 'block';
            gunContainer.rotation.z = 0.5;
            setTimeout(() => {
                currentWep.ammo = currentWep.maxAmmo;
                isReloading = false; updateUI();
                document.getElementById('msg').style.display = 'none';
                gunContainer.rotation.z = 0;
            }, 1200);
        });

        document.getElementById('fire-btn').addEventListener('touchstart', (e) => { e.preventDefault(); isFiring = true; });
        document.getElementById('fire-btn').addEventListener('touchend', (e) => { e.preventDefault(); isFiring = false; });
        document.getElementById('ads-btn').addEventListener('touchstart', (e) => { 
            e.preventDefault(); isADS = !isADS;
            if(isADS) document.getElementById('ads-btn').classList.add('active');
            else document.getElementById('ads-btn').classList.remove('active');
            updateUI();
        });

        const joystickBase = document.getElementById('joystick-base'), joystickStick = document.getElementById('joystick-stick');
        let moveTouchId = null, lookTouchId = null, touchStartX = 0, touchStartY = 0, lookPrevX = 0, lookPrevY = 0;

        window.start = () => { document.getElementById('start-overlay').style.display = 'none'; };

        window.addEventListener('touchstart', (e) => {
            for (let t of e.changedTouches) {
                if (t.clientX < window.innerWidth / 2 && moveTouchId === null) {
                    moveTouchId = t.identifier;
                    joystickBase.style.display = 'block';
                    joystickBase.style.left = (t.clientX - 60) + 'px'; joystickBase.style.top = (t.clientY - 60) + 'px';
                    touchStartX = t.clientX; touchStartY = t.clientY;
                } else if (t.clientX >= window.innerWidth / 2 && lookTouchId === null) {
                    if(t.clientY > window.innerHeight / 4 && t.clientY < window.innerHeight * 0.75) {
                        lookTouchId = t.identifier; lookPrevX = t.clientX; lookPrevY = t.clientY;
                    }
                }
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let t of e.changedTouches) {
                if (t.identifier === moveTouchId) {
                    let dx = t.clientX - touchStartX, dy = t.clientY - touchStartY;
                    const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
                    const angle = Math.atan2(dy, dx);
                    joystickStick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
                    moveX = Math.cos(angle) * (dist / 50); moveZ = Math.sin(angle) * (dist / 50);
                }
                if (t.identifier === lookTouchId) {
                    let sens = isADS ? 0.002 : 0.004;
                    lon -= (t.clientX - lookPrevX) * sens; 
                    lat -= (t.clientY - lookPrevY) * sens;
                    lat = Math.max(-1.4, Math.min(1.4, lat));
                    lookPrevX = t.clientX; lookPrevY = t.clientY;
                }
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            for (let t of e.changedTouches) {
                if (t.identifier === moveTouchId) { moveTouchId = null; moveX = 0; moveZ = 0; joystickBase.style.display = 'none'; }
                if (t.identifier === lookTouchId) lookTouchId = null;
            }
        });

        function spawnBot() {
            const bot = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({ color: 0xcc0000 }));
            bot.position.set(Math.random()*100-50, 1, -Math.random()*100-20);
            bot.hp = 100; scene.add(bot); bots.push(bot);
        }

        function spawnVehicle(type) {
            let geometry, color, height;
            if(type === 'boat') { geometry = new THREE.BoxGeometry(4, 1.5, 6); color = 0x00ffff; height = 0.75; }
            else { geometry = new THREE.BoxGeometry(3, 2, 8); color = 0x555555; height = 15; }
            const v = new THREE.Mesh(geometry, new THREE.MeshStandardMaterial({ color: color }));
            v.position.set(Math.random()*150-75, height, -100 - Math.random()*50);
            v.userData = { type: type, hp: 500, lastShoot: 0, speed: Math.random() * 0.1 + 0.1 };
            scene.add(v); vehicles.push(v);
        }

        for(let i=0; i<8; i++) spawnBot();

        function shoot() {
            const now = performance.now();
            if (now - lastFireTime < 60000/currentWep.rpm || currentWep.ammo <= 0 || isReloading) return;
            lastFireTime = now; currentWep.ammo--; updateUI();
            
            // 視覚的キックバック（銃身を下げる）
            gunContainer.position.z += isADS ? 0.04 : 0.08;
            
            const r = currentWep.recoil;
            let adsMult = isADS ? 0.6 : 1.0;
            
            // 反動角度の蓄積
            currentRecoilY += r.y * adsMult;
            currentRecoilX += (r.x + (Math.random() - 0.5) * 2 * r.spreadX) * adsMult;

            const b = new THREE.Mesh(new THREE.SphereGeometry(0.12, 6, 6), new THREE.MeshBasicMaterial({ color: 0xffdd00 }));
            const shootDir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            b.position.copy(camera.position).add(shootDir.clone().multiplyScalar(1.2)); 
            b.velocity = shootDir.multiplyScalar(currentWep.speed / 200);
            b.damage = currentWep.damage;
            scene.add(b); bullets.push(b);
        }

        function animate() {
            requestAnimationFrame(animate);
            const now = performance.now();

            if (score >= 1000 && phase === 1) {
                phase = 2;
                document.getElementById('msg').innerText = "PHASE 2: HEAVY ARMOR ENGAGED";
                document.getElementById('msg').style.display = 'block';
                setTimeout(() => document.getElementById('msg').style.display = 'none', 3000);
                spawnVehicle('boat'); spawnVehicle('heli');
            }

            // 反動の適用と減衰
            currentRecoilY *= (1 - currentWep.recoil.speed);
            currentRecoilX *= (1 - currentWep.recoil.speed);
            
            // カメラの向きを決定（現在のlat/lonに反動を足す）
            camera.quaternion.setFromEuler(new THREE.Euler(
                Math.max(-1.5, Math.min(1.5, lat + currentRecoilY)), 
                lon + currentRecoilX, 
                0, 'YXZ'
            ));
            
            // 銃身の位置復帰
            gunContainer.position.lerp(isADS ? adsPos : hipPos, 0.2);
            camera.fov = THREE.MathUtils.lerp(camera.fov, isADS ? 50 : 75, 0.15);
            camera.updateProjectionMatrix();

            if (isFiring) shoot();

            if (moveTouchId !== null) {
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                forward.y = 0; forward.normalize();
                const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                right.y = 0; right.normalize();
                camera.position.addScaledVector(forward, -moveZ * (isADS ? 0.08 : 0.15));
                camera.position.addScaledVector(right, moveX * (isADS ? 0.08 : 0.15));
            }

            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i]; b.position.add(b.velocity);
                bots.forEach(bot => {
                    if (b.position.distanceTo(bot.position) < 1.5) {
                        bot.hp -= b.damage; scene.remove(b); bullets.splice(i, 1);
                        if (bot.hp <= 0) { bot.position.set(Math.random()*100-50, 1, -Math.random()*100); bot.hp = 100; score += 100; updateUI(); }
                    }
                });
                vehicles.forEach((v, vIdx) => {
                    if (b.position.distanceTo(v.position) < 5) {
                        v.userData.hp -= b.damage; scene.remove(b); bullets.splice(i, 1);
                        if (v.userData.hp <= 0) { scene.remove(v); vehicles.splice(vIdx, 1); score += 1000; updateUI(); spawnVehicle(v.userData.type); }
                    }
                });
                if(b.position.length() > 500) { scene.remove(b); bullets.splice(i, 1); }
            }

            vehicles.forEach(v => {
                const dist = v.position.distanceTo(camera.position);
                if(v.userData.type === 'boat') { v.position.x += Math.sin(now * 0.001) * 0.2; v.position.z += v.userData.speed * 2; if(v.position.z > 50) v.position.z = -150; }
                else { v.position.x = Math.cos(now * 0.0005) * 100; v.position.z = Math.sin(now * 0.0005) * 100 - 50; }

                if (now - v.userData.lastShoot > (v.userData.type === 'boat' ? 1000 : 3000) && dist < 200) {
                    v.userData.lastShoot = now;
                    const eb = new THREE.Mesh(new THREE.SphereGeometry(v.userData.type === 'boat' ? 0.4 : 1.2, 8, 8), 
                             new THREE.MeshBasicMaterial({ color: v.userData.type === 'boat' ? 0xff3300 : 0x00ffff }));
                    eb.position.copy(v.position);
                    const dir = new THREE.Vector3().subVectors(camera.position, v.position).normalize();
                    eb.velocity = dir.multiplyScalar(v.userData.type === 'boat' ? 1.8 : 1.0);
                    scene.add(eb); enemyBullets.push(eb);
                }
            });

            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const eb = enemyBullets[i]; eb.position.add(eb.velocity);
                if (eb.position.distanceTo(camera.position) < 2.5) { scene.remove(eb); enemyBullets.splice(i, 1); triggerDamage(); }
                else if (eb.position.y < -1 || eb.position.length() > 600) { scene.remove(eb); enemyBullets.splice(i, 1); }
            }

            bots.forEach(bot => {
                const dir = new THREE.Vector3().subVectors(camera.position, bot.position);
                dir.y = 0; bot.position.add(dir.normalize().multiplyScalar(0.04));
            });

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
