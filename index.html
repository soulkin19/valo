<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Responsive 3D FPS</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        canvas { display: block; } /* キャンバスの隙間を消す */
        
        #ui { position: absolute; top: env(safe-area-inset-top, 20px); left: 20px; color: white; font-family: sans-serif; pointer-events: none; }
        
        /* ジョイスティック */
        #joystick-container {
            position: absolute; bottom: 40px; left: 40px;
            width: 100px; height: 100px; background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3); border-radius: 50%;
        }
        #joystick-knob {
            position: absolute; top: 30px; left: 30px;
            width: 40px; height: 40px; background: #fff; border-radius: 50%; opacity: 0.6;
        }

        /* 射撃ボタン */
        #fire-button {
            position: absolute; bottom: 40px; right: 40px;
            width: 70px; height: 70px; background: rgba(255,50,50,0.6);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; user-select: none;
        }
    </style>
</head>
<body>

<div id="ui">Score: <span id="score">0</span></div>
<div id="joystick-container"><div id="joystick-knob"></div></div>
<div id="fire-button">FIRE</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    // --- 初期化 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050510);
    
    // カメラ設定（アスペクト比は後で更新）
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.y = 1.6;

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio); // 高解像度ディスプレイ（Retina等）対応
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // --- リサイズイベントの登録 ---
    window.addEventListener('resize', onWindowResize, false);

    function onWindowResize() {
        // 1. カメラのアスペクト比を現在のウィンドウ幅に合わせる
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();

        // 2. レンダラーのサイズ（描画領域）を更新
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    // --- ゲーム要素 (簡略版) ---
    scene.add(new THREE.GridHelper(100, 50, 0x444444, 0x222222));
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 7.5);
    scene.add(light);

    // 操作変数
    let moveF = 0, moveR = 0;
    let yaw = 0, pitch = 0;

    // ジョイスティック処理
    const knob = document.getElementById('joystick-knob');
    let moveTouchId = null;

    window.addEventListener('touchstart', (e) => {
        for(let t of e.changedTouches) {
            if(t.clientX < window.innerWidth / 2) moveTouchId = t.identifier;
        }
    });

    window.addEventListener('touchmove', (e) => {
        for(let t of e.changedTouches) {
            if(t.identifier === moveTouchId) {
                const rect = document.getElementById('joystick-container').getBoundingClientRect();
                const dx = t.clientX - (rect.left + 50);
                const dy = t.clientY - (rect.top + 50);
                const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
                const angle = Math.atan2(dy, dx);
                knob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
                moveF = -Math.sin(angle) * (dist/40);
                moveR = Math.cos(angle) * (dist/40);
            } else if (t.clientX > window.innerWidth / 2) {
                // 視点移動
                yaw -= (e.movementX || 0) * 0.005; // 簡易
            }
        }
    });

    window.addEventListener('touchend', (e) => {
        for(let t of e.changedTouches) {
            if(t.identifier === moveTouchId) {
                moveTouchId = null; moveF = 0; moveR = 0;
                knob.style.transform = `translate(0,0)`;
            }
        }
    });

    // メインループ
    function animate() {
        requestAnimationFrame(animate);
        camera.rotation.set(0, yaw, 0, 'YXZ');
        camera.translateX(moveR * 0.1);
        camera.translateZ(-moveF * 0.1);
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
