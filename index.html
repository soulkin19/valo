<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3D City Flight Game</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; pointer-events: none; }
        #instructions { position: absolute; bottom: 20px; width: 100%; text-align: center; color: white; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>CITY FLIGHT</h1>
        <p>STATUS: <span id="status">FLYING</span></p>
    </div>
    <div id="instructions">マウスを動かして操作 / クリックで加速</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- シーン設定 ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000011, 0.02);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x000011);
        document.body.appendChild(renderer.domElement);

        // --- ライト ---
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(10, 10, 10);
        scene.add(directionalLight);

        // --- 街の作成 ---
        const buildings = [];
        const boxGeo = new THREE.BoxGeometry(1, 1, 1);
        
        for (let i = 0; i < 100; i++) {
            const h = Math.random() * 10 + 2;
            const material = new THREE.MeshPhongMaterial({ color: 0x222244 });
            const building = new THREE.Mesh(boxGeo, material);
            building.scale.set(2, h, 2);
            building.position.set(Math.random() * 100 - 50, h / 2, Math.random() * -200);
            scene.add(building);
        }

        // --- 2つのターゲットビル（連なったビル） ---
        const towerMat = new THREE.MeshPhongMaterial({ color: 0x444466 });
        const createTower = (x) => {
            const tower = new THREE.Mesh(new THREE.BoxGeometry(4, 30, 4), towerMat.clone());
            tower.position.set(x, 15, -100);
            scene.add(tower);
            return tower;
        };
        const towerA = createTower(-3);
        const towerB = createTower(3);

        // --- 航空機 ---
        const planeGroup = new THREE.Group();
        const bodyGeo = new THREE.BoxGeometry(0.5, 0.3, 2);
        const wingGeo = new THREE.BoxGeometry(3, 0.05, 0.8);
        const planeMat = new THREE.MeshPhongMaterial({ color: 0xffffff });
        
        const body = new THREE.Mesh(bodyGeo, planeMat);
        const wing = new THREE.Mesh(wingGeo, planeMat);
        planeGroup.add(body, wing);
        scene.add(planeGroup);
        
        camera.position.set(0, 2, 5);

        // --- 変数 ---
        let mouseX = 0, mouseY = 0;
        let speed = 0.5;
        let exploded = false;
        const particles = [];

        // --- イベント ---
        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        window.addEventListener('mousedown', () => speed = 1.2);
        window.addEventListener('mouseup', () => speed = 0.5);

        // --- 爆発関数 ---
        function triggerExplosion(pos) {
            if (exploded) return;
            exploded = true;
            document.getElementById('status').innerText = "IMPACT DETECTED";
            document.getElementById('status').style.color = "red";
            
            towerA.material.color.set(0xff0000);
            towerB.material.color.set(0xff0000);

            for (let i = 0; i < 50; i++) {
                const pGeo = new THREE.SphereGeometry(0.2);
                const pMat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
                const p = new THREE.Mesh(pGeo, pMat);
                p.position.copy(pos);
                p.userData.velocity = new THREE.Vector3(
                    (Math.random() - 0.5) * 0.5,
                    (Math.random() - 0.5) * 0.5,
                    (Math.random() - 0.5) * 0.5
                );
                scene.add(p);
                particles.push(p);
            }
        }

        // --- アニメーションループ ---
        function animate() {
            requestAnimationFrame(animate);

            if (!exploded) {
                // 航空機の移動
                planeGroup.position.x += (mouseX * 10 - planeGroup.position.x) * 0.05;
                planeGroup.position.y += (mouseY * 10 + 5 - planeGroup.position.y) * 0.05;
                planeGroup.position.z -= speed;

                // カメラが航空機を追う
                camera.position.x = planeGroup.position.x;
                camera.position.y = planeGroup.position.y + 2;
                camera.position.z = planeGroup.position.z + 10;
                camera.lookAt(planeGroup.position);

                // 衝突判定
                const distA = planeGroup.position.distanceTo(towerA.position);
                const distB = planeGroup.position.distanceTo(towerB.position);
                if (distA < 4 || distB < 4) {
                    triggerExplosion(planeGroup.position);
                }
            } else {
                // 爆発後のパーティクル移動
                particles.forEach(p => {
                    p.position.add(p.userData.velocity);
                    p.scale.multiplyScalar(0.98);
                });
            }

            renderer.render(scene, camera);
        }

        animate();

        // リサイズ対応
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
