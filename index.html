<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <title>ヘリ撃墜ゲーム</title>
  <style>
    body { margin:0; overflow:hidden; font-family:sans-serif; background:#000; }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      background: rgba(0,0,0,0.4);
      padding: 8px 12px;
      border-radius: 8px;
      pointer-events: none;
    }
    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 40px;
      color: lime;
      pointer-events: none;
    }
    #startScreen {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.85);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    #startScreen button {
      margin: 12px;
      padding: 14px 28px;
      font-size: 18px;
      cursor: pointer;
    }
    #info {
      position: absolute;
      bottom: 10px;
      left: 10px;
      color: #aaa;
      font-size: 13px;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="startScreen">
  <h1>ヘリコプターシューター</h1>
  <p>銃を選択してください</p>
  <button onclick="startGame('Pistol')">ピストル</button>
  <button onclick="startGame('Rifle')">アサルトライフル</button>
  <button onclick="startGame('Rocket')">ロケットランチャー</button>
</div>

<div id="ui">
  武器: <span id="weaponName">-</span>  |  スコア: <span id="score">0</span>
</div>

<div id="crosshair">+</div>
<div id="info">PC：マウスで視点・クリックで射撃　　モバイル：左で移動　右で視点　タップで射撃</div>

<script type="module">
  import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js';
  import { PointerLockControls } from 'https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/controls/PointerLockControls.js';

  // ── 基本設定 ────────────────────────────────────────
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x88aaff);
  scene.fog = new THREE.FogExp2(0x88aaff, 0.0005);

  const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 2000);
  camera.position.set(0, 1.6, 10);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  // ライト
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.1);
  dirLight.position.set(80, 120, 60);
  dirLight.castShadow = true;
  scene.add(dirLight);

  // 地面
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(2000, 2000),
    new THREE.MeshStandardMaterial({ color: 0x337733 })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // ── ゲーム変数 ───────────────────────────────────────
  let currentWeapon = null;
  let score = 0;
  const helicopters = [];
  let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
  const velocity = new THREE.Vector3();
  const direction = new THREE.Vector3();

  // モバイル用タッチ制御
  const isMobile = /Mobi|Android|iPhone|iPad|iPod/.test(navigator.userAgent);
  let touchStartX = 0, touchStartY = 0;
  let lookTouchId = null;

  // ── コントロール ──────────────────────────────────────
  const controls = new PointerLockControls(camera, document.body);

  // PCではクリックでポインターロック
  if (!isMobile) {
    document.addEventListener('click', () => {
      if (!controls.isLocked) controls.lock();
    });
  }

  // ── モバイル視点制御（右半分ドラッグで回転） ─────────────
  function onTouchStart(e) {
    e.preventDefault();
    for (const touch of e.changedTouches) {
      if (touch.clientX > innerWidth / 2 && lookTouchId === null) {
        lookTouchId = touch.identifier;
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
      }
    }
  }

  function onTouchMove(e) {
    e.preventDefault();
    for (const touch of e.touches) {
      if (touch.identifier === lookTouchId) {
        const dx = (touch.clientX - touchStartX) * 0.004;
        const dy = (touch.clientY - touchStartY) * 0.004;

        camera.rotation.y -= dx;
        camera.rotation.x -= dy;
        camera.rotation.x = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, camera.rotation.x));

        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
      }
    }
  }

  function onTouchEnd(e) {
    for (const touch of e.changedTouches) {
      if (touch.identifier === lookTouchId) {
        lookTouchId = null;
      }
    }
  }

  if (isMobile) {
    document.addEventListener('touchstart', onTouchStart, { passive: false });
    document.addEventListener('touchmove', onTouchMove, { passive: false });
    document.addEventListener('touchend', onTouchEnd);
  }

  // ── 移動（WASD or 左半分タッチ） ────────────────────────
  const keys = {};
  window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
  window.addEventListener('keyup',   e => { keys[e.key.toLowerCase()] = false; });

  // モバイル移動（左半分タッチで前進・左右）
  document.addEventListener('touchstart', e => {
    if (!currentWeapon) return;
    for (const touch of e.changedTouches) {
      if (touch.clientX < innerWidth / 2) {
        const relX = (touch.clientX / innerWidth) * 2 - 1;
        const relY = (touch.clientY / innerHeight) * 2 - 1;

        moveForward  = relY < -0.2;
        moveBackward = relY >  0.4;
        moveLeft     = relX < -0.3;
        moveRight    = relX >  0.3;
      }
    }
  }, { passive: false });

  document.addEventListener('touchend', () => {
    moveForward = moveBackward = moveLeft = moveRight = false;
  });

  // ── 銃選択 ───────────────────────────────────────────
  window.startGame = function(type) {
    document.getElementById('startScreen').style.display = 'none';
    currentWeapon = type;
    document.getElementById('weaponName').textContent = type;
    if (!isMobile) controls.lock();
  };

  // ── 射撃 ─────────────────────────────────────────────
  const raycaster = new THREE.Raycaster();

  function shoot() {
    if (!currentWeapon) return;

    raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
    const intersects = raycaster.intersectObjects(helicopters, true);

    if (intersects.length > 0) {
      const hitGroup = intersects[0].object.parent;
      if (hitGroup.userData.hp !== undefined) {
        hitGroup.userData.hp--;
        if (hitGroup.userData.hp <= 0) {
          scene.remove(hitGroup);
          const idx = helicopters.indexOf(hitGroup);
          if (idx > -1) helicopters.splice(idx, 1);
          score += 100;
          document.getElementById('score').textContent = score;
        }
      }
    }
  }

  document.addEventListener('mousedown', e => { if (e.button === 0) shoot(); });
  document.addEventListener('touchstart', e => {
    // 右半分以外なら射撃（左は移動用なので区別）
    if (e.touches[0].clientX > innerWidth / 3) {
      shoot();
    }
  }, { passive: false });

  // ── 敵生成 ───────────────────────────────────────────
  function spawnHelicopter() {
    const group = new THREE.Group();

    // 簡易ヘリ（ボックス）
    const body = new THREE.Mesh(
      new THREE.BoxGeometry(4, 1.8, 9),
      new THREE.MeshStandardMaterial({ color: 0x222222 })
    );
    group.add(body);

    group.position.set(
      (Math.random() - 0.5) * 400,
      20 + Math.random() * 100,
      -200 - Math.random() * 300
    );

    group.userData = {
      hp: currentWeapon === 'Rocket' ? 3 : (currentWeapon === 'Rifle' ? 2 : 1),
      speed: 0.5 + Math.random() * 0.4
    };

    scene.add(group);
    helicopters.push(group);
  }

  setInterval(spawnHelicopter, 3500);

  // ── アニメーションループ ──────────────────────────────
  function animate() {
    requestAnimationFrame(animate);

    if (currentWeapon) {
      // 移動処理
      direction.z = Number(moveForward) - Number(moveBackward);
      direction.x = Number(moveRight)  - Number(moveLeft);
      direction.normalize();

      const speed = 0.12;

      if (moveForward || moveBackward) velocity.z = direction.z * speed;
      else velocity.z *= 0.88;

      if (moveLeft || moveRight) velocity.x = direction.x * speed;
      else velocity.x *= 0.88;

      controls.moveRight(velocity.x);
      controls.moveForward(velocity.z);

      // 敵の移動 & 衝突チェック
      helicopters.forEach((heli, i) => {
        heli.position.z += heli.userData.speed;

        if (heli.position.distanceTo(camera.position) < 18) {
          alert(`ゲームオーバー！ スコア: ${score}`);
          location.reload();
        }

        if (heli.position.z > 150) {
          scene.remove(heli);
          helicopters.splice(i, 1);
        }
      });
    }

    renderer.render(scene, camera);
  }

  animate();

  // リサイズ対応
  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
</script>
</body>
</html>
