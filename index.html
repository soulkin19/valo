<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Dogfight Mobile</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 2px 2px 2px black; pointer-events: none; }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            width: 30px; height: 30px; border: 2px solid rgba(255,255,255,0.5); border-radius: 50%; 
            pointer-events: none;
        }
        #crosshair::before { content: ''; position: absolute; top: 50%; left: -5px; width: 10px; height: 2px; background: white; }
        #crosshair::after { content: ''; position: absolute; left: 50%; top: -5px; width: 2px; height: 10px; background: white; }
        
        #joystick-container {
            position: absolute; bottom: 50px; left: 50px;
            width: 120px; height: 120px; background: rgba(255,255,255,0.2);
            border-radius: 50%; touch-action: none;
        }
        #joystick-knob {
            position: absolute; top: 40px; left: 40px;
            width: 40px; height: 40px; background: rgba(255,255,255,0.5);
            border-radius: 50%;
        }
        #fire-btn {
            position: absolute; bottom: 60px; right: 50px;
            width: 80px; height: 80px; background: rgba(255,0,0,0.4);
            border: 4px solid white; border-radius: 50%;
            color: white; font-weight: bold; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div>SCORE: <span id="score">0</span></div>
        <div>HP: <span id="hp">100</span></div>
    </div>
    <div id="crosshair"></div>
    <div id="joystick-container"><div id="joystick-knob"></div></div>
    <div id="fire-btn">FIRE</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- ゲーム設定 ---
        let score = 0, hp = 100, isGameOver = false;
        const bullets = [], enemies = [], enemyBullets = [];
        const clock = new THREE.Clock();

        // --- シーン構築 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 100, 1000);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 50, 10);
        scene.add(sun);

        // 海面
        const sea = new THREE.Mesh(
            new THREE.PlaneGeometry(5000, 5000),
            new THREE.MeshPhongMaterial({ color: 0x006994 })
        );
        sea.rotation.x = -Math.PI / 2;
        sea.position.y = -100;
        scene.add(sea);

        // --- 機体作成関数 ---
        function createPlane(color) {
            const group = new THREE.Group();
            // 胴体
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 4), new THREE.MeshPhongMaterial({color}));
            group.add(body);
            // 主翼
            const wing = new THREE.Mesh(new THREE.BoxGeometry(5, 0.1, 1.5), new THREE.MeshPhongMaterial({color}));
            group.add(wing);
            // 尾翼
            const tail = new THREE.Mesh(new THREE.BoxGeometry(2, 0.1, 0.8), new THREE.MeshPhongMaterial({color}));
            tail.position.set(0, 0.3, -1.5);
            group.add(tail);
            return group;
        }

        const player = createPlane(0x1976d2);
        scene.add(player);

        // --- 操作系 ---
        const joystick = { x: 0, y: 0, active: false };
        const joyContainer = document.getElementById('joystick-container');
        const joyKnob = document.getElementById('joystick-knob');
        let isFiring = false;

        joyContainer.addEventListener('touchstart', (e) => { joystick.active = true; });
        window.addEventListener('touchmove', (e) => {
            if (!joystick.active) return;
            const touch = e.touches[0];
            const rect = joyContainer.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            joystick.x = Math.max(-1, Math.min(1, (touch.clientX - centerX) / 50));
            joystick.y = Math.max(-1, Math.min(1, (touch.clientY - centerY) / 50));
            joyKnob.style.transform = `translate(${joystick.x * 40}px, ${joystick.y * 40}px)`;
        });
        window.addEventListener('touchend', () => {
            joystick.active = false;
            joystick.x = 0; joystick.y = 0;
            joyKnob.style.transform = `translate(0,0)`;
        });

        document.getElementById('fire-btn').addEventListener('touchstart', () => { isFiring = true; });
        document.getElementById('fire-btn').addEventListener('touchend', () => { isFiring = false; });

        // --- 弾丸生成 ---
        function spawnBullet(owner, isEnemy = false) {
            const geom = new THREE.SphereGeometry(0.2, 8, 8);
            const mat = new THREE.MeshBasicMaterial({ color: isEnemy ? 0xff0000 : 0xffff00 });
            const bullet = new THREE.Mesh(geom, mat);
            bullet.position.copy(owner.position);
            bullet.quaternion.copy(owner.quaternion);
            scene.add(bullet);
            const list = isEnemy ? enemyBullets : bullets;
            list.push({ mesh: bullet, life: 100 });
        }

        // --- 敵機生成 ---
        function spawnEnemy() {
            const enemy = createPlane(0xd32f2f);
            enemy.position.set(
                player.position.x + (Math.random() - 0.5) * 400,
                player.position.y + (Math.random() - 0.5) * 100 + 50,
                player.position.z - 500
            );
            scene.add(enemy);
            enemies.push({ mesh: enemy, hp: 3, lastFire: 0 });
        }

        setInterval(() => { if(enemies.length < 5) spawnEnemy(); }, 3000);

        // --- メインループ ---
        function animate() {
            if (isGameOver) return;
            requestAnimationFrame(animate);
            const delta = clock.getDelta();

            // 1. 自機の移動と回転 (WTM風)
            const speed = 60 * delta;
            player.translateZ(speed); // 前進

            // 旋回ロジック (ジョイスティック y:ピッチ, x:ロール)
            player.rotateX(-joystick.y * delta * 1.5);
            player.rotateZ(-joystick.x * delta * 2.0);
            // 自然な水平復帰（ロールの自動修正）
            if (Math.abs(joystick.x) < 0.1) {
                player.rotation.z *= 0.95;
            }

            // 2. カメラ追従 (機体の後ろに配置)
            const relativeCameraOffset = new THREE.Vector3(0, 3, -12);
            const cameraOffset = relativeCameraOffset.applyMatrix4(player.matrixWorld);
            camera.position.lerp(cameraOffset, 0.1);
            camera.lookAt(player.position.clone().add(player.getWorldDirection(new THREE.Vector3()).multiplyScalar(20)));

            // 3. 射撃
            if (isFiring && clock.elapsedTime % 0.15 < 0.02) {
                spawnBullet(player);
            }

            // 4. 弾の更新
            [bullets, enemyBullets].forEach((list, idx) => {
                const isEnemyList = idx === 1;
                for (let i = list.length - 1; i >= 0; i--) {
                    const b = list[i];
                    b.mesh.translateZ(150 * delta);
                    b.life--;
                    if (b.life <= 0) {
                        scene.remove(b.mesh);
                        list.splice(i, 1);
                    } else if (isEnemyList) {
                        // 敵の弾が自分に当たったか
                        if (b.mesh.position.distanceTo(player.position) < 2) {
                            hp -= 5;
                            document.getElementById('hp').innerText = hp;
                            scene.remove(b.mesh);
                            list.splice(i, 1);
                        }
                    }
                }
            });

            // 5. 敵のAIと衝突判定
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.mesh.translateZ(40 * delta);
                
                // プレイヤーを追跡 (簡易)
                e.mesh.lookAt(player.position);

                // 射撃AI (一定距離かつ正面にプレイヤーがいる場合)
                const dist = e.mesh.position.distanceTo(player.position);
                if (dist < 200 && clock.elapsedTime - e.lastFire > 1.5) {
                    spawnBullet(e.mesh, true);
                    e.lastFire = clock.elapsedTime;
                }

                // 自分の弾が敵に当たったか
                bullets.forEach((b, bIdx) => {
                    if (b.mesh.position.distanceTo(e.mesh.position) < 4) {
                        e.hp--;
                        scene.remove(b.mesh);
                        bullets.splice(bIdx, 1);
                    }
                });

                if (e.hp <= 0) {
                    scene.remove(e.mesh);
                    enemies.splice(i, 1);
                    score += 100;
                    document.getElementById('score').innerText = score;
                }
            }

            if (hp <= 0) {
                alert("撃墜されました！ スコア: " + score);
                isGameOver = true;
                location.reload();
            }

            renderer.render(scene, camera);
        }

        animate();

        // リサイズ対応
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
