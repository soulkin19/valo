<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WTM Urban Warfare</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; font-family: sans-serif; }
        #ui { position: absolute; width: 100%; height: 100%; pointer-events: none; color: white; text-shadow: 2px 2px #000; }
        #stats { position: absolute; top: 20px; left: 20px; font-weight: bold; }
        .bar-container { width: 150px; height: 12px; background: rgba(0,0,0,0.5); border: 1px solid #fff; margin-top: 5px; }
        #hp-fill { width: 100%; height: 100%; background: #00ff00; transition: width 0.2s; }
        
        /* スロットル UI */
        #throttle-ui {
            position: absolute; left: 20px; bottom: 40px; width: 50px; height: 180px;
            background: rgba(0,0,0,0.4); border: 2px solid #fff; border-radius: 5px; pointer-events: auto;
        }
        #throttle-knob {
            position: absolute; bottom: 50%; width: 100%; height: 20px; background: #ffeb3b; border-radius: 3px;
        }

        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 30px; height: 30px; border: 1px solid rgba(0,255,0,0.8); border-radius: 50%;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="stats">
            SCORE: <span id="score">0</span><br>
            SPD: <span id="spd-text">0</span> km/h
            <div class="bar-container"><div id="hp-fill"></div></div>
        </div>
        <div id="crosshair"></div>
    </div>
    <div id="throttle-ui"><div id="throttle-knob"></div></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 設定 ---
        let score = 0, hp = 100, throttle = 0.5;
        let isFiring = false;
        const bullets = [], enemies = [], obstacles = [];
        const clock = new THREE.Clock();
        const targetDir = new THREE.Vector2(0, 0);

        // --- シーン ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x4488ff);
        scene.fog = new THREE.Fog(0x4488ff, 100, 2000);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(50, 100, 50);
        scene.add(sun);
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));

        // --- 海と地形 ---
        const sea = new THREE.Mesh(new THREE.PlaneGeometry(10000, 10000), new THREE.MeshPhongMaterial({color: 0x003366}));
        sea.rotation.x = -Math.PI/2;
        sea.position.y = -50;
        scene.add(sea);

        // 巨大ビルを2つ追加
        function createBuilding(x, z, w, h, d) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshPhongMaterial({ color: 0x444444 });
            const b = new THREE.Mesh(geo, mat);
            b.position.set(x, h/2 - 50, z);
            scene.add(b);
            obstacles.push(b);
            
            // 窓の表現（簡易）
            const wire = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({color: 0x666666, wireframe: true}));
            wire.position.copy(b.position);
            scene.add(wire);
        }
        createBuilding(100, -300, 60, 400, 60); // ビルA
        createBuilding(-150, -600, 80, 500, 80); // ビルB（さらに巨大）

        // --- プレイヤー機 ---
        const player = new THREE.Group();
        const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.8, 4, 4, 8), new THREE.MeshPhongMaterial({color: 0xcccccc}));
        body.rotation.x = Math.PI/2;
        player.add(body);
        const wing = new THREE.Mesh(new THREE.BoxGeometry(8, 0.1, 2), new THREE.MeshPhongMaterial({color: 0xaaaaaa}));
        player.add(wing);
        scene.add(player);

        // 偏差インジケーター
        const lead = new THREE.Mesh(new THREE.RingGeometry(1.2, 1.5, 16), new THREE.MeshBasicMaterial({color: 0xff0000, side: THREE.DoubleSide}));
        scene.add(lead);

        // --- モバイル操作 ---
        const throttleUI = document.getElementById('throttle-ui');
        const knob = document.getElementById('throttle-knob');
        
        const handleTouch = (e) => {
            const t = e.touches[0];
            const rect = throttleUI.getBoundingClientRect();
            if (t.clientX < rect.right + 50) { // スロットル付近
                let val = 1 - (t.clientY - rect.top) / rect.height;
                throttle = Math.min(Math.max(val, 0), 1);
                knob.style.bottom = (throttle * 100) + '%';
            } else { // 操縦
                targetDir.x = (t.clientX / window.innerWidth) * 2 - 1;
                targetDir.y = -(t.clientY / window.innerHeight) * 2 + 1;
                isFiring = true;
            }
        };
        window.addEventListener('touchstart', handleTouch);
        window.addEventListener('touchmove', handleTouch);
        window.addEventListener('touchend', () => { isFiring = false; targetDir.set(0,0); });

        // --- 弾と敵の処理 ---
        function shoot(owner, isEnemy=false) {
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshBasicMaterial({color: isEnemy?0xff2200:0xffff00}));
            b.position.copy(owner.position);
            b.quaternion.copy(owner.quaternion);
            scene.add(b);
            bullets.push({mesh: b, isEnemy, life: 100});
        }

        function spawnEnemy() {
            const eGroup = new THREE.Group();
            const eMesh = new THREE.Mesh(new THREE.BoxGeometry(6, 0.5, 3), new THREE.MeshPhongMaterial({color: 0xff4444}));
            eGroup.add(eMesh);
            eGroup.position.set((Math.random()-0.5)*1000, 100, -1500);
            scene.add(eGroup);
            enemies.push({mesh: eGroup, hp: 3});
        }
        for(let i=0; i<4; i++) spawnEnemy();

        // --- メインループ ---
        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();

            // 1. 操縦（WTM風：ターゲットに向かって滑らかに旋回）
            const speed = (40 + throttle * 120);
            player.translateZ(speed * dt);
            document.getElementById('spd-text').innerText = Math.round(speed * 3.6);

            // 旋回計算
            const turnSpeed = 1.5;
            player.rotateX(targetDir.y * turnSpeed * dt);
            player.rotateY(-targetDir.x * turnSpeed * dt);
            // ロール（傾き）の視覚効果
            player.rotation.z = THREE.MathUtils.lerp(player.rotation.z, -targetDir.x * 1.2, 0.1);

            // 2. カメラ（ダイナミック追従）
            const offset = new THREE.Vector3(0, 4, -18).applyMatrix4(player.matrixWorld);
            camera.position.lerp(offset, 0.15);
            camera.lookAt(player.position.clone().add(player.getWorldDirection(new THREE.Vector3()).multiplyScalar(50)));

            // 3. 衝突判定（ビル・地面）
            const pPos = player.position;
            if (pPos.y < -45) hp = 0;
            obstacles.forEach(b => {
                const box = new THREE.Box3().setFromObject(b);
                if (box.containsPoint(pPos)) hp = 0;
            });

            // 4. 敵AI & 偏差
            let bestTarget = null;
            enemies.forEach((en, i) => {
                en.mesh.translateZ(90 * dt);
                en.mesh.lookAt(player.position); // プレイヤーを追う
                
                const dist = en.mesh.position.distanceTo(player.position);
                if (dist < 400) {
                    if (!bestTarget) bestTarget = en;
                    if (Math.random() < 0.02) shoot(en.mesh, true);
                }
            });

            if (bestTarget) {
                lead.visible = true;
                const leadTime = bestTarget.mesh.position.distanceTo(player.position) / 250;
                lead.position.copy(bestTarget.mesh.position).add(bestTarget.mesh.getWorldDirection(new THREE.Vector3()).multiplyScalar(90 * leadTime));
                lead.lookAt(camera.position);
            } else { lead.visible = false; }

            // 5. 弾
            if (isFiring && clock.elapsedTime % 0.12 < 0.02) shoot(player);
            for(let i=bullets.length-1; i>=0; i--) {
                const b = bullets[i];
                b.mesh.translateZ(250 * dt);
                b.life--;

                if (b.isEnemy) {
                    if (b.mesh.position.distanceTo(player.position) < 4) {
                        hp -= 5; b.life = 0;
                    }
                } else {
                    enemies.forEach((en, ei) => {
                        if (b.mesh.position.distanceTo(en.mesh.position) < 10) {
                            en.hp--; b.life = 0;
                            if (en.hp <= 0) {
                                scene.remove(en.mesh); enemies.splice(ei,1);
                                score += 100; document.getElementById('score').innerText = score;
                                spawnEnemy();
                            }
                        }
                    });
                }
                if (b.life <= 0) { scene.remove(b.mesh); bullets.splice(i,1); }
            }

            document.getElementById('hp-fill').style.width = hp + '%';
            if (hp <= 0) { alert("撃墜されました。SCORE: " + score); location.reload(); }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
