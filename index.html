<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Desert Strike: Visualized</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; font-family: sans-serif; }
        #hud { position: absolute; top: 20px; left: 20px; color: #000; font-weight: bold; pointer-events: none; z-index: 10; }
        
        /* 武器選択 */
        #menu { position: absolute; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .btn { width: 220px; padding: 15px; margin: 10px; background: #333; color: #fff; text-align: center; border-radius: 10px; font-size: 18px; }

        /* UI */
        #move-joy { position: absolute; bottom: 50px; left: 50px; width: 130px; height: 130px; background: rgba(0,0,0,0.1); border: 2px solid #333; border-radius: 50%; display: none; }
        #move-knob { position: absolute; top: 35px; left: 35px; width: 60px; height: 60px; background: #333; border-radius: 50%; opacity: 0.5; }
        #fire-btn { position: absolute; bottom: 50px; right: 50px; width: 120px; height: 120px; background: #f33; border: 4px solid #fff; border-radius: 50%; color: #fff; display: none; align-items: center; justify-content: center; font-weight: bold; font-size: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        #msg { position: absolute; top: 30%; width: 100%; text-align: center; color: #d00; font-size: 40px; font-weight: bold; display: none; text-shadow: 2px 2px #fff; }
    </style>
</head>
<body>

    <div id="menu">
        <h1 style="color:#333;">FIM-92 Training</h1>
        <div class="btn" onclick="startGame('mg')">20mm マシンガン</div>
        <div class="btn" onclick="startGame('stinger')">追尾スティンガー</div>
    </div>

    <div id="hud">HP: <span id="hp">100</span> | 敵HP: <span id="ehp">100</span></div>
    <div id="msg">TARGET DESTROYED</div>
    <div id="move-joy"><div id="move-knob"></div></div>
    <div id="fire-btn">LAUNCH</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB); // 明るい青空
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 明るいライティング
        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(50, 100, 50);
        scene.add(sun);

        // 砂漠の地面
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshStandardMaterial({color: 0xedc9af}));
        ground.rotation.x = -Math.PI/2;
        scene.add(ground);
        scene.add(new THREE.GridHelper(200, 40, 0xbb9977, 0xddbb99));

        let selectedWeapon = '', isPlaying = false, playerHP = 100, bullets = [], enemyBullets = [];
        let yaw = 0, pitch = 0, moveVec = {x:0, y:0};
        let heli = { mesh: new THREE.Group(), hp: 100, lastAttack: 0 };

        // ヘリの作成 (目立つように黒)
        const hBody = new THREE.Mesh(new THREE.BoxGeometry(4, 1.5, 6), new THREE.MeshStandardMaterial({color: 0x222222, emissive: 0x000000}));
        heli.mesh.add(hBody);
        scene.add(heli.mesh);

        window.startGame = (type) => {
            selectedWeapon = type; isPlaying = true;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('hud').style.display = 'block';
            document.getElementById('move-joy').style.display = 'block';
            document.getElementById('fire-btn').style.display = 'flex';
            camera.position.set(0, 1.6, 20);
        };

        // 操作
        let tId = null, lx, ly;
        window.addEventListener('touchstart', e => { for(let t of e.changedTouches) if(t.clientX > window.innerWidth/3 && t.target.id !== 'fire-btn') { tId = t.identifier; lx = t.clientX; ly = t.clientY; } });
        window.addEventListener('touchmove', e => { for(let t of e.touches) if(t.identifier === tId) { yaw -= (t.clientX - lx) * 0.006; pitch -= (t.clientY - ly) * 0.006; lx = t.clientX; ly = t.clientY; } });

        const joy = document.getElementById('move-joy');
        joy.addEventListener('touchmove', e => {
            const t = e.touches[0], r = joy.getBoundingClientRect();
            let dx = t.clientX - (r.left + 65), dy = t.clientY - (r.top + 65);
            const d = Math.min(Math.sqrt(dx*dx+dy*dy), 50);
            const a = Math.atan2(dy, dx);
            moveVec.x = (Math.cos(a)*d)/50; moveVec.y = (Math.sin(a)*d)/50;
            document.getElementById('move-knob').style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
        });
        joy.addEventListener('touchend', () => { moveVec = {x:0, y:0}; document.getElementById('move-knob').style.transform = 'translate(0,0)'; });

        // 射撃
        document.getElementById('fire-btn').addEventListener('touchstart', e => {
            e.preventDefault();
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshBasicMaterial({color: 0xffaa00}));
            b.position.copy(camera.position);
            b.userData = { type: selectedWeapon, vel: new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion).multiplyScalar(1) };
            bullets.push(b); scene.add(b);
        });

        function animate() {
            requestAnimationFrame(animate);
            if(!isPlaying) return;

            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
            const f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y = 0;
            camera.position.addScaledVector(f.normalize(), -moveVec.y * 0.3);

            if(heli.hp > 0) {
                const t = Date.now() * 0.001;
                heli.mesh.position.set(Math.sin(t*0.3)*40, 15, Math.cos(t*0.3)*30 - 20);
                heli.mesh.lookAt(camera.position);

                // 敵の攻撃をゆっくりに
                if(Date.now() - heli.lastAttack > 2000) {
                    const eb = new THREE.Mesh(new THREE.SphereGeometry(0.5), new THREE.MeshBasicMaterial({color: 0xff0000}));
                    eb.position.copy(heli.mesh.position);
                    eb.userData.vel = new THREE.Vector3().subVectors(camera.position, heli.mesh.position).normalize().multiplyScalar(0.4);
                    enemyBullets.push(eb); scene.add(eb);
                    heli.lastAttack = Date.now();
                }
            }

            // 当たり判定演出
            bullets.forEach((b, i) => {
                if(b.userData.type === 'stinger' && heli.hp > 0) {
                    const dir = new THREE.Vector3().subVectors(heli.mesh.position, b.position).normalize();
                    b.userData.vel.lerp(dir.multiplyScalar(1.2), 0.05);
                }
                b.position.add(b.userData.vel);
                if(heli.hp > 0 && b.position.distanceTo(heli.mesh.position) < 5) {
                    heli.hp -= (b.userData.type === 'stinger' ? 50 : 15);
                    document.getElementById('ehp').innerText = Math.max(0, heli.hp);
                    
                    // 【重要】当たった瞬間のフラッシュ演出
                    hBody.material.emissive.setHex(0xffffff);
                    setTimeout(() => hBody.material.emissive.setHex(0x000000), 100);

                    scene.remove(b); bullets.splice(i, 1);
                    if(heli.hp <= 0) {
                        document.getElementById('msg').style.display = 'block';
                        scene.remove(heli.mesh);
                        setTimeout(() => { heli.hp = 100; scene.add(heli.mesh); document.getElementById('msg').style.display = 'none'; document.getElementById('ehp').innerText = 100; }, 3000);
                    }
                }
            });

            enemyBullets.forEach((eb, i) => {
                eb.position.add(eb.userData.vel);
                if(eb.position.distanceTo(camera.position) < 2) {
                    playerHP -= 10; document.getElementById('hp').innerText = playerHP;
                    scene.remove(eb); enemyBullets.splice(i, 1);
                }
            });

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
