<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Mini VALORANT Clone</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px;
            border: 2px solid #00ff00;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #ui {
            position: absolute; bottom: 20px; left: 20px;
            color: white; font-size: 24px; text-shadow: 2px 2px 4px #000;
        }
        #msg {
            position: absolute; top: 20%; width: 100%; text-align: center;
            color: white; font-size: 20px;
        }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="ui">HP: 100 | Kills: <span id="kills">0</span></div>
    <div id="msg">クリックして開始 (WASDで移動 / クリックで射撃)</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 設定 ---
        let kills = 0;
        const bots = [];
        const clock = new THREE.Clock();
        
        // --- シーン・カメラ・レンダラー ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // 青空
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- ライティング ---
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7.5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // --- 地面 (マップ) ---
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100),
            new THREE.MeshStandardMaterial({ color: 0x555555 })
        );
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // --- プレイヤーの制御 ---
        camera.position.y = 1.6; // 目線の高さ
        const move = { fwd: false, bwd: false, lft: false, rgt: false };
        
        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW') move.fwd = true;
            if(e.code === 'KeyS') move.bwd = true;
            if(e.code === 'KeyA') move.lft = true;
            if(e.code === 'KeyD') move.rgt = true;
        });
        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW') move.fwd = false;
            if(e.code === 'KeyS') move.bwd = false;
            if(e.code === 'KeyA') move.lft = false;
            if(e.code === 'KeyD') move.rgt = false;
        });

        // マウスで視点移動 (Pointer Lock)
        window.addEventListener('click', () => {
            document.body.requestPointerLock();
            document.getElementById('msg').style.display = 'none';
        });

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
            }
        });

        // --- Botの作成機能 ---
        function spawnBot() {
            const geometry = new THREE.CapsuleGeometry(0.4, 1, 4, 8);
            const material = new THREE.MeshStandardMaterial({ color: 0xff0000 });
            const bot = new THREE.Mesh(geometry, material);
            
            bot.position.set(
                (Math.random() - 0.5) * 40,
                1,
                (Math.random() - 0.5) * 40
            );
            scene.add(bot);
            bots.push(bot);
        }

        for(let i=0; i<5; i++) spawnBot();

        // --- 射撃システム ---
        const raycaster = new THREE.Raycaster();
        window.addEventListener('mousedown', () => {
            if (document.pointerLockElement !== document.body) return;

            // 画面中央からレイを飛ばす
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(bots);

            if (intersects.length > 0) {
                const target = intersects[0].object;
                scene.remove(target);
                bots.splice(bots.indexOf(target), 1);
                kills++;
                document.getElementById('kills').innerText = kills;
                spawnBot(); // 倒したら新しいBotを出す
            }
        });

        // --- ゲームループ ---
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const speed = 5 * delta;

            if (move.fwd) camera.translateZ(-speed);
            if (move.bwd) camera.translateZ(speed);
            if (move.lft) camera.translateX(-speed);
            if (move.rgt) camera.translateX(speed);
            camera.position.y = 1.6; // 高さを固定

            renderer.render(scene, camera);
        }
        animate();

        // 画面リサイズ対応
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
