<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3D Heli Shooter</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            text-shadow: 2px 2px 2px black; pointer-events: none;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px; border: 2px solid #0f0;
            transform: translate(-50%, -50%); border-radius: 50%; pointer-events: none;
        }
        #msg { position: absolute; top: 50%; width: 100%; text-align: center; color: red; font-size: 30px; display: none; }
    </style>
</head>
<body>
    <div id="ui">
        <div>武器: <span id="weaponName">アサルトライフル</span></div>
        <div>敵ヘリ残数: <span id="enemyCount">3</span></div>
        <div>プレイヤーHP: <span id="playerHP">100</span></div>
        <p style="font-size: 12px;">クリック: 射撃 / 数字キー1,2: 武器切り替え</p>
    </div>
    <div id="crosshair"></div>
    <div id="msg">MISSION FAILED</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 基本設定 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // 青空
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // 照明
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7.5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // 地面
        const grid = new THREE.GridHelper(200, 50, 0x0000ff, 0x808080);
        scene.add(grid);

        // --- ゲーム状態 ---
        let playerHP = 100;
        let currentWeapon = 'rifle';
        const enemies = [];
        const bullets = [];
        const enemyBullets = [];

        // --- ヘリコプター生成 ---
        function createHeli() {
            const group = new THREE.Group();
            // 胴体
            const body = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 4), new THREE.MeshStandardMaterial({color: 0x224422}));
            group.add(body);
            // プロペラ
            const rotor = new THREE.Mesh(new THREE.BoxGeometry(5, 0.1, 0.5), new THREE.MeshStandardMaterial({color: 0x111111}));
            rotor.position.y = 0.7;
            group.add(rotor);
            
            group.position.set(Math.random() * 40 - 20, 10 + Math.random() * 5, -40 - Math.random() * 20);
            scene.add(group);
            return { mesh: group, rotor: rotor, hp: 50, lastShot: 0 };
        }

        for(let i=0; i<3; i++) enemies.push(createHeli());

        // --- 武器設定 ---
        const weapons = {
            rifle: { name: "アサルトライフル", color: 0xffff00, speed: 2 },
            rocket: { name: "対空ロケット", color: 0xff4400, speed: 0.8 }
        };

        // --- 入力制御 ---
        window.addEventListener('keydown', (e) => {
            if(e.key === '1') { currentWeapon = 'rifle'; document.getElementById('weaponName').innerText = weapons.rifle.name; }
            if(e.key === '2') { currentWeapon = 'rocket'; document.getElementById('weaponName').innerText = weapons.rocket.name; }
        });

        window.addEventListener('click', () => {
            if(playerHP <= 0) return;
            const bullet = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({color: weapons[currentWeapon].color}));
            bullet.position.copy(camera.position);
            
            const direction = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            bullet.userData.velocity = direction.multiplyScalar(weapons[currentWeapon].speed);
            
            bullets.push(bullet);
            scene.add(bullet);
        });

        // マウス移動でカメラ回転
        let pitch = 0, yaw = 0;
        window.addEventListener('mousemove', (e) => {
            yaw -= e.movementX * 0.002;
            pitch -= e.movementY * 0.002;
            pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
        });
        renderer.domElement.requestPointerLock = renderer.domElement.requestPointerLock || renderer.domElement.mozRequestPointerLock;
        renderer.domElement.onclick = () => renderer.domElement.requestPointerLock();

        // --- メインループ ---
        function animate() {
            requestAnimationFrame(animate);

            if(playerHP > 0) {
                // 弾の移動
                bullets.forEach((b, i) => {
                    b.position.add(b.userData.velocity);
                    if(b.position.length() > 200) { scene.remove(b); bullets.splice(i, 1); }

                    // 当たり判定
                    enemies.forEach((e, ei) => {
                        if(b.position.distanceTo(e.mesh.position) < 2) {
                            e.hp -= 10;
                            scene.remove(b); bullets.splice(i, 1);
                            if(e.hp <= 0) {
                                scene.remove(e.mesh);
                                enemies.splice(ei, 1);
                                document.getElementById('enemyCount').innerText = enemies.length;
                            }
                        }
                    });
                });

                // 敵の行動
                enemies.forEach(e => {
                    e.rotor.rotation.y += 0.5;
                    e.mesh.position.x += Math.sin(Date.now() * 0.001) * 0.1; // 揺れ

                    // 敵の射撃 (20mm機銃風)
                    if(Date.now() - e.lastShot > 2000) {
                        const eb = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 0.5), new THREE.MeshBasicMaterial({color: 0xff0000}));
                        eb.position.copy(e.mesh.position);
                        const dir = new THREE.Vector3().subVectors(camera.position, e.mesh.position).normalize();
                        eb.userData.velocity = dir.multiplyScalar(0.4);
                        enemyBullets.push(eb);
                        scene.add(eb);
                        e.lastShot = Date.now();
                    }
                });

                // 敵弾の移動とプレイヤーへのダメージ
                enemyBullets.forEach((eb, i) => {
                    eb.position.add(eb.userData.velocity);
                    if(eb.position.distanceTo(camera.position) < 1) {
                        playerHP -= 5;
                        document.getElementById('playerHP').innerText = playerHP;
                        scene.remove(eb);
                        enemyBullets.splice(i, 1);
                    }
                });
            } else {
                document.getElementById('msg').style.display = 'block';
            }

            renderer.render(scene, camera);
        }

        animate();

        // リサイズ対応
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
