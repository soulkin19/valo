<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Fixed Cam Flight Combat</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; user-select: none; -webkit-user-select: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: none; }
        
        /* HUDデザイン */
        #hud { position: absolute; top: 15px; left: 15px; color: #0f0; pointer-events: none; text-shadow: 2px 2px 2px #000; font-size: 16px; z-index: 5; font-weight: bold; }
        
        /* ターゲットボックス (敵を囲む四角) */
        #target-box { 
            position: absolute; width: 40px; height: 40px; border: 2px solid #f00; 
            transform: translate(-50%, -50%); display: none; pointer-events: none;
        }
        #target-dist { position: absolute; top: 45px; left: 0; color: #f00; font-size: 12px; width: 100px; text-align: center; }

        /* ジョイスティック位置調整 */
        #joystick-left-container, #joystick-right-container { 
            position: absolute; bottom: 80px; width: 160px; height: 160px; opacity: 0.6; z-index: 10;
        }
        #joystick-left-container { left: 30px; }
        #joystick-right-container { right: 30px; }

        .fire-button { 
            position: absolute; bottom: 250px; width: 75px; height: 75px; 
            background: radial-gradient(circle, rgba(255,0,0,0.6) 0%, rgba(100,0,0,0.8) 100%);
            border: 2px solid #fff; border-radius: 50%; color: #fff; font-size: 12px; 
            display: flex; align-items: center; justify-content: center; z-index: 10;
        }
        #fire-main { right: 120px; }
        #fire-secondary { right: 25px; background: radial-gradient(circle, rgba(0,100,255,0.6) 0%, rgba(0,0,100,0.8) 100%); }
        
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; z-index: 100; }
        button { padding: 15px 50px; font-size: 20px; background: #0c0; color: #fff; border: none; border-radius: 5px; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>ADVANCED DOGFIGHT</h1>
        <p>MOBILE FLIGHT SIMULATOR</p>
        <button id="start-button">MISSION START</button>
    </div>

    <div id="game-container">
        <div id="hud">
            SPD: <span id="speed">0</span> km/h | ALT: <span id="alt">0</span> m<br>
            HP : <span id="hp">100</span>% | AMMO: <span id="ammo">--</span>
        </div>
        
        <div id="target-box"><div id="target-dist">0m</div></div>
        
        <div id="joystick-left-container"></div>
        <div id="joystick-right-container"></div>
        <div id="fire-main" class="fire-button">CANNON</div>
        <div id="fire-secondary" class="fire-button">MISSILE</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <script>
        // --- 設定 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x4488ff);
        scene.fog = new THREE.Fog(0x4488ff, 200, 3000);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('game-container').appendChild(renderer.domElement);

        const light = new THREE.DirectionalLight(0xffffff, 1.5);
        light.position.set(100, 500, 100);
        scene.add(light, new THREE.AmbientLight(0x999999));

        // 地面
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(20000, 20000), new THREE.MeshPhongMaterial({ color: 0x334422 }));
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // 雲 (目印用)
        function createClouds() {
            const cloudGeo = new THREE.SphereGeometry(20, 8, 8);
            const cloudMat = new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 });
            for(let i=0; i<100; i++) {
                const cloud = new THREE.Mesh(cloudGeo, cloudMat);
                cloud.position.set(Math.random()*4000-2000, Math.random()*400+100, Math.random()*4000-2000);
                scene.add(cloud);
            }
        }
        createClouds();

        // --- クラス ---
        class Aircraft extends THREE.Group {
            constructor(color) {
                super();
                this.hp = 100;
                this.speed = 0.5;
                this.alive = true;
                // モデル
                const body = new THREE.Mesh(new THREE.BoxGeometry(1, 0.6, 4), new THREE.MeshPhongMaterial({color: color}));
                const wing = new THREE.Mesh(new THREE.BoxGeometry(6, 0.1, 1.5), new THREE.MeshPhongMaterial({color: color}));
                this.add(body, wing);
                this.position.y = 150;
            }
        }

        let player = new Aircraft(0x222222);
        let bot = new Aircraft(0xff0000);
        scene.add(player, bot);
        bot.position.set(100, 200, -300);

        // 敵方向インジケーター (自機の周りを回る矢印)
        const arrowGeo = new THREE.ConeGeometry(0.5, 2, 4);
        const arrowMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
        const enemyArrow = new THREE.Mesh(arrowGeo, arrowMat);
        enemyArrow.rotation.x = Math.PI / 2;
        player.add(enemyArrow); 

        // --- 操作系 ---
        let inputs = { p: 0, r: 0, y: 0, t: 0.5 };
        let bullets = [];
        let isFiring = false;

        function initControls() {
            nipplejs.create({ zone: document.getElementById('joystick-left-container'), mode: 'static', position: {left: '50%', top: '50%'}, color: 'white' })
                .on('move', (e, d) => { inputs.r = -d.vector.x; inputs.p = d.vector.y; })
                .on('end', () => { inputs.r = 0; inputs.p = 0; });

            nipplejs.create({ zone: document.getElementById('joystick-right-container'), mode: 'static', position: {left: '50%', top: '50%'}, color: 'white' })
                .on('move', (e, d) => { inputs.y = -d.vector.x; inputs.t = d.vector.y + 0.5; })
                .on('end', () => { inputs.y = 0; });

            document.getElementById('fire-main').ontouchstart = (e) => { e.preventDefault(); isFiring = true; };
            document.getElementById('fire-main').ontouchend = () => isFiring = false;
        }

        function updatePhysics(dt) {
            // 回転
            player.rotateX(inputs.p * 0.04);
            player.rotateZ(inputs.r * 0.05);
            player.rotateY(inputs.y * 0.02);

            // 前進 (高度による速度変化)
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(player.quaternion);
            const speedFact = 1.0 - (forward.y * 0.5); // 下を向くと速く、上を向くと遅く
            player.speed = THREE.MathUtils.lerp(player.speed, inputs.t * speedFact, 0.1);
            player.position.add(forward.multiplyScalar(player.speed * 100 * dt));

            // ボットAI (プレイヤーを追いかける)
            const toPlayer = player.position.clone().sub(bot.position).normalize();
            bot.quaternion.slerp(new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,0,-1), toPlayer), 0.02);
            bot.translateZ(-0.4);

            if (player.position.y < 0) location.reload();
        }

        const targetBox = document.getElementById('target-box');
        const targetDistTxt = document.getElementById('target-dist');

        function updateHUD() {
            // 3D座標を2Dスクリーン座標に変換
            const vector = bot.position.clone().project(camera);
            const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
            const y = (-(vector.y * 0.5) + 0.5) * window.innerHeight;

            // 敵が画面内にいるか
            if (vector.z < 1 && x > 0 && x < window.innerWidth && y > 0 && y < window.innerHeight) {
                targetBox.style.display = 'block';
                targetBox.style.left = x + 'px';
                targetBox.style.top = y + 'px';
                const dist = player.position.distanceTo(bot.position);
                targetDistTxt.innerText = Math.floor(dist) + "m";
            } else {
                targetBox.style.display = 'none';
            }

            // 敵方向矢印の更新 (自機の鼻先に常に敵の方を指す矢印を表示)
            const localBotPos = player.worldToLocal(bot.position.clone());
            enemyArrow.position.copy(localBotPos.normalize().multiplyScalar(5)); // 自機の5m先に表示
            enemyArrow.lookAt(bot.position);

            document.getElementById('speed').innerText = Math.floor(player.speed * 800);
            document.getElementById('alt').innerText = Math.floor(player.position.y);
            document.getElementById('hp').innerText = player.hp;
        }

        function loop() {
            const dt = 1/60;
            updatePhysics(dt);
            
            // --- 視点固定 (カメラをプレイヤーの座標系に完全同期) ---
            const offset = new THREE.Vector3(0, 4, 15).applyQuaternion(player.quaternion);
            camera.position.copy(player.position).add(offset);
            camera.lookAt(player.position.clone().add(new THREE.Vector3(0, 1, -10).applyQuaternion(player.quaternion)));

            updateHUD();
            renderer.render(scene, camera);
            requestAnimationFrame(loop);
        }

        document.getElementById('start-button').onclick = () => {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            initControls();
            loop();
        };
    </script>
</body>
</html>
