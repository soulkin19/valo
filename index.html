<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mobile FPS - Non-stop Action</title>
    <style>
        :root { --ui-color: #fff; --ui-bg: rgba(0,0,0,0.6); }
        * { touch-action: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; overflow: hidden; background: #d1d9e0; font-family: 'Courier New', monospace; -webkit-user-select: none; user-select: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 24px; height: 24px; border: 2px solid #000; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 10; }
        #crosshair::after { content: ''; position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #3f3; border-radius: 50%; transform: translate(-50%, -50%); }
        #crosshair.hit { border-color: #f00; transform: translate(-50%, -50%) scale(1.3); }
        #ui { position: absolute; top: 20px; left: 20px; color: var(--ui-color); background: var(--ui-bg); padding: 15px; border-radius: 4px; border-left: 4px solid #f00; z-index: 11; font-size: 13px; }
        #kill-feed { position: absolute; top: 20px; right: 150px; color: #000; text-align: right; pointer-events: none; z-index: 11; font-weight: bold; }
        #msg { position: absolute; width: 100%; top: 30%; text-align: center; color: #f00; font-size: 28px; pointer-events: none; font-weight: bold; display: none; z-index: 12; text-shadow: 1px 1px #fff; }
        #weapon-selector { position: absolute; top: 20px; right: 20px; display: flex; flex-direction: column; gap: 8px; z-index: 30; }
        #weapon-selector button { background: var(--ui-bg); border: 1px solid #666; color: #fff; padding: 12px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        #weapon-selector button.active { background: #f00; border-color: #fff; }
        #controls-right { position: absolute; bottom: 30px; right: 30px; display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 30; }
        .action-btn { width: 90px; height: 90px; border-radius: 50%; border: 2px solid rgba(0,0,0,0.5); font-weight: bold; font-size: 16px; display: flex; justify-content: center; align-items: center; color: white; background: rgba(0,0,0,0.4); }
        #fire-btn { background: rgba(255, 0, 0, 0.6); }
        #joystick-base { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; background: rgba(0,0,0,0.1); border-radius: 50%; display: none; z-index: 15; border: 2px solid rgba(0,0,0,0.2); }
        #joystick-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: rgba(0,0,0,0.3); border-radius: 50%; }
        #damage-flash { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 50; transition: background 0.1s; }
        #suppression { position: absolute; width: 100%; height: 100%; pointer-events: none; box-shadow: inset 0 0 0px rgba(0,0,0,0); transition: box-shadow 0.3s; z-index: 49; }
        #start-overlay { position: absolute; width: 100%; height: 100%; background: #fff; display: flex; justify-content: center; align-items: center; color: #000; z-index: 100; text-align: center; font-weight: bold; }
    </style>
</head>
<body>
    <div id="damage-flash"></div>
    <div id="suppression"></div>
    <div id="start-overlay" onclick="start()">[ DAYLIGHT OPERATION ]<br><br>TOUCH TO DEPLOY</div>
    <div id="kill-feed"></div>
    <div id="msg"></div>
    <div id="crosshair"></div>
    <div id="ui">
        PHASE: <span id="phase">-</span><br>
        GOAL: <span id="objective">-</span><br>
        WEAPON: <span id="weapon-name">-</span><br>
        AMMO: <span id="ammo">-</span> / <span id="max-ammo">-</span><br>
        SCORE: <span id="score">0</span>
    </div>
    <div id="weapon-selector">
        <button id="btn-1" class="active">ASh-12</button>
        <button id="btn-2">HK416</button>
        <button id="btn-3">AS VAL</button>
        <button id="btn-4">Type 95</button>
        <button id="btn-5">AT4</button>
    </div>
    <div id="controls-right"><div id="ads-btn" class="action-btn">ADS</div><div id="reload-btn" class="action-btn">RELOAD</div><div id="fire-btn" class="action-btn">FIRE</div></div>
    <div id="joystick-base"><div id="joystick-stick"></div></div>

    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>
    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xd1d9e0);
        scene.fog = new THREE.Fog(0xd1d9e0, 100, 500);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.8); scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 1.2); sun.position.set(50, 100, 50); scene.add(sun);
        const muzzleLight = new THREE.PointLight(0xffaa44, 0, 15); scene.add(muzzleLight);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(2000, 2000), new THREE.MeshStandardMaterial({ color: 0x888888 }));
        floor.rotation.x = -Math.PI / 2; scene.add(floor);

        const obstacles = [];
        for(let i=0; i<35; i++) {
            const h = Math.random()*20+10;
            const b = new THREE.Mesh(new THREE.BoxGeometry(8, h, 8), new THREE.MeshStandardMaterial({color: 0x555555}));
            b.position.set(Math.random()*300-150, h/2, -Math.random()*250-20);
            scene.add(b);
            obstacles.push({pos: b.position.clone(), size: 4.5});
        }

        const gunContainer = new THREE.Group(); camera.add(gunContainer); scene.add(camera);
        const bodyG = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.16, 0.7), new THREE.MeshStandardMaterial({ color: 0x222222 }));
        bodyG.position.set(0.25, -0.25, -0.45); gunContainer.add(bodyG);

        const weapons = {
            '1': { name: "ASh-12", ammo: 20, maxAmmo: 20, rpm: 400, speed: 8, damage: 120, recoil: { y: 0.5, x: 0.1, speed: 0.1 } },
            '2': { name: "HK416", ammo: 30, maxAmmo: 30, rpm: 800, speed: 10, damage: 32, recoil: { y: 0.18, x: 0.05, speed: 0.2 } },
            '3': { name: "AS VAL", ammo: 20, maxAmmo: 20, rpm: 900, speed: 6, damage: 45, gravity: 0.01, recoil: { y: 0.1, x: 0.02, speed: 0.25 } },
            '4': { name: "Type 95", ammo: 30, maxAmmo: 30, rpm: 650, speed: 9, damage: 38, recoil: { y: 0.12, x: 0, speed: 0.15 } },
            '5': { name: "AT4", ammo: 1, maxAmmo: 1, rpm: 60, speed: 2.5, damage: 1200, isRocket: true, recoil: { y: 1.5, x: 0, speed: 0.05 } }
        };

        let currentWep = weapons['1'], score = 0, phase = 1, isReloading = false, isFiring = false, isStarted = false;
        let phaseKills = 0, reloadProgress = 0, camImpact = 0, suppressionLevel = 0;
        const bullets = [], enemyBullets = [], bots = [], vehicles = [], effects = [], shells = [];
        let isADS = false, lon = 0, lat = 0, moveX = 0, moveZ = 0, currentRecoilY = 0, currentRecoilX = 0;
        let moveTouchId = null, lookTouchId = null, touchStartX = 0, touchStartY = 0, lookPrevX = 0, lookPrevY = 0;

        function updateUI() {
            document.getElementById('weapon-name').innerText = currentWep.name;
            document.getElementById('ammo').innerText = currentWep.ammo;
            document.getElementById('max-ammo').innerText = currentWep.maxAmmo;
            document.getElementById('score').innerText = score;
            const phaseMap = {1: "INFILTRATION", 2: "INVASION", 3: "EXTRACTION", 4: "FINISHED"};
            const objectives = {1: `KILLS: ${phaseKills}/10`, 2: `VEHICLES: ${phaseKills}/4`, 3: `ELIMINATE TANK`, 4: "COMPLETE"};
            document.getElementById('phase').innerText = phaseMap[phase];
            document.getElementById('objective').innerText = objectives[phase];
        }

        function triggerHitMarker() {
            const ch = document.getElementById('crosshair'); ch.classList.add('hit');
            setTimeout(() => ch.classList.remove('hit'), 100);
        }

        function addKillFeed(msg) {
            const feed = document.getElementById('kill-feed');
            const item = document.createElement('div');
            item.innerHTML = `<span style="color:red">●</span> ${msg}`;
            feed.prepend(item); setTimeout(() => item.remove(), 3000);
        }

        ['1','2','3','4','5'].forEach(id => {
            document.getElementById('btn-'+id).addEventListener('touchstart', (e) => { 
                e.preventDefault(); if(!isReloading) { currentWep = weapons[id]; updateUI(); 
                document.querySelectorAll('#weapon-selector button').forEach(b => b.classList.remove('active'));
                document.getElementById('btn-'+id).classList.add('active'); }
            });
        });

        function showMessage(txt, time=2000) {
            const m = document.getElementById('msg'); m.innerText = txt; m.style.display = 'block';
            setTimeout(() => m.style.display = 'none', time);
        }

        function createExplosion(pos, color=0xffaa00, size=1.5) {
            for(let i=0; i<8; i++) {
                const s = new THREE.Mesh(new THREE.SphereGeometry(size * 0.4, 6, 6), new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.8 }));
                s.position.copy(pos).add(new THREE.Vector3(Math.random()-0.5, Math.random()-0.5, Math.random()-0.5).multiplyScalar(size));
                scene.add(s); effects.push({ obj: s, life: 1.0, scale: 0.05 });
            }
        }

        function spawnShell() {
            const shell = new THREE.Mesh(new THREE.BoxGeometry(0.02, 0.02, 0.06), new THREE.MeshStandardMaterial({ color: 0xffcc33, metalness: 0.5 }));
            const right = new THREE.Vector3(1, 0.5, 0).applyQuaternion(camera.quaternion);
            shell.position.copy(camera.position).add(right.clone().multiplyScalar(0.3));
            shell.userData = { vel: right.multiplyScalar(0.05).add(new THREE.Vector3(0, 0.1, 0)), rot: new THREE.Vector3(Math.random(), Math.random(), Math.random()) };
            scene.add(shell); shells.push(shell); if(shells.length > 20) scene.remove(shells.shift());
        }

        function shoot() {
            const now = performance.now();
            if (now - (currentWep.lastFire || 0) < 60000/currentWep.rpm || currentWep.ammo <= 0 || isReloading) return;
            currentWep.lastFire = now; currentWep.ammo--; updateUI();
            muzzleLight.intensity = 20; muzzleLight.position.copy(camera.position).add(new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion));
            spawnShell();
            let adsMult = isADS ? 0.3 : 1.0;
            currentRecoilY += currentWep.recoil.y * adsMult;
            currentRecoilX += (Math.random()-0.5) * currentWep.recoil.x;
            camImpact = 0.03;
            const b = new THREE.Mesh(new THREE.SphereGeometry(currentWep.isRocket ? 0.25 : 0.08, 8, 8), new THREE.MeshBasicMaterial({ color: currentWep.isRocket?0xff4400:0xffff00 }));
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            b.position.copy(camera.position).add(dir.clone().multiplyScalar(1.2));
            b.userData = { velocity: dir.multiplyScalar(currentWep.speed), damage: currentWep.damage, gravity: currentWep.gravity || 0, isRocket: currentWep.isRocket };
            scene.add(b); bullets.push(b);
        }

        function spawnBot() {
            const g = new THREE.Group();
            const b = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.8, 0.4), new THREE.MeshStandardMaterial({ color: 0x111111 }));
            g.add(b); 
            // プレイヤーの前方かつ少しランダムな位置
            const dist = 50 + Math.random() * 30;
            const spread = (Math.random()-0.5) * 60;
            const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
            const right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);
            g.position.copy(camera.position).addScaledVector(forward, dist).addScaledVector(right, spread);
            g.position.y = 0.9;
            g.userData = { hp: 100 }; scene.add(g); bots.push(g);
        }

        function spawnVehicle(type) {
            const group = new THREE.Group();
            const x = (Math.random()-0.5) * 100;
            if(type === 'boat') {
                const hull = new THREE.Mesh(new THREE.BoxGeometry(7, 2.5, 14), new THREE.MeshStandardMaterial({color: 0x333333}));
                group.add(hull); group.position.set(x, 1.25, -200); group.userData = { type: 'boat', hp: 500 };
            } else if(type === 'heli') {
                const body = new THREE.Mesh(new THREE.BoxGeometry(5, 3.5, 12), new THREE.MeshStandardMaterial({color: 0x333333}));
                group.add(body); group.position.set(x, 40, -250); group.userData = { type: 'heli', hp: 350 };
            } else if(type === 'tank') {
                const base = new THREE.Mesh(new THREE.BoxGeometry(14, 6, 18), new THREE.MeshStandardMaterial({color: 0x222222}));
                const turret = new THREE.Mesh(new THREE.BoxGeometry(7, 3, 7), new THREE.MeshStandardMaterial({color: 0x222222}));
                turret.position.y = 4.5; group.add(base, turret); group.position.set(0, 3, -300); group.userData = { type: 'tank', hp: 4000 };
            }
            group.userData.lastShoot = 0; scene.add(group); vehicles.push(group);
        }

        window.start = () => { document.getElementById('start-overlay').style.display = 'none'; isStarted = true; updateUI(); };

        // 入力制御 (省略なしの完全版)
        window.addEventListener('touchstart', (e) => {
            for (let t of e.changedTouches) {
                if (t.clientX < window.innerWidth/2 && moveTouchId === null) {
                    moveTouchId = t.identifier; touchStartX = t.clientX; touchStartY = t.clientY;
                    document.getElementById('joystick-base').style.display = 'block';
                    document.getElementById('joystick-base').style.left = (t.clientX-60)+'px';
                    document.getElementById('joystick-base').style.top = (t.clientY-60)+'px';
                } else if (lookTouchId === null) { lookTouchId = t.identifier; lookPrevX = t.clientX; lookPrevY = t.clientY; }
            }
        });
        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let t of e.changedTouches) {
                if (t.identifier === moveTouchId) {
                    let dx = t.clientX - touchStartX, dy = t.clientY - touchStartY;
                    const dist = Math.min(Math.sqrt(dx*dx+dy*dy), 50); const ang = Math.atan2(dy, dx);
                    document.getElementById('joystick-stick').style.transform = `translate(${Math.cos(ang)*dist}px, ${Math.sin(ang)*dist}px)`;
                    moveX = Math.cos(ang)*(dist/50); moveZ = Math.sin(ang)*(dist/50);
                }
                if (t.identifier === lookTouchId) {
                    let s = isADS ? 0.002 : 0.005;
                    lon -= (t.clientX - lookPrevX) * s; lat -= (t.clientY - lookPrevY) * s;
                    lat = Math.max(-1.4, Math.min(1.4, lat)); lookPrevX = t.clientX; lookPrevY = t.clientY;
                }
            }
        }, { passive: false });
        window.addEventListener('touchend', (e) => {
            for (let t of e.changedTouches) {
                if (t.identifier === moveTouchId) { moveTouchId = null; moveX = 0; moveZ = 0; document.getElementById('joystick-base').style.display='none'; }
                if (t.identifier === lookTouchId) lookTouchId = null;
            }
        });

        document.getElementById('fire-btn').addEventListener('touchstart', (e) => { e.preventDefault(); isFiring = true; });
        document.getElementById('fire-btn').addEventListener('touchend', (e) => { e.preventDefault(); isFiring = false; });
        document.getElementById('ads-btn').addEventListener('touchstart', (e) => { e.preventDefault(); isADS = !isADS; e.target.classList.toggle('active', isADS); });
        document.getElementById('reload-btn').addEventListener('touchstart', (e) => { if(isReloading || currentWep.ammo === currentWep.maxAmmo) return; isReloading = true; reloadProgress = 0; });

        function animate() {
            requestAnimationFrame(animate);
            if(!isStarted) return;
            const now = performance.now();
            muzzleLight.intensity *= 0.5; camImpact *= 0.85; suppressionLevel = Math.max(0, suppressionLevel - 0.01);
            document.getElementById('suppression').style.boxShadow = `inset 0 0 ${suppressionLevel * 150}px rgba(0,0,0,0.5)`;

            let shake = (Math.random()-0.5) * (camImpact + suppressionLevel * 0.05);
            currentRecoilY *= (1 - currentWep.recoil.speed); currentRecoilX *= (1 - currentWep.recoil.speed);
            camera.quaternion.setFromEuler(new THREE.Euler(lat + currentRecoilY + shake, lon + currentRecoilX + shake, 0, 'YXZ'));
            camera.fov = THREE.MathUtils.lerp(camera.fov, isADS ? 35 : 75, 0.2); camera.updateProjectionMatrix();

            // 武器のアニメーション
            let rP = new THREE.Vector3(0,0,0), rR = new THREE.Euler(0,0,0);
            if(isReloading) {
                reloadProgress += 0.02; const t = reloadProgress;
                if(t < 0.5) { rP.set(0.1, -0.3, 0); rR.set(-0.5, 0.5, 0.5); }
                else if(t < 1.0) { rP.set(0.1*(1-(t-0.5)*2), -0.3*(1-(t-0.5)*2), 0); }
                else { isReloading = false; currentWep.ammo = currentWep.maxAmmo; updateUI(); }
            } else if(moveTouchId && !isADS && !isFiring) { rP.set(0.3, -0.2, -0.2); rR.set(-0.8, -0.4, 0.8); }

            gunContainer.position.lerp(new THREE.Vector3(isADS?-0.25:0, isADS?0.16:0, 0).add(rP), 0.15);
            gunContainer.rotation.x = THREE.MathUtils.lerp(gunContainer.rotation.x, rR.x, 0.15);

            if (isFiring) shoot();
            if (moveTouchId) {
                const f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y = 0; f.normalize();
                const r = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion); r.y = 0; r.normalize();
                camera.position.addScaledVector(f, -moveZ*0.25).addScaledVector(r, moveX*0.25);
            }

            // --- 重要：スポーン管理システム ---
            if(phase === 1) {
                if(bots.length < 6 && phaseKills < 10) spawnBot();
                if(phaseKills >= 10) { 
                    bots.forEach(b => scene.remove(b)); bots.length = 0; 
                    phase = 2; phaseKills = 0; showMessage("PHASE 2: VEHICLE HUNT", 3000); updateUI();
                }
            } else if(phase === 2) {
                if(vehicles.length < 2 && phaseKills < 4) spawnVehicle(Math.random()>0.5?'boat':'heli');
                if(phaseKills >= 4) {
                    vehicles.forEach(v => scene.remove(v)); vehicles.length = 0;
                    phase = 3; phaseKills = 0; showMessage("FINAL BOSS: TANK", 3000); spawnVehicle('tank'); updateUI();
                }
            }

            // 弾丸の処理
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i]; b.userData.velocity.y -= b.userData.gravity; b.position.add(b.userData.velocity);
                let hit = false;
                bots.forEach((bot, bIdx) => {
                    if (b.position.distanceTo(bot.position) < 1.6) {
                        bot.userData.hp -= b.userData.damage; hit = true; triggerHitMarker();
                        if(bot.userData.hp <= 0) { createExplosion(bot.position, 0x550000, 1.2); scene.remove(bot); bots.splice(bIdx, 1); score += 100; phaseKills++; updateUI(); addKillFeed("KIA"); }
                    }
                });
                vehicles.forEach((v, vIdx) => {
                    if (b.position.distanceTo(v.position) < (v.userData.type==='tank'?10:6)) {
                        v.userData.hp -= b.userData.damage; hit = true; triggerHitMarker();
                        if(v.userData.hp <= 0) { createExplosion(v.position, 0xff6600, 5); scene.remove(v); vehicles.splice(vIdx, 1); score += 500; phaseKills++; updateUI(); addKillFeed("DESTROYED"); }
                    }
                });
                if(hit || b.position.y < 0) { if(b.userData.isRocket) createExplosion(b.position, 0xff4400, 4); scene.remove(b); bullets.splice(i, 1); }
            }

            // 敵の行動
            bots.forEach(bot => {
                const d = new THREE.Vector3().subVectors(camera.position, bot.position); d.y = 0;
                bot.position.add(d.normalize().multiplyScalar(0.08));
                if(now % 2000 < 20) { // 簡易的な射撃
                    const eb = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({color:0xff0000}));
                    eb.position.copy(bot.position); eb.userData={velocity:d.normalize().multiplyScalar(0.8)};
                    scene.add(eb); enemyBullets.push(eb);
                }
            });

            enemyBullets.forEach((eb, i) => {
                eb.position.add(eb.userData.velocity);
                if(eb.position.distanceTo(camera.position) < 2) {
                    scene.remove(eb); enemyBullets.splice(i, 1);
                    document.getElementById('damage-flash').style.background="rgba(255,0,0,0.3)";
                    setTimeout(()=>document.getElementById('damage-flash').style.background="transparent",100);
                }
            });

            effects.forEach((e, i) => { e.life -= 0.02; e.obj.material.opacity = e.life; if(e.life <= 0) { scene.remove(e.obj); effects.splice(i, 1); } });
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
