<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>オンライン銃撃戦〜fire up 3D〜</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #ba5b1c; font-family: sans-serif; }
        #ui {
            position: absolute; top: 10px; left: 10px; color: white;
            background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px;
            pointer-events: none;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px; border: 2px solid #0f0;
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="ui">
    <div id="nameDisplay">Player: -</div>
    <div id="hpDisplay">HP: 100</div>
    <div id="weaponDisplay">Weapon: Handgun</div>
</div>
<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>

<script>
    // --- 1. 設定と初期化 ---
    const playerName = prompt("あなたの名前を入力してください", "guest_" + Math.floor(Math.random()*1000)) || "guest";
    const gameName = prompt("部屋の名前を入力してください（空欄でpublic）") || "public";
    const pcolor = prompt("色（red, blue, greenなど）", "blue") || "blue";
    const playerId = Math.random().toString(36).substr(2, 9);

    document.getElementById('nameDisplay').innerText = `Player: ${playerName}`;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xba5b1c);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 3000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // --- 2. 操作系（設定完了後に自動ロックを試行） ---
    const controls = new THREE.PointerLockControls(camera, document.body);
    
    // ブラウザの仕様上、ユーザー操作（クリック等）が必要な場合があるため、
    // 最初の1回だけ画面をクリックしてもらう必要がありますが、それ以降は自動で進みます。
    window.onload = () => {
        alert("準備ができました。OKを押した後、画面をクリックして対戦開始です！");
    };

    // --- 3. ステージ構成（2Dの壁データを反映） ---
    const wallsData = [
        { x: 50, y: 50, w: 400, h: 20 },
        { x: 50, y: 50, w: 20, h: 400 },
        { x: 500, y: 200, w: 20, h: 300 }
    ];

    const wallMaterial = new THREE.MeshPhongMaterial({ color: 0x808080 });
    wallsData.forEach(w => {
        const geo = new THREE.BoxGeometry(w.w, 60, w.h);
        const mesh = new THREE.Mesh(geo, wallMaterial);
        // 2Dのx, yを3Dのx, zに変換
        mesh.position.set(w.x + w.w/2, 30, w.y + w.h/2);
        scene.add(mesh);
    });

    const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
    scene.add(light);
    const grid = new THREE.GridHelper(2000, 50, 0x000000, 0x000000);
    scene.add(grid);

    // --- 4. オンライン同期 (Achex) ---
    const socket = new WebSocket('wss://cloud.achex.ca/yajusenpaiikisug1');
    const enemies = {};

    socket.onopen = () => {
        socket.send(JSON.stringify({auth: playerId, password: "pass"}));
        socket.send(JSON.stringify({joinHub: gameName}));
    };

    socket.onmessage = (event) => {
        const json = JSON.parse(event.data);
        if (!json.msg) return;
        const data = JSON.parse(json.msg);

        if (data.id && data.id !== playerId) {
            if (!enemies[data.id]) {
                const geo = new THREE.BoxGeometry(20, 40, 20);
                const mat = new THREE.MeshPhongMaterial({ color: data.color || 'red' });
                const mesh = new THREE.Mesh(geo, mat);
                scene.add(mesh);
                enemies[data.id] = mesh;
            }
            enemies[data.id].position.set(data.x, 20, data.z);
        }
    };

    // --- 5. 移動とループ ---
    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    document.addEventListener('keydown', (e) => {
        if (e.code === 'KeyW' || e.code === 'ArrowUp') moveForward = true;
        if (e.code === 'KeyS' || e.code === 'ArrowDown') moveBackward = true;
        if (e.code === 'KeyA' || e.code === 'ArrowLeft') moveLeft = true;
        if (e.code === 'KeyD' || e.code === 'ArrowRight') moveRight = true;
    });
    document.addEventListener('keyup', (e) => {
        if (e.code === 'KeyW' || e.code === 'ArrowUp') moveForward = false;
        if (e.code === 'KeyS' || e.code === 'ArrowDown') moveBackward = false;
        if (e.code === 'KeyA' || e.code === 'ArrowLeft') moveLeft = false;
        if (e.code === 'KeyD' || e.code === 'ArrowRight') moveRight = false;
    });

    const clock = new THREE.Clock();
    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();

        if (controls.isLocked) {
            const speed = 300 * delta;
            if (moveForward) controls.moveForward(speed);
            if (moveBackward) controls.moveForward(-speed);
            if (moveLeft) controls.moveRight(-speed);
            if (moveRight) controls.moveRight(speed);

            // 位置を送信
            if (socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({
                    toH: gameName,
                    msg: JSON.stringify({
                        id: playerId,
                        x: camera.position.x,
                        z: camera.position.z,
                        color: pcolor
                    })
                }));
            }
        }
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
