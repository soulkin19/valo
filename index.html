<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VALORANT 2D - TACTICAL</title>
    <style>
        body { margin: 0; background: #0f1923; overflow: hidden; font-family: 'Courier New', Courier, monospace; touch-action: none; -webkit-user-select: none; }
        #hud { position: absolute; width: 100%; height: 100%; pointer-events: none; }
        
        /* ミニマップ */
        #minimap { position: absolute; top: 20px; right: 20px; width: 150px; height: 150px; background: rgba(15, 25, 35, 0.8); border: 2px solid #ff4655; border-radius: 4px; }
        
        /* ステータス */
        .status-container { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 50px; align-items: flex-end; }
        .stat-box { background: rgba(15, 25, 35, 0.9); padding: 10px 40px; border-bottom: 5px solid #ff4655; color: white; }
        .label { font-size: 12px; color: #8b978f; }
        .value { font-size: 40px; font-weight: bold; }

        #flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; transition: opacity 0.1s; }
        #crosshair { position: absolute; pointer-events: none; color: #00ff00; font-size: 20px; transform: translate(-50%, -50%); }
    </style>
</head>
<body>
    <div id="flash"></div>
    <div id="crosshair">+</div>
    <canvas id="gameCanvas"></canvas>
    
    <div id="hud">
        <div id="minimap"></div>
        <div class="status-container">
            <div class="stat-box">
                <div class="label">HEALTH</div>
                <div id="hp-val" class="value">100</div>
            </div>
            <div class="stat-box">
                <div class="label">VANDAL</div>
                <div id="ammo-val" class="value">25</div>
            </div>
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hpEl = document.getElementById('hp-val');
const ammoEl = document.getElementById('ammo-val');
const crosshair = document.getElementById('crosshair');

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.onresize = resize; resize();

// --- ゲームデータ ---
let player = { x: 200, y: 300, r: 15, hp: 100, ammo: 25, angle: 0, recoil: 0, isMoving: false };
let targetAngle = 0;
let bots = [
    {x: 1400, y: 300, hp: 100, reaction: 0, state: 'camp'},
    {x: 1000, y: 800, hp: 100, reaction: 0, state: 'camp'}
];
let walls = [
    {x: 600, y: 0, w: 60, h: 400}, {x: 600, y: 600, w: 60, h: 600},
    {x: 900, y: 300, w: 300, h: 60}, {x: 400, y: 700, w: 60, h: 400}
];
let bullets = [], smokes = [], keys = {}, pointer = {x: 0, y: 0};

// --- iPad/PC 共通入力制御 ---
window.addEventListener('pointermove', (e) => {
    pointer.x = e.clientX; pointer.y = e.clientY;
    crosshair.style.left = e.clientX + 'px';
    crosshair.style.top = e.clientY + 'px';
});

// 射撃（iPadのタップ、PCのクリック両対応）
window.addEventListener('pointerdown', (e) => {
    if (player.ammo > 0 && player.hp > 0) {
        shoot();
        player.ammo--;
        ammoEl.innerText = player.ammo;
    }
});

window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

function shoot() {
    const angle = Math.atan2(pointer.y - player.y, pointer.x - player.x);
    // 反動計算：撃つほど上にズレる
    const recoilOffset = (player.recoil * 0.04);
    const spread = (player.isMoving ? 0.15 : 0.01) + (player.recoil * 0.02);
    const finalAngle = angle - recoilOffset + (Math.random() - 0.5) * spread;

    bullets.push({
        x: player.x, y: player.y,
        vx: Math.cos(finalAngle) * 30,
        vy: Math.sin(finalAngle) * 30,
        owner: 'player'
    });
    player.recoil = Math.min(player.recoil + 1.5, 10);
}

// --- ロジック ---
function update() {
    if (player.hp <= 0) return;

    // エイム方向の更新
    player.angle = Math.atan2(pointer.y - player.y, pointer.x - player.x);

    // 移動
    let dx = 0, dy = 0;
    const speed = keys['shift'] ? 2 : 4;
    if (keys['w']) dy -= speed; if (keys['s']) dy += speed;
    if (keys['a']) dx -= speed; if (keys['d']) dx += speed;

    player.isMoving = dx !== 0 || dy !== 0;
    if (!player.isMoving) player.recoil = Math.max(0, player.recoil - 0.3);

    // 衝突判定
    const isWall = (x, y) => walls.some(w => x > w.x && x < w.x+w.w && y > w.y && y < w.y+w.h);
    if (!isWall(player.x + dx, player.y)) player.x += dx;
    if (!isWall(player.x, player.y + dy)) player.y += dy;

    // BOT AI
    bots.forEach(bot => {
        if (bot.hp <= 0) return;
        const dist = Math.hypot(player.x - bot.x, player.y - bot.y);
        const canSee = !walls.some(w => lineRectIntersect(bot.x, bot.y, player.x, player.y, w));

        if (canSee && dist < 600) {
            bot.reaction++;
            if (bot.reaction > 20) { // 反応速度
                const ang = Math.atan2(player.y - bot.y, player.x - bot.x);
                bullets.push({ x: bot.x, y: bot.y, vx: Math.cos(ang)*12, vy: Math.sin(ang)*12, owner: 'bot' });
                bot.reaction = 0;
            }
        } else {
            bot.reaction = 0;
        }
    });

    // 弾丸の処理
    bullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;
        if (isWall(b.x, b.y)) bullets.splice(i, 1);
        if (b.owner === 'player') {
            bots.forEach(bot => {
                if (bot.hp > 0 && Math.hypot(b.x - bot.x, b.y - bot.y) < 20) {
                    bot.hp -= 40; bullets.splice(i, 1);
                }
            });
        } else {
            if (Math.hypot(b.x - player.x, b.y - player.y) < 15) {
                player.hp -= 25; bullets.splice(i, 1);
                hpEl.innerText = Math.max(0, player.hp);
            }
        }
    });
}

// 線と矩形の衝突判定（視線用）
function lineRectIntersect(x1, y1, x2, y2, r) {
    const left = lineLine(x1, y1, x2, y2, r.x, r.y, r.x, r.y + r.h);
    const right = lineLine(x1, y1, x2, y2, r.x + r.w, r.y, r.x + r.w, r.y + r.h);
    const top = lineLine(x1, y1, x2, y2, r.x, r.y, r.x + r.w, r.y);
    const bottom = lineLine(x1, y1, x2, y2, r.x, r.y + r.h, r.x + r.w, r.y + r.h);
    return left || right || top || bottom;
}
function lineLine(x1, y1, x2, y2, x3, y3, x4, y4) {
    let uA = ((x4-x3)*(y1-y3) - (y4-y3)*(x1-x3)) / ((y4-y3)*(x2-x1) - (x4-x3)*(y2-y1));
    let uB = ((x2-x1)*(y1-y3) - (y2-y1)*(x1-x3)) / ((y4-y3)*(x2-x1) - (x4-x3)*(y2-y1));
    return (uA >= 0 && uA <= 1 && uB >= 0 && uB <= 1);
}

// --- 描画 ---
function draw() {
    ctx.fillStyle = '#0f1923';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // グリッド背景
    ctx.strokeStyle = '#1a252e';
    for(let i=0; i<canvas.width; i+=50) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
    for(let i=0; i<canvas.height; i+=50) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }

    // 壁
    ctx.fillStyle = '#2d3741';
    walls.forEach(w => {
        ctx.fillRect(w.x, w.y, w.w, w.h);
        ctx.strokeStyle = '#ff4655'; ctx.strokeRect(w.x, w.y, w.w, w.h);
    });

    // プレイヤー
    if (player.hp > 0) {
        ctx.save();
        ctx.translate(player.x, player.y);
        ctx.rotate(player.angle);
        ctx.fillStyle = '#00eeff';
        ctx.beginPath(); ctx.arc(0, 0, player.r, 0, Math.PI*2); ctx.fill();
        // 向き
        ctx.fillStyle = 'white'; ctx.fillRect(10, -2, 15, 4);
        ctx.restore();
    }

    // BOT
    bots.forEach(bot => {
        if (bot.hp <= 0) return;
        ctx.fillStyle = '#ff4655';
        ctx.beginPath(); ctx.arc(bot.x, bot.y, 20, 0, Math.PI*2); ctx.fill();
        // HPバー
        ctx.fillStyle = '#555'; ctx.fillRect(bot.x-20, bot.y-35, 40, 5);
        ctx.fillStyle = '#ff4655'; ctx.fillRect(bot.x-20, bot.y-35, 40*(bot.hp/100), 5);
    });

    // 弾丸
    ctx.fillStyle = '#fff200';
    bullets.forEach(b => ctx.fillRect(b.x-2, b.y-2, 4, 4));

    // フォグ・オブ・ウォー（視界の外を暗く）
    const grad = ctx.createRadialGradient(player.x, player.y, 100, player.x, player.y, 600);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, 'rgba(15,25,35,0.8)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
