<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Survival Square</title>
    <style>
        body { margin: 0; background: #222; color: white; display: flex; flex-direction: column; align-items: center; font-family: sans-serif; overflow: hidden; }
        canvas { border: 4px solid #fff; background: #000; margin-top: 20px; cursor: none; }
        .info { text-align: center; margin-top: 10px; }
        h1 { margin: 10px; color: #00ffcc; text-shadow: 0 0 10px #00ffcc; }
    </style>
</head>
<body>

    <h1>SURVIVAL SQUARE</h1>
    <div class="info">
        マウスで自機(青)を動かして、赤い敵を避けろ！<br>
        Score: <span id="score">0</span>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        canvas.width = 600;
        canvas.height = 400;

        let score = 0;
        let gameActive = true;

        // 自機のデータ
        const player = { x: 300, y: 200, size: 20, color: "#0095DD" };

        // 敵のデータ
        const enemies = [];
        const enemySpeed = 2;

        // マウス移動で自機を動かす
        window.addEventListener("mousemove", (e) => {
            const rect = canvas.getBoundingClientRect();
            player.x = e.clientX - rect.left - player.size / 2;
            player.y = e.clientY - rect.top - player.size / 2;
        });

        // 敵の生成
        function spawnEnemy() {
            const size = Math.random() * 30 + 10;
            const x = Math.random() * (canvas.width - size);
            enemies.push({ x: x, y: -size, size: size, speed: Math.random() * 3 + 2 });
        }

        // 衝突判定
        function checkCollision(p, e) {
            return p.x < e.x + e.size &&
                   p.x + p.size > e.x &&
                   p.y < e.y + e.size &&
                   p.y + p.size > e.y;
        }

        function update() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 自機の描画
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);

            // 敵の更新と描画
            for (let i = 0; i < enemies.length; i++) {
                let e = enemies[i];
                e.y += e.speed;

                ctx.fillStyle = "#ff4d4d";
                ctx.fillRect(e.x, e.y, e.size, e.size);

                // 衝突チェック
                if (checkCollision(player, e)) {
                    gameActive = false;
                    alert("Game Over! Score: " + score);
                    location.reload();
                }

                // 画面外に出たら消去
                if (e.y > canvas.height) {
                    enemies.splice(i, 1);
                    score++;
                    scoreElement.innerText = score;
                    i--;
                }
            }

            requestAnimationFrame(update);
        }

        // 1秒ごとに敵を増やす
        setInterval(() => {
            if (gameActive) spawnEnemy();
        }, 500);

        update();
    </script>
</body>
</html>
