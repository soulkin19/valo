<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mobile Flight Combat Sim</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; user-select: none; -webkit-user-select: none; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: none; }
        #hud { position: absolute; top: 10px; left: 10px; color: #0f0; pointer-events: none; text-shadow: 1px 1px 2px #000; font-size: 14px; }
        #joystick-left-container, #joystick-right-container { position: absolute; bottom: 30px; width: 120px; height: 120px; opacity: 0.6; }
        #joystick-left-container { left: 20px; }
        #joystick-right-container { right: 20px; }
        .fire-button { position: absolute; bottom: 180px; width: 60px; height: 60px; background-color: rgba(255, 0, 0, 0.5); border: 2px solid #fff; border-radius: 50%; color: #fff; font-size: 12px; display: flex; align-items: center; justify-content: center; touch-action: none; }
        #fire-main { right: 90px; }
        #fire-secondary { right: 20px; background-color: rgba(0, 0, 255, 0.5); }
        
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; z-index: 10; }
        #menu h1 { margin-bottom: 20px; }
        #menu h3 { margin-top: 20px; margin-bottom: 5px; }
        #menu select { padding: 10px; font-size: 16px; margin-bottom: 10px; width: 250px; background: #333; color: #fff; border: 1px solid #777; }
        #menu button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #f00; color: #fff; border: none; border-radius: 5px; margin-top: 30px; }
        
        #game-over { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 0, 0, 0.7); display: none; flex-direction: column; align-items: center; justify-content: center; color: #fff; z-index: 10; text-align: center; }
        #game-over h1 { font-size: 48px; }
    </style>
</head>
<body>

    <div id="menu">
        <h1>MOBILE FLIGHT COMBAT</h1>
        <h3>MAIN WEAPON</h3>
        <select id="main-weapon-select">
            <option value="20mm">20mm Cannon (Fast, Low DMG)</option>
            <option value="50mm">50mm Cannon (Slow, High DMG)</option>
        </select>
        <h3>SECONDARY WEAPON</h3>
        <select id="secondary-weapon-select">
            <option value="missile">Air-to-Air Missile (Homing)</option>
        </select>
        <button id="start-button">START GAME</button>
    </div>

    <div id="game-over">
        <h1>CRASH!</h1>
        <p>You died.</p>
        <button onclick="location.reload()">RETRY</button>
    </div>

    <div id="game-container">
        <div id="hud">
            SPEED: <span id="speed">0</span> km/h<br>
            ALT: <span id="alt">0</span> m<br>
            HEALTH: <span id="hp">100</span>%<br>
            BOT HP: <span id="bot-hp">100</span>%<br>
            MAIN AMMO: <span id="main-ammo">1000</span><br>
            SECONDARY: <span id="sec-ammo">4</span><br>
            TARGET: <span id="target-lock">-</span>
        </div>
        
        <div id="joystick-left-container"></div>
        <div id="joystick-right-container"></div>
        <div id="fire-main" class="fire-button">MAIN</div>
        <div id="fire-secondary" class="fire-button">SEC</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>

    <script>
        // --- 設定 ---
        const MAIN_WEAPONS = {
            '20mm': { rate: 0.1, damage: 2, speed: 200, ammo: 1000, spread: 0.01 },
            '50mm': { rate: 0.3, damage: 15, speed: 150, ammo: 300, spread: 0.02 }
        };
        const SECONDARY_WEAPONS = {
            'missile': { rate: 2, damage: 50, speed: 120, ammo: 4, homingSpeed: 0.04, lockRange: 300, life: 10 }
        };

        const PHYSICS = {
            gravity: 0.005,
            drag: 0.001,
            lift: 0.003,
            thrust: 0.015,
            mass: 1
        };

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // 青空
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 4000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('game-container').appendChild(renderer.domElement);

        // 照明
        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(100, 200, 100);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x606060));

        // 地面
        const groundSize = 10000;
        const groundGeometry = new THREE.PlaneGeometry(groundSize, groundSize, 10, 10);
        const groundMaterial = new THREE.MeshPhongMaterial({ color: 0x556b2f, side: THREE.DoubleSide, wireframe: false });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);
        // 地面にグリッド追加
        const grid = new THREE.GridHelper(groundSize, 100, 0x000000, 0x000000);
        grid.material.opacity = 0.2;
        grid.material.transparent = true;
        scene.add(grid);

        // --- クラス定義 ---

        class Aircraft extends THREE.Group {
            constructor(color) {
                super();
                this.hp = 100;
                this.maxSpeed = 2.0;
                this.velocity = new THREE.Vector3(0, 0, -0.5);
                this.mass = PHYSICS.mass;
                this.alive = true;
                
                // 簡易モデル
                const body = new THREE.Mesh(new THREE.BoxGeometry(1, 0.6, 4), new THREE.MeshPhongMaterial({color: color}));
                const wing = new THREE.Mesh(new THREE.BoxGeometry(5, 0.1, 1.2), new THREE.MeshPhongMaterial({color: color}));
                const rudder = new THREE.Mesh(new THREE.BoxGeometry(0.1, 1.5, 0.8), new THREE.MeshPhongMaterial({color: color}));
                rudder.position.set(0, 0.6, 1.5);
                this.add(body, wing, rudder);
                this.position.y = 100;

                // 排気パーティクル
                this.exhaustSystem = new ParticleSystem(0.05, 1000, 0.1, color === 0x333333 ? 0xaaaaaa : 0xffaaaa, true);
                this.add(this.exhaustSystem);
            }

            update(dt) {
                if (!this.alive) return;

                const thrust = this.thrustVal * PHYSICS.thrust;
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(this.quaternion);
                const up = new THREE.Vector3(0, 1, 0).applyQuaternion(this.quaternion);

                const speed = this.velocity.length();
                const dragForce = this.velocity.clone().normalize().multiplyScalar(-speed * speed * PHYSICS.drag);
                
                // 簡易揚力 (ピッチに依存)
                const pitchAngle = Math.asin(forward.y); // 上を向いている角度
                const lift = up.multiplyScalar(speed * speed * (PHYSICS.lift + Math.max(0, -pitchAngle * 0.05)));

                const gravity = new THREE.Vector3(0, -PHYSICS.gravity * this.mass, 0);

                // 加速度
                const force = forward.multiplyScalar(thrust).add(dragForce).add(gravity).add(lift);
                const accel = force.divideScalar(this.mass);
                this.velocity.add(accel);
                
                // 速度制限
                if (this.velocity.length() > this.maxSpeed) {
                    this.velocity.normalize().multiplyScalar(this.maxSpeed);
                }

                // 移動
                this.position.add(this.velocity);

                // 回転更新
                const rotation = new THREE.Vector3(this.pitch * 0.03, this.yaw * 0.02, this.roll * 0.04);
                this.rotateX(rotation.x);
                this.rotateY(rotation.y);
                this.rotateZ(rotation.roll || 0);
                if (this.roll) this.rotateOnAxis(new THREE.Vector3(0,0,1).applyQuaternion(this.quaternion), -this.roll * 0.05); // ロールでヨーも発生

                // 排気
                if (this.thrustVal > 0.1) {
                    const offset = new THREE.Vector3(0, 0, 2).applyQuaternion(this.quaternion);
                    this.exhaustSystem.addParticle(this.position.clone().add(offset));
                }
                this.exhaustSystem.update(dt);
            }

            die() {
                this.alive = false;
                explosionSystem.explode(this.position);
            }
        }

        class Player extends Aircraft {
            constructor() {
                super(0x333333);
                this.pitch = 0;
                this.roll = 0;
                this.yaw = 0;
                this.thrustVal = 0.5;
                this.mainWeapon = null;
                this.secondaryWeapon = null;
                this.mainAmmo = 0;
                this.secondaryAmmo = 0;
                this.lastMainFireTime = 0;
                this.lastSecondaryFireTime = 0;
            }

            fireMain() {
                const now = performance.now() / 1000;
                if (this.mainWeapon && this.mainAmmo > 0 && now - this.lastMainFireTime > this.mainWeapon.rate) {
                    const direction = new THREE.Vector3(
                        (Math.random() - 0.5) * this.mainWeapon.spread,
                        (Math.random() - 0.5) * this.mainWeapon.spread,
                        -1
                    ).applyQuaternion(this.quaternion).normalize();
                    const bullet = new Projectile(this.position.clone(), direction, this.mainWeapon.speed, this.mainWeapon.damage, 0x0f0, this);
                    projectiles.push(bullet);
                    scene.add(bullet);
                    this.mainAmmo--;
                    this.lastMainFireTime = now;
                }
            }

            fireSecondary() {
                const now = performance.now() / 1000;
                if (this.secondaryWeapon && this.secondaryAmmo > 0 && now - this.lastSecondaryFireTime > this.secondaryWeapon.rate) {
                    const target = findLockTarget(this.position, this.quaternion, this.secondaryWeapon.lockRange);
                    const direction = new THREE.Vector3(0, 0, -1).applyQuaternion(this.quaternion).normalize();
                    const missile = new Missile(this.position.clone(), direction, this.secondaryWeapon.speed, this.secondaryWeapon.damage, this, target);
                    projectiles.push(missile);
                    scene.add(missile);
                    this.secondaryAmmo--;
                    this.lastSecondaryFireTime = now;
                }
            }
        }

        class Bot extends Aircraft {
            constructor() {
                super(0xff0000);
                this.maxSpeed = 1.2;
                this.thrustVal = 0.4;
                this.mainWeapon = MAIN_WEAPONS['20mm'];
                this.lastFireTime = 0;
                this.alive = true;
            }
            
            update(dt) {
                if (!this.alive) return;
                
                // AI: 簡易追跡
                const directionToPlayer = player.position.clone().sub(this.position).normalize();
                this.lookAt(this.position.clone().add(directionToPlayer));
                this.thrustVal = 0.5;

                // 射撃AI
                const distance = this.position.distanceTo(player.position);
                const now = performance.now() / 1000;
                if (distance < 300 && now - this.lastFireTime > this.mainWeapon.rate && Math.random() < 0.1) {
                    const bullet = new Projectile(this.position.clone(), directionToPlayer, this.mainWeapon.speed, this.mainWeapon.damage, 0xf00, this);
                    projectiles.push(bullet);
                    scene.add(bullet);
                    this.lastFireTime = now;
                }

                super.update(dt);
            }
        }

        class Projectile extends THREE.Mesh {
            constructor(position, direction, speed, damage, color, owner, size=0.2) {
                const geometry = new THREE.BoxGeometry(size, size, 5);
                const material = new THREE.MeshBasicMaterial({ color: color });
                super(geometry, material);
                this.position.copy(position);
                this.lookAt(position.clone().add(direction));
                this.velocity = direction.multiplyScalar(speed);
                this.damage = damage;
                this.owner = owner;
                this.alive = true;
                this.life = 5; // 生命時間（秒）
                this.birthTime = performance.now() / 1000;
            }

            update(dt) {
                if (!this.alive) return;
                this.position.add(this.velocity.clone().multiplyScalar(dt));
                
                // 生命確認
                const now = performance.now() / 1000;
                if (now - this.birthTime > this.life) this.alive = false;
                
                // 激突判定（簡易、地面）
                if (this.position.y < 0) this.alive = false;
            }
        }

        class Missile extends Projectile {
            constructor(position, direction, speed, damage, owner, target) {
                super(position, direction, speed, damage, 0x00f, owner, 0.4);
                this.target = target;
                this.life = SECONDARY_WEAPONS['missile'].life;
                this.homingSpeed = SECONDARY_WEAPONS['missile'].homingSpeed;
                this.baseSpeed = speed;
                // ミサイル用モデル
                this.geometry = new THREE.CylinderGeometry(0.2, 0.2, 3, 8);
                this.rotation.x = Math.PI / 2;
                this.material = new THREE.MeshPhongMaterial({ color: 0xcccccc });
                
                // 排気パーティクル
                this.exhaustSystem = new ParticleSystem(0.08, 500, 0.2, 0xffff00, true);
                this.add(this.exhaustSystem);
            }

            update(dt) {
                if (!this.alive) return;
                
                if (this.target && this.target.alive) {
                    // 誘導
                    const directionToTarget = this.target.position.clone().sub(this.position).normalize();
                    const currentDir = this.velocity.clone().normalize();
                    const newDir = currentDir.lerp(directionToTarget, this.homingSpeed).normalize();
                    this.velocity = newDir.multiplyScalar(this.baseSpeed);
                    this.lookAt(this.position.clone().add(newDir));
                }
                
                super.update(dt);
                this.exhaustSystem.addParticle(this.position);
                this.exhaustSystem.update(dt);
            }
        }

        class ParticleSystem extends THREE.Group {
            constructor(size, maxParticles, life, color, additive=false) {
                super();
                this.particles = [];
                this.geometry = new THREE.SphereGeometry(size, 8, 8);
                this.material = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 1 });
                if (additive) this.material.blending = THREE.AdditiveBlending;
                this.maxParticles = maxParticles;
                this.life = life;
            }

            addParticle(position) {
                if (this.particles.length >= this.maxParticles) {
                    const p = this.particles.shift();
                    p.alive = false;
                    this.remove(p);
                }
                const p = new THREE.Mesh(this.geometry, this.material.clone());
                p.position.copy(position);
                p.alive = true;
                p.birthTime = performance.now() / 1000;
                p.velocity = new THREE.Vector3((Math.random()-0.5)*0.1, (Math.random()-0.5)*0.1, (Math.random()-0.5)*0.1);
                this.particles.push(p);
                this.add(p);
            }

            update(dt) {
                const now = performance.now() / 1000;
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const p = this.particles[i];
                    p.position.add(p.velocity.clone().multiplyScalar(dt));
                    const age = now - p.birthTime;
                    p.material.opacity = 1 - (age / this.life);
                    if (age > this.life) {
                        this.remove(p);
                        this.particles.splice(i, 1);
                    }
                }
            }
            
            explode(position) {
                for(let i=0; i<30; i++) {
                    this.addParticle(position.clone());
                }
            }
        }


        // --- 初期化 & 変数 ---

        let player;
        let bot;
        let projectiles = [];
        let inputLeft = { x: 0, y: 0 }; // ピッチ、ロール
        let inputRight = { x: 0, y: 0 }; // ヨー、スロットル
        let isMainFiring = false;
        let isSecondaryFiring = false;
        let explosionSystem;
        let gameActive = false;
        let lastTime = 0;

        // モバイル操作設定 (NippleJS)
        function setupJoysticks() {
            const leftManager = nipplejs.create({
                zone: document.getElementById('joystick-left-container'),
                mode: 'static',
                position: { left: '50%', top: '50%' },
                color: 'white',
                size: 100
            });
            leftManager.on('move', (evt, data) => {
                inputLeft = { x: data.vector.x, y: data.vector.y };
            });
            leftManager.on('end', () => inputLeft = { x: 0, y: 0 });

            const rightManager = nipplejs.create({
                zone: document.getElementById('joystick-right-container'),
                mode: 'static',
                position: { left: '50%', top: '50%' },
                color: 'white',
                size: 100
            });
            rightManager.on('move', (evt, data) => {
                inputRight = { x: data.vector.x, y: data.vector.y };
            });
            rightManager.on('end', () => inputRight = { x: 0, y: 0 });

            // 射撃ボタン
            document.getElementById('fire-main').addEventListener('touchstart', (e) => { e.preventDefault(); isMainFiring = true; });
            document.getElementById('fire-main').addEventListener('touchend', () => isMainFiring = false);
            document.getElementById('fire-secondary').addEventListener('touchstart', (e) => { e.preventDefault(); isSecondaryFiring = true; });
            document.getElementById('fire-secondary').addEventListener('touchend', () => isSecondaryFiring = false);
        }

        // ターゲットロックオン機能
        function findLockTarget(pos, quat, range) {
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(quat);
            let bestTarget = null;
            let bestAngle = Math.PI; // 最大180度
            
            // ボットが対象
            const direction = bot.position.clone().sub(pos);
            const distance = direction.length();
            if (distance < range && bot.alive) {
                const angle = forward.angleTo(direction.normalize());
                if (angle < Math.PI / 6) { // 前方30度
                    return bot;
                }
            }
            return null;
        }

        // ゲーム開始
        function startGame() {
            gameActive = true;
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            
            player = new Player();
            bot = new Bot();
            scene.add(player);
            scene.add(bot);
            
            // 武器選択
            const mainSelect = document.getElementById('main-weapon-select');
            const secSelect = document.getElementById('secondary-weapon-select');
            player.mainWeapon = MAIN_WEAPONS[mainSelect.value];
            player.secondaryWeapon = SECONDARY_WEAPONS[secSelect.value];
            player.mainAmmo = player.mainWeapon.ammo;
            player.secondaryAmmo = player.secondaryWeapon.ammo;
            
            explosionSystem = new ParticleSystem(1, 50, 1.5, 0xffaa00, true);
            scene.add(explosionSystem);
            
            setupJoysticks();
            lastTime = performance.now();
            animate();
        }


        // --- メインループ ---

        function animate() {
            if (!gameActive) return;
            const now = performance.now();
            const dt = Math.min((now - lastTime) / 1000, 0.1); // deltaTime (秒), 最大0.1s
            lastTime = now;

            // 1. プレイヤー入力処理
            player.pitch = inputLeft.y; // ジョイスティック上下でピッチ
            player.roll = -inputLeft.x;  // ジョイスティック左右でロール
            player.yaw = -inputRight.x;  // 右ジョイスティック左右でヨー
            player.thrustVal = Math.min(Math.max(inputRight.y * 1.5, 0), 1.0); // 右ジョイスティック上下でスロットル (0〜1)
            
            if (isMainFiring) player.fireMain();
            if (isSecondaryFiring) player.fireSecondary();

            // 2. 更新
            player.update(dt);
            bot.update(dt);
            for(let p of projectiles) p.update(dt);
            explosionSystem.update(dt);

            // 3. カメラ追従 (三人称)
            const relativeCameraOffset = new THREE.Vector3(0, 3, 10);
            const cameraOffset = relativeCameraOffset.applyMatrix4(player.matrixWorld);
            camera.position.lerp(cameraOffset, 0.1);
            camera.lookAt(player.position.clone().add(new THREE.Vector3(0, 1, -20).applyQuaternion(player.quaternion)));

            // 4. 当たり判定 & ゲーム状態
            for (let i = projectiles.length - 1; i >= 0; i--) {
                const p = projectiles[i];
                if (!p.alive) {
                    scene.remove(p);
                    projectiles.splice(i, 1);
                    continue;
                }

                // 弾丸 vs ボット
                if (p.owner === player && bot.alive && p.position.distanceTo(bot.position) < 2) {
                    bot.hp -= p.damage;
                    p.alive = false;
                    if (bot.hp <= 0) bot.die();
                }

                // 弾丸 vs プレイヤー
                if (p.owner === bot && player.alive && p.position.distanceTo(player.position) < 2) {
                    player.hp -= p.damage;
                    p.alive = false;
                    if (player.hp <= 0) player.die();
                }
            }

            // 地面激突判定
            if (player.alive && player.position.y <= 0.5) {
                player.die();
                gameActive = false;
                document.getElementById('game-over').style.display = 'flex';
                document.getElementById('hud').style.display = 'none';
            }
            if (bot.alive && bot.position.y <= 0.5) {
                bot.die();
            }

            // 5. HUD更新
            document.getElementById('speed').innerText = (player.velocity.length() * 360).toFixed(0);
            document.getElementById('alt').innerText = player.position.y.toFixed(0);
            document.getElementById('hp').innerText = Math.max(0, player.hp).toFixed(0);
            document.getElementById('bot-hp').innerText = bot.alive ? Math.max(0, bot.hp).toFixed(0) : "0 (Dead)";
            document.getElementById('main-ammo').innerText = player.mainAmmo;
            document.getElementById('sec-ammo').innerText = player.secondaryAmmo;
            
            // ターゲットロック HUD
            const target = findLockTarget(player.position, player.quaternion, SECONDARY_WEAPONS['missile'].lockRange);
            document.getElementById('target-lock').innerText = target ? `BOT (${target.hp}%)` : '-';
            document.getElementById('target-lock').style.color = target ? 'red' : '#0f0';

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        // リサイズ対応
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // 開始ボタン
        document.getElementById('start-button').addEventListener('click', startGame);

    </script>
</body>
</html>
