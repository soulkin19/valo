<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3D FPS - Immediate Start</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background-color: #000; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: white; text-shadow: 2px 2px 4px #000;
            pointer-events: none;
        }
        #flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: red; opacity: 0; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="ui">
        <h2 id="msg">クリックして操作開始！</h2>
        <p>WASD: 移動 | SPACE: ジャンプ | CLICK: 射撃</p>
        <p>スコア: <span id="score">0</span></p>
    </div>
    <div id="flash"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- 基本設定 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);
        scene.fog = new THREE.Fog(0x222222, 0, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = 1.6; // 目線の高さ

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- 照明 ---
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7.5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // --- 地面 (グリッド付き) ---
        const floorGeo = new THREE.PlaneGeometry(200, 200);
        const floorMat = new THREE.MeshPhongMaterial({ color: 0x333333 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const grid = new THREE.GridHelper(200, 50, 0x00ff00, 0x444444);
        scene.add(grid);

        // --- 操作系 ---
        const controls = new PointerLockControls(camera, document.body);
        let score = 0;

        // 即座に開始するための処理
        document.addEventListener('mousedown', () => {
            if (!controls.isLocked) {
                controls.lock();
                document.getElementById('msg').innerText = "戦闘中...";
            } else {
                shoot();
            }
        });

        // --- 敵 (ボット) ---
        const botGeo = new THREE.BoxGeometry(1, 2, 1);
        const botMat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
        const bot = new THREE.Mesh(botGeo, botMat);
        bot.position.set(5, 1, -10);
        scene.add(bot);

        // --- 弾丸管理 ---
        const bullets = [];
        function shoot() {
            const bGeo = new THREE.SphereGeometry(0.1, 8, 8);
            const bMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
            const bullet = new THREE.Mesh(bGeo, bMat);
            
            bullet.position.copy(camera.position);
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            bullet.velocity = dir.multiplyScalar(0.8);
            
            scene.add(bullet);
            bullets.push(bullet);
        }

        // --- 移動入力 ---
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        const onKeyDown = (e) => {
            switch(e.code) {
                case 'KeyW': moveForward = true; break;
                case 'KeyS': moveBackward = true; break;
                case 'KeyA': moveLeft = true; break;
                case 'KeyD': moveRight = true; break;
            }
        };
        const onKeyUp = (e) => {
            switch(e.code) {
                case 'KeyW': moveForward = false; break;
                case 'KeyS': moveBackward = false; break;
                case 'KeyA': moveLeft = false; break;
                case 'KeyD': moveRight = false; break;
            }
        };
        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup', onKeyUp);

        // --- ダメージ演出 ---
        function triggerDamage() {
            const flash = document.getElementById('flash');
            flash.style.opacity = '0.5';
            setTimeout(() => flash.style.opacity = '0', 100);
        }

        // --- メインループ ---
        function animate() {
            requestAnimationFrame(animate);

            // 1. プレイヤーの移動 (ロック中のみ)
            if (controls.isLocked) {
                const speed = 0.15;
                if (moveForward) controls.moveForward(speed);
                if (moveBackward) controls.moveForward(-speed);
                if (moveLeft) controls.moveRight(-speed);
                if (moveRight) controls.moveRight(speed);
            }

            // 2. ボットのAI (常にプレイヤーを追跡)
            const botSpeed = 0.05;
            const dirToPlayer = new THREE.Vector3().subVectors(camera.position, bot.position);
            dirToPlayer.y = 0;
            if (dirToPlayer.length() > 0.5) {
                bot.position.add(dirToPlayer.normalize().multiplyScalar(botSpeed));
            } else {
                // 接触ダメージ
                triggerDamage();
                bot.position.set(Math.random()*40-20, 1, Math.random()*40-20);
            }

            // 3. 弾丸の更新
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.position.add(b.velocity);

                // 敵との当たり判定
                if (b.position.distanceTo(bot.position) < 1.2) {
                    scene.remove(b);
                    bullets.splice(i, 1);
                    // 敵をリスポーン
                    bot.position.set(Math.random()*40-20, 1, Math.random()*40-20);
                    score += 100;
                    document.getElementById('score').innerText = score;
                    continue;
                }

                // 射程距離で削除
                if (b.position.distanceTo(camera.position) > 100) {
                    scene.remove(b);
                    bullets.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        animate();

        // リサイズ対応
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
