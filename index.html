<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Heli Hunter: Visualized</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: 'Arial', sans-serif; }
        #hud { position: absolute; top: 20px; left: 20px; color: #0f0; pointer-events: none; z-index: 10; font-size: 18px; }
        
        /* ジョイスティックの大型化 */
        #move-joy { 
            position: absolute; bottom: 50px; left: 50px; 
            width: 150px; height: 150px; background: rgba(255,255,255,0.05); 
            border: 3px solid rgba(0,255,0,0.3); border-radius: 50%; 
        }
        #move-knob { 
            position: absolute; top: 45px; left: 45px; 
            width: 60px; height: 60px; background: rgba(0,255,0,0.4); border-radius: 50%; 
        }
        
        /* 射撃ボタンの大型化 */
        #fire-btn { 
            position: absolute; bottom: 50px; right: 50px; 
            width: 130px; height: 130px; background: rgba(255,0,0,0.3);
            border: 5px solid #f00; border-radius: 50%; color: #fff; 
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: bold; z-index: 20;
        }

        /* 敵ロックオンマーカー */
        #enemy-marker {
            position: absolute; width: 60px; height: 60px;
            border: 2px solid #f00; pointer-events: none; display: none;
            transform: translate(-50%, -50%);
        }
        #enemy-marker::before { content: 'LOCK'; color: #f00; font-size: 10px; position: absolute; top: -15px; width: 100%; text-align: center; }

        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 40px; height: 40px;
            transform: translate(-50%, -50%); border: 2px solid rgba(0,255,0,0.5); border-radius: 50%; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="hud">SYSTEM: ONLINE<br>HP: <span id="hp">100</span>%</div>
    <div id="enemy-marker"></div>
    <div id="crosshair"></div>
    <div id="move-joy"><div id="move-knob"></div></div>
    <div id="fire-btn">FIRE</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0x666666));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 50, 10);
        scene.add(sun);

        // ステージと遮蔽
        const grid = new THREE.GridHelper(100, 40, 0x00ff00, 0x111111);
        scene.add(grid);
        
        const walls = [];
        const wallBox = new THREE.BoxGeometry(6, 6, 6);
        const wallMat = new THREE.MeshStandardMaterial({color: 0x444444});
        [[10, -10], [-10, -20], [5, -30]].forEach(pos => {
            const m = new THREE.Mesh(wallBox, wallMat);
            m.position.set(pos[0], 3, pos[1]);
            scene.add(m);
            walls.push(new THREE.Box3().setFromObject(m));
        });

        // 敵ヘリ
        let heli = { mesh: new THREE.Group(), hp: 100, angle: 0, lastShot: 0 };
        const hBody = new THREE.Mesh(new THREE.BoxGeometry(4, 1.5, 6), new THREE.MeshStandardMaterial({color: 0x222222}));
        heli.mesh.add(hBody);
        const rotor = new THREE.Mesh(new THREE.BoxGeometry(10, 0.1, 0.5), new THREE.MeshStandardMaterial({color: 0x000000}));
        rotor.position.y = 1; heli.mesh.add(rotor);
        scene.add(heli.mesh);

        // 操作系
        let yaw = 0, pitch = 0, targetYaw = 0, targetPitch = 0;
        let moveVec = { x: 0, y: 0 }, currentMove = { x: 0, y: 0 };
        let touchId = null, lastX, lastY;
        let bullets = [], enemyBullets = [], playerHP = 100;

        // 右側視点スライド
        window.addEventListener('touchstart', e => {
            for(let t of e.changedTouches) {
                if(t.target.id !== 'fire-btn' && t.clientX > window.innerWidth / 3) {
                    touchId = t.identifier; lastX = t.clientX; lastY = t.clientY;
                }
            }
        });
        window.addEventListener('touchmove', e => {
            for(let t of e.touches) {
                if(t.identifier === touchId) {
                    targetYaw -= (t.clientX - lastX) * 0.006;
                    targetPitch -= (t.clientY - lastY) * 0.006;
                    targetPitch = Math.max(-1.4, Math.min(1.4, targetPitch));
                    lastX = t.clientX; lastY = t.clientY;
                }
            }
        });

        // 大型ジョイスティック
        const joy = document.getElementById('move-joy');
        const knob = document.getElementById('move-knob');
        joy.addEventListener('touchmove', e => {
            const t = e.touches[0];
            const r = joy.getBoundingClientRect();
            let dx = t.clientX - (r.left + 75), dy = t.clientY - (r.top + 75);
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 60);
            const angle = Math.atan2(dy, dx);
            moveVec.x = (Math.cos(angle) * dist) / 60;
            moveVec.y = (Math.sin(angle) * dist) / 60;
            knob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
        });
        joy.addEventListener('touchend', () => { moveVec = {x:0, y:0}; knob.style.transform = 'translate(0,0)'; });

        // 射撃
        document.getElementById('fire-btn').addEventListener('touchstart', e => {
            e.preventDefault();
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({color: 0xffff00}));
            b.position.copy(camera.position);
            const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
            b.userData.vel = dir.multiplyScalar(2.0);
            bullets.push(b); scene.add(b);
        });

        const marker = document.getElementById('enemy-marker');

        function animate() {
            requestAnimationFrame(animate);

            // 視点と移動のLerp
            yaw += (targetYaw - yaw) * 0.15;
            pitch += (targetPitch - pitch) * 0.15;
            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));
            
            currentMove.x += (moveVec.x - currentMove.x) * 0.1;
            currentMove.y += (moveVec.y - currentMove.y) * 0.1;
            const oldPos = camera.position.clone();
            const f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y = 0; f.normalize();
            const r = new THREE.Vector3().crossVectors(f, new THREE.Vector3(0,1,0)).negate();
            camera.position.addScaledVector(f, -currentMove.y * 0.2);
            camera.position.addScaledVector(r, -currentMove.x * 0.2);
            walls.forEach(w => { if(w.containsPoint(camera.position)) camera.position.copy(oldPos); });

            // 敵AIとマーカー表示
            if(heli.hp > 0) {
                heli.angle += 0.008;
                heli.mesh.position.set(Math.sin(heli.angle)*30, 15, Math.cos(heli.angle)*30 - 15);
                heli.mesh.lookAt(camera.position);
                rotor.rotation.y += 0.5;

                // 2Dスクリーン座標に変換してマーカーを表示
                const screenPos = heli.mesh.position.clone().project(camera);
                if(screenPos.z < 1 && Math.abs(screenPos.x) < 1.1 && Math.abs(screenPos.y) < 1.1) {
                    marker.style.display = 'block';
                    marker.style.left = (screenPos.x * 0.5 + 0.5) * window.innerWidth + 'px';
                    marker.style.top = (-screenPos.y * 0.5 + 0.5) * window.innerHeight + 'px';
                } else { marker.style.display = 'none'; }

                // 敵の射撃
                if(Date.now() - heli.lastShot > 1000) {
                    const eb = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 3), new THREE.MeshBasicMaterial({color: 0xff0000}));
                    eb.position.copy(heli.mesh.position);
                    eb.lookAt(camera.position);
                    eb.userData.vel = new THREE.Vector3().subVectors(camera.position, heli.mesh.position).normalize().multiplyScalar(0.8);
                    enemyBullets.push(eb); scene.add(eb);
                    heli.lastShot = Date.now();
                }
            }

            bullets.forEach((b, i) => {
                b.position.add(b.userData.vel);
                if(b.position.distanceTo(heli.mesh.position) < 3) {
                    heli.hp -= 5; scene.remove(b); bullets.splice(i, 1);
                }
            });

            enemyBullets.forEach((eb, i) => {
                eb.position.add(eb.userData.vel);
                if(eb.position.distanceTo(camera.position) < 1.5) {
                    playerHP -= 2; document.getElementById('hp').innerText = playerHP;
                    scene.remove(eb); enemyBullets.splice(i, 1);
                }
            });

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
