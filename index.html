<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mobile Final FPS</title>
    <style>
        :root { --ui-color: #000; --ui-bg: rgba(255,255,255,0.9); }
        body { margin: 0; overflow: hidden; background: #eee; touch-action: none; font-family: sans-serif; -webkit-user-select: none; user-select: none; }
        
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px; border: 2px solid #333;
            border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 10;
        }
        
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: var(--ui-color); background: var(--ui-bg); 
            padding: 10px; border-radius: 8px; border: 2px solid #333; z-index: 11; font-size: 14px;
        }
        
        #msg {
            position: absolute; width: 100%; top: 30%; text-align: center;
            color: #f00; font-size: 24px; pointer-events: none; font-weight: bold; display: none; z-index: 12;
        }

        /* 武器切り替えボタン（右側） */
        #weapon-selector {
            position: absolute; top: 20px; right: 20px;
            display: flex; flex-direction: column; gap: 5px; z-index: 20;
        }
        #weapon-selector button {
            background: var(--ui-bg); border: 2px solid #333; padding: 10px;
            border-radius: 5px; font-weight: bold; font-size: 12px;
        }
        #weapon-selector button.active { background: #333; color: #fff; }

        /* リロードボタン（右下） */
        #reload-btn {
            position: absolute; bottom: 40px; right: 40px;
            width: 80px; height: 80px; border-radius: 50%;
            background: rgba(255,0,0,0.6); color: white; border: 3px solid #fff;
            font-weight: bold; display: flex; justify-content: center; align-items: center; z-index: 20;
        }

        /* 仮想ジョイスティック（左下） */
        #joystick-base {
            position: absolute; bottom: 50px; left: 50px;
            width: 120px; height: 120px; background: rgba(0,0,0,0.2);
            border-radius: 50%; display: none; z-index: 15;
        }
        #joystick-stick {
            position: absolute; top: 35px; left: 35px;
            width: 50px; height: 50px; background: rgba(255,255,255,0.5);
            border-radius: 50%;
        }

        #start-overlay {
            position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9);
            display: flex; justify-content: center; align-items: center; color: #fff;
            font-size: 24px; z-index: 100;
        }
    </style>
</head>
<body>
    <div id="start-overlay">TOUCH TO START</div>
    <div id="msg"></div>
    <div id="crosshair"></div>
    
    <div id="ui">
        SCORE: <span id="score">0</span><br>
        WEAPON: <span id="weapon-name">ASh-12</span><br>
        AMMO: <span id="ammo">30</span> / <span id="max-ammo">30</span>
    </div>

    <div id="weapon-selector">
        <button onclick="switchWeapon('1')" id="btn-1" class="active">ASh-12</button>
        <button onclick="switchWeapon('2')" id="btn-2">HK416</button>
        <button onclick="switchWeapon('3')" id="btn-3">AS VAL</button>
        <button onclick="switchWeapon('4')" id="btn-4">Type 95</button>
        <button onclick="switchWeapon('5')" id="btn-5">M249</button>
    </div>

    <div id="reload-btn" onclick="reload()">RELOAD</div>

    <div id="joystick-base"><div id="joystick-stick"></div></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- シーン基本設定 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 1000);
        camera.position.set(0, 1.6, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0x99cc99 }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);
        scene.add(new THREE.GridHelper(200, 40, 0x000000, 0x888888));

        // 銃コンテナ
        const gunContainer = new THREE.Group();
        camera.add(gunContainer);
        scene.add(camera);

        const body = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.15, 0.5), new THREE.MeshStandardMaterial({ color: 0x222222 }));
        body.position.set(0.2, -0.25, -0.4);
        gunContainer.add(body);

        // --- 武器スペック ---
        const weapons = {
            '1': { name: "ASh-12", ammo: 30, maxAmmo: 30, rpm: 500, speed: 400, damage: 34 },
            '2': { name: "HK416", ammo: 45, maxAmmo: 45, rpm: 880, speed: 600, damage: 21 },
            '3': { name: "AS VAL", ammo: 45, maxAmmo: 45, rpm: 972, speed: 400, damage: 21 },
            '4': { name: "Type 95", ammo: 30, maxAmmo: 30, rpm: 650, speed: 550, damage: 25 },
            '5': { name: "M249", ammo: 100, maxAmmo: 100, rpm: 800, speed: 500, damage: 20 }
        };
        let currentWep = weapons['1'];
        let lastFireTime = 0;
        let isReloading = false;
        let score = 0;
        const bullets = [];
        const bots = [];

        window.switchWeapon = (id) => {
            currentWep = weapons[id];
            document.querySelectorAll('#weapon-selector button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-'+id).classList.add('active');
            updateUI();
        };

        window.reload = () => {
            if (isReloading || currentWep.ammo === currentWep.maxAmmo) return;
            isReloading = true;
            document.getElementById('msg').innerText = "RELOADING...";
            document.getElementById('msg').style.display = 'block';
            gunContainer.rotation.z = 0.5;
            setTimeout(() => {
                currentWep.ammo = currentWep.maxAmmo;
                isReloading = false;
                updateUI();
                document.getElementById('msg').style.display = 'none';
                gunContainer.rotation.z = 0;
            }, 1200);
        };

        // --- モバイル操作ロジック ---
        let lon = 0, lat = 0;
        let moveX = 0, moveZ = 0; // ジョイスティックによる移動量
        const joystickBase = document.getElementById('joystick-base');
        const joystickStick = document.getElementById('joystick-stick');

        let lookTouchId = null;
        let moveTouchId = null;
        let touchStartX = 0, touchStartY = 0;
        let lookPrevX = 0, lookPrevY = 0;

        window.addEventListener('touchstart', (e) => {
            document.getElementById('start-overlay').style.display = 'none';
            for (let t of e.changedTouches) {
                if (t.clientX < window.innerWidth / 2) { // 左半分：移動
                    moveTouchId = t.identifier;
                    joystickBase.style.display = 'block';
                    joystickBase.style.left = (t.clientX - 60) + 'px';
                    joystickBase.style.bottom = (window.innerHeight - t.clientY - 60) + 'px';
                    touchStartX = t.clientX;
                    touchStartY = t.clientY;
                } else { // 右半分：視点・射撃
                    lookTouchId = t.identifier;
                    lookPrevX = t.clientX;
                    lookPrevY = t.clientY;
                    // 短いタップ判定用に開始時間を保持しても良いが、ここではシンプルに
                    setTimeout(() => { if (lookTouchId === t.identifier) isMovingView = true; }, 100);
                    var isMovingView = false;
                }
            }
        });

        window.addEventListener('touchmove', (e) => {
            for (let t of e.changedTouches) {
                if (t.identifier === moveTouchId) {
                    let dx = t.clientX - touchStartX;
                    let dy = t.clientY - touchStartY;
                    const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
                    const angle = Math.atan2(dy, dx);
                    
                    joystickStick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
                    
                    // 移動ベクトルを算出
                    moveX = Math.cos(angle) * (dist / 50);
                    moveZ = Math.sin(angle) * (dist / 50);
                }
                if (t.identifier === lookTouchId) {
                    const dx = t.clientX - lookPrevX;
                    const dy = t.clientY - lookPrevY;
                    lon -= dx * 0.005;
                    lat -= dy * 0.005;
                    lat = Math.max(-1.5, Math.min(1.5, lat));
                    lookPrevX = t.clientX;
                    lookPrevY = t.clientY;
                }
            }
        });

        window.addEventListener('touchend', (e) => {
            for (let t of e.changedTouches) {
                if (t.identifier === moveTouchId) {
                    moveTouchId = null;
                    moveX = 0; moveZ = 0;
                    joystickBase.style.display = 'none';
                    joystickStick.style.transform = 'translate(0,0)';
                }
                if (t.identifier === lookTouchId) {
                    // 右側をタップ（スワイプ量小）なら射撃
                    const dist = Math.sqrt(Math.pow(t.clientX - lookPrevX, 2));
                    if (dist < 10) shoot();
                    lookTouchId = null;
                }
            }
        });

        function shoot() {
            const now = performance.now();
            if (now - lastFireTime < 60000/currentWep.rpm || currentWep.ammo <= 0 || isReloading) return;
            lastFireTime = now;
            currentWep.ammo--;
            updateUI();
            gunContainer.position.z = 0.05;
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.07, 4, 4), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
            b.position.copy(camera.position);
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            b.velocity = dir.multiplyScalar(currentWep.speed / 400);
            b.damage = currentWep.damage;
            scene.add(b);
            bullets.push(b);
        }

        function updateUI() {
            document.getElementById('weapon-name').innerText = currentWep.name;
            document.getElementById('ammo').innerText = currentWep.ammo;
            document.getElementById('max-ammo').innerText = currentWep.maxAmmo;
            document.getElementById('score').innerText = score;
        }

        for(let i=0; i<6; i++) {
            const bot = new THREE.Mesh(new THREE.BoxGeometry(1, 2, 1), new THREE.MeshStandardMaterial({ color: 0xcc0000 }));
            bot.position.set(Math.random()*40-20, 1, -Math.random()*30-5);
            bot.hp = 100;
            scene.add(bot);
            bots.push(bot);
        }

        function animate() {
            requestAnimationFrame(animate);
            camera.quaternion.setFromEuler(new THREE.Euler(lat, lon, 0, 'YXZ'));
            gunContainer.position.z = THREE.MathUtils.lerp(gunContainer.position.z, 0, 0.1);

            // ジョイスティック移動
            if (moveTouchId !== null) {
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                forward.y = 0; forward.normalize();
                const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                right.y = 0; right.normalize();

                camera.position.addScaledVector(forward, -moveZ * 0.15);
                camera.position.addScaledVector(right, moveX * 0.15);
            }
            camera.position.y = 1.6;

            // 弾丸更新
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i]; b.position.add(b.velocity);
                bots.forEach(bot => {
                    if (b.position.distanceTo(bot.position) < 1.2) {
                        bot.hp -= b.damage; scene.remove(b); bullets.splice(i, 1);
                        if (bot.hp <= 0) {
                            bot.position.set(Math.random()*40-20, 1, -Math.random()*40); bot.hp = 100;
                            score += 100; updateUI();
                        }
                    }
                });
                if(b.position.distanceTo(camera.position) > 80) { scene.remove(b); bullets.splice(i, 1); }
            }

            bots.forEach(bot => {
                const moveDir = new THREE.Vector3().subVectors(camera.position, bot.position);
                moveDir.y = 0; bot.position.add(moveDir.normalize().multiplyScalar(0.04));
            });

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
