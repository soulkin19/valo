<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <title>ヘリ撃墜ゲーム</title>
  <style>
    body { margin:0; overflow:hidden; font-family:sans-serif; background:#000; touch-action: none; }
    #ui {
      position: absolute; top: 10px; left: 10px; color: white;
      background: rgba(0,0,0,0.5); padding: 8px 12px; border-radius: 8px;
      pointer-events: none; z-index: 5;
    }
    #crosshair {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 40px; color: lime; pointer-events: none; z-index: 5;
    }
    #startScreen {
      position: absolute; inset: 0; background: rgba(0,0,0,0.9);
      color: white; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 100;
    }
    #startScreen button {
      margin: 15px; padding: 16px 32px; font-size: 20px; cursor: pointer;
      border: none; border-radius: 8px; background: #444; color: white;
    }
    #info {
      position: absolute; bottom: 10px; left: 10px; color: #aaa; font-size: 14px;
      pointer-events: none; z-index: 5;
    }
  </style>
</head>
<body>

<div id="startScreen">
  <h1>ヘリコプターシューター</h1>
  <p>銃を選択してゲーム開始</p>
  <button data-weapon="Pistol">ピストル</button>
  <button data-weapon="Rifle">アサルトライフル</button>
  <button data-weapon="Rocket">ロケットランチャー</button>
</div>

<div id="ui">
  武器: <span id="weaponName">-</span>  |  スコア: <span id="score">0</span>
</div>

<div id="crosshair">+</div>
<div id="info">PC：クリックで開始 → マウスで視点・左クリック射撃<br>モバイル：左半分＝移動　右半分＝視点ドラッグ　タップ＝射撃</div>

<script type="module">
  import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js';
  import { PointerLockControls } from 'https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/controls/PointerLockControls.js';

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x88aaff);
  scene.fog = new THREE.FogExp2(0x88aaff, 0.0005);

  const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 2000);
  camera.position.set(0, 1.6, 10);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  renderer.shadowMap.enabled = true;
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const dirLight = new THREE.DirectionalLight(0xffffff, 1.1);
  dirLight.position.set(80, 120, 60);
  dirLight.castShadow = true;
  scene.add(dirLight);

  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(2000, 2000),
    new THREE.MeshStandardMaterial({ color: 0x337733 })
  );
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);

  // ゲーム状態
  let currentWeapon = null;
  let score = 0;
  const helicopters = [];
  const velocity = new THREE.Vector3();
  const direction = new THREE.Vector3();

  let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;

  const isMobile = /Android|iPhone|iPad|iPod|webOS|BlackBerry|Windows Phone/i.test(navigator.userAgent) || 'ontouchstart' in window;

  const controls = new PointerLockControls(camera, renderer.domElement);

  // デバッグ用
  console.log("Is mobile?", isMobile);

  // スタート画面のボタン
  document.querySelectorAll('#startScreen button').forEach(btn => {
    btn.addEventListener('click', () => {
      const type = btn.dataset.weapon;
      startGame(type);
    });
    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      const type = btn.dataset.weapon;
      startGame(type);
    }, { passive: false });
  });

  function startGame(type) {
    console.log("startGame called with:", type);
    currentWeapon = type;
    document.getElementById('weaponName').textContent = type;
    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('ui').style.display = 'block';

    // PCならポインターロックを試みる
    if (!isMobile) {
      controls.lock().catch(err => console.log("Pointer lock failed:", err));
    }

    // モバイルではフルスクリーンを試みる（効く端末もある）
    if (document.documentElement.requestFullscreen) {
      document.documentElement.requestFullscreen().catch(() => {});
    }
  }

  // モバイル視点制御
  let lookTouchId = null;
  let touchStartX = 0, touchStartY = 0;

  document.addEventListener('touchstart', e => {
    if (!currentWeapon) return;
    e.preventDefault();
    for (let touch of e.changedTouches) {
      if (touch.clientX > innerWidth / 2 && lookTouchId === null) {
        lookTouchId = touch.identifier;
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
      }
    }
  }, { passive: false });

  document.addEventListener('touchmove', e => {
    if (!currentWeapon) return;
    e.preventDefault();
    for (let touch of e.touches) {
      if (touch.identifier === lookTouchId) {
        const dx = (touch.clientX - touchStartX) * 0.005;
        const dy = (touch.clientY - touchStartY) * 0.005;
        camera.rotation.y -= dx;
        camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x - dy));
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
      }
    }
  }, { passive: false });

  document.addEventListener('touchend', e => {
    for (let touch of e.changedTouches) {
      if (touch.identifier === lookTouchId) lookTouchId = null;
    }
  });

  // 移動（WASD + モバイル左半分）
  document.addEventListener('keydown', e => { 
    if (!currentWeapon) return;
    const k = e.key.toLowerCase();
    if (k === 'w') moveForward = true;
    if (k === 's') moveBackward = true;
    if (k === 'a') moveLeft = true;
    if (k === 'd') moveRight = true;
  });
  document.addEventListener('keyup', e => {
    const k = e.key.toLowerCase();
    if (k === 'w') moveForward = false;
    if (k === 's') moveBackward = false;
    if (k === 'a') moveLeft = false;
    if (k === 'd') moveRight = false;
  });

  // モバイル移動（左半分）
  document.addEventListener('touchstart', e => {
    if (!currentWeapon) return;
    for (let touch of e.touches) {
      if (touch.clientX < innerWidth / 2) {
        const x = (touch.clientX / innerWidth) * 2 - 1;
        const y = (touch.clientY / innerHeight) * 2 - 1;
        moveForward  = y < -0.1;
        moveBackward = y >  0.3;
        moveLeft     = x < -0.2;
        moveRight    = x >  0.2;
      }
    }
  }, { passive: false });

  document.addEventListener('touchend', () => {
    moveForward = moveBackward = moveLeft = moveRight = false;
  });

  // 射撃
  const raycaster = new THREE.Raycaster();

  function shoot() {
    if (!currentWeapon) return;
    console.log("Shoot!");
    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
    const hits = raycaster.intersectObjects(helicopters, true);
    if (hits.length > 0) {
      const obj = hits[0].object;
      let group = obj;
      while (group.parent && group.parent !== scene) group = group.parent;
      if (group.userData.hp !== undefined) {
        group.userData.hp--;
        if (group.userData.hp <= 0) {
          scene.remove(group);
          helicopters.splice(helicopters.indexOf(group), 1);
          score += 100;
          document.getElementById('score').textContent = score;
        }
      }
    }
  }

  document.addEventListener('mousedown', e => { if (e.button === 0 && currentWeapon) shoot(); });
  document.addEventListener('touchstart', e => {
    if (currentWeapon && e.touches[0].clientX > innerWidth / 3) {
      shoot();
    }
  }, { passive: false });

  // 敵
  function spawnHelicopter() {
    if (!currentWeapon) return;
    const group = new THREE.Group();
    const body = new THREE.Mesh(
      new THREE.BoxGeometry(4, 1.8, 9),
      new THREE.MeshStandardMaterial({ color: 0x222 })
    );
    group.add(body);

    group.position.set(
      (Math.random() - 0.5) * 400,
      30 + Math.random() * 80,
      -300 - Math.random() * 200
    );

    group.userData = {
      hp: currentWeapon === 'Rocket' ? 3 : currentWeapon === 'Rifle' ? 2 : 1,
      speed: 0.4 + Math.random() * 0.5
    };

    scene.add(group);
    helicopters.push(group);
  }

  setInterval(spawnHelicopter, 4000);

  // ループ
  function animate() {
    requestAnimationFrame(animate);

    if (currentWeapon) {
      direction.z = Number(moveForward) - Number(moveBackward);
      direction.x = Number(moveRight) - Number(moveLeft);
      direction.normalize();

      const speed = 0.15;
      velocity.z = direction.z * speed;
      velocity.x = direction.x * speed;

      controls.moveRight(velocity.x);
      controls.moveForward(velocity.z);

      helicopters.forEach((h, i) => {
        h.position.z += h.userData.speed;
        if (h.position.distanceTo(camera.position) < 15) {
          alert("ゲームオーバー！ スコア: " + score);
          location.reload();
        }
        if (h.position.z > 100) {
          scene.remove(h);
          helicopters.splice(i, 1);
        }
      });
    }

    renderer.render(scene, camera);
  }

  animate();

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
</script>
</body>
</html>
