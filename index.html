<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Simple 3D PvE FPS</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px;
            border: 2px solid white; border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: white; font-size: 24px; text-shadow: 2px 2px 4px #000;
        }
        #instructions {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white; background: rgba(0,0,0,0.5); padding: 20px;
            text-align: center; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="ui">Score: <span id="score">0</span></div>
    <div id="crosshair"></div>
    <div id="instructions">
        <h1>PvE FPS Start</h1>
        <p>画面をクリックして開始</p>
        <p>(WASDで移動 / マウスで視点 / クリックで射撃)</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- 基本設定 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // 空色
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- ライティング ---
        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
        scene.add(light);

        // --- 地面 ---
        const floorGeometry = new THREE.PlaneGeometry(100, 100);
        const floorMaterial = new THREE.MeshPhongMaterial({ color: 0x555555 });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // --- 操作設定 ---
        const controls = new PointerLockControls(camera, document.body);
        const instructions = document.getElementById('instructions');

        instructions.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => instructions.style.display = 'none');
        controls.addEventListener('unlock', () => instructions.style.display = 'block');

        // --- ゲーム状態 ---
        let score = 0;
        const enemies = [];
        const bullets = [];
        const moveSpeed = 0.1;
        const keys = {};

        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        // --- 射撃機能 ---
        window.addEventListener('mousedown', () => {
            if (!controls.isLocked) return;
            
            const bullet = new THREE.Mesh(
                new THREE.SphereGeometry(0.1, 8, 8),
                new THREE.MeshBasicMaterial({ color: 0xffff00 })
            );
            bullet.position.copy(camera.position);
            
            const direction = new THREE.Vector3();
            camera.getWorldDirection(direction);
            bullet.velocity = direction.clone().multiplyScalar(0.5);
            
            bullets.push(bullet);
            scene.add(bullet);
        });

        // --- 敵の生成 ---
        function spawnEnemy() {
            const enemy = new THREE.Mesh(
                new THREE.BoxGeometry(1, 2, 1),
                new THREE.MeshStandardMaterial({ color: 0xff0000 })
            );
            const angle = Math.random() * Math.PI * 2;
            const dist = 20 + Math.random() * 10;
            enemy.position.set(Math.cos(angle) * dist, 1, Math.sin(angle) * dist);
            enemies.push(enemy);
            scene.add(enemy);
        }
        setInterval(spawnEnemy, 2000);

        // --- メインループ ---
        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked) {
                // 移動処理
                if (keys['KeyW']) controls.moveForward(moveSpeed);
                if (keys['KeyS']) controls.moveForward(-moveSpeed);
                if (keys['KeyA']) controls.moveRight(-moveSpeed);
                if (keys['KeyD']) controls.moveRight(moveSpeed);

                // 弾の更新
                for (let i = bullets.length - 1; i >= 0; i--) {
                    const b = bullets[i];
                    b.position.add(b.velocity);
                    if (b.position.length() > 100) {
                        scene.remove(b);
                        bullets.splice(i, 1);
                    }
                }

                // 敵の更新と当たり判定
                for (let i = enemies.length - 1; i >= 0; i--) {
                    const e = enemies[i];
                    
                    // プレイヤーの方へ向かってくる
                    const dir = new THREE.Vector3().subVectors(camera.position, e.position).normalize();
                    e.position.x += dir.x * 0.03;
                    e.position.z += dir.z * 0.03;

                    // 弾との判定
                    for (let j = bullets.length - 1; j >= 0; j--) {
                        if (e.position.distanceTo(bullets[j].position) < 1) {
                            scene.remove(e);
                            enemies.splice(i, 1);
                            scene.remove(bullets[j]);
                            bullets.splice(j, 1);
                            score += 100;
                            document.getElementById('score').innerText = score;
                            break;
                        }
                    }
                }
            }

            renderer.render(scene, camera);
        }

        animate();

        // リサイズ対応
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
