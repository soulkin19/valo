<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3D FPS - Auto Start System</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 12px; height: 12px;
            border: 2px solid #0f0; border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none;
        }
        #ui {
            position: absolute; bottom: 20px; left: 20px;
            color: #0f0; pointer-events: none;
        }
        #overlay {
            position: absolute; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            color: white; background: rgba(0,0,0,0.3);
            transition: opacity 0.5s; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="overlay">画面内をクリックして戦闘開始</div>
    <div id="crosshair"></div>
    <div id="ui">SCORE: <span id="score">0</span></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- シーン設定 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.Fog(0x050505, 5, 30);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.y = 1.6;

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- ライティング ---
        const ambient = new THREE.AmbientLight(0x404040, 2);
        scene.add(ambient);
        const pointLight = new THREE.PointLight(0x00ff00, 1, 50);
        camera.add(pointLight); // プレイヤーがライトを持つ
        scene.add(camera);

        // --- 地面 ---
        const grid = new THREE.GridHelper(100, 40, 0x00ff00, 0x222222);
        scene.add(grid);

        // --- コントロール ---
        const controls = new PointerLockControls(camera, document.body);
        
        // ページが読み込まれたら即座にクリックを待機
        window.addEventListener('mousedown', () => {
            if (!controls.isLocked) {
                controls.lock();
                document.getElementById('overlay').style.opacity = '0';
            } else {
                shoot();
            }
        });

        // --- ボット（敵） ---
        const bots = [];
        function createBot() {
            const botGeo = new THREE.BoxGeometry(1, 2, 1);
            const botMat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x330000 });
            const bot = new THREE.Mesh(botGeo, botMat);
            bot.position.set(Math.random()*30-15, 1, -20);
            scene.add(bot);
            bots.push(bot);
        }
        for(let i=0; i<3; i++) createBot(); // 最初から3体出す

        // --- 弾丸 ---
        const bullets = [];
        function shoot() {
            const b = new THREE.Mesh(
                new THREE.SphereGeometry(0.1, 8, 8),
                new THREE.MeshBasicMaterial({ color: 0xffff00 })
            );
            b.position.copy(camera.position);
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            b.velocity = dir.multiplyScalar(0.6);
            scene.add(b);
            bullets.push(b);
        }

        // --- 入力管理 ---
        let keys = {};
        document.addEventListener('keydown', (e) => keys[e.code] = true);
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        let score = 0;

        // --- メインループ ---
        function animate() {
            requestAnimationFrame(animate);

            // プレイヤー移動（クリック前でもキー入力があれば動けるが、視点移動にはクリックが必要）
            const speed = 0.12;
            if (controls.isLocked) {
                if (keys['KeyW']) controls.moveForward(speed);
                if (keys['KeyS']) controls.moveForward(-speed);
                if (keys['KeyA']) controls.moveRight(-speed);
                if (keys['KeyD']) controls.moveRight(speed);
            }

            // ボットの挙動（クリックに関係なく常に襲ってくる）
            bots.forEach(bot => {
                const dir = new THREE.Vector3().subVectors(camera.position, bot.position);
                dir.y = 0;
                bot.position.add(dir.normalize().multiplyScalar(0.04));

                // プレイヤーへの接触判定
                if (bot.position.distanceTo(camera.position) < 1.5) {
                    bot.position.set(Math.random()*40-20, 1, Math.random()*40-20);
                    score = Math.max(0, score - 50); // ペナルティ
                    document.getElementById('score').innerText = score;
                }
            });

            // 弾丸の挙動
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.position.add(b.velocity);

                bots.forEach(bot => {
                    if (b.position.distanceTo(bot.position) < 1.2) {
                        bot.position.set(Math.random()*40-20, 1, Math.random()*40-20);
                        scene.remove(b);
                        bullets.splice(i, 1);
                        score += 100;
                        document.getElementById('score').innerText = score;
                    }
                });

                if (b.position.length() > 50) {
                    scene.remove(b);
                    bullets.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
