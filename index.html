<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>オンライン銃撃戦〜fire up 3D〜</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #ui {
            position: absolute; top: 10px; left: 10px; color: white;
            font-family: sans-serif; pointer-events: none;
        }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px; border: 2px solid #0f0;
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="ui">
    <div id="hpDisplay">HP: 100</div>
    <div id="weaponDisplay">Weapon: Handgun (1-5 key)</div>
    <div id="status">Click to Start</div>
</div>
<div id="crosshair"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>

<script>
    // --- 基本設定 ---
    const playerName = prompt("名前を入力してください", "guest_") || "guest";
    const gameName = prompt("部屋名（空欄でpublic）") || "public";
    const playerId = Math.random().toString(36).substr(2, 9);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xba5b1c); // 元の背景色を継承
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // --- 操作系 ---
    const controls = new THREE.PointerLockControls(camera, document.body);
    document.addEventListener('click', () => controls.lock());

    // --- 地面と壁 (2Dのwallsデータを元に作成可能) ---
    const grid = new THREE.GridHelper(2000, 50);
    scene.add(grid);
    
    // サンプルの壁（提示されたwallsの一部を3D化）
    function createWall(x, z, w, d) {
        const geo = new THREE.BoxGeometry(w, 50, d);
        const mat = new THREE.MeshPhongMaterial({ color: 0x808080 });
        const wall = new THREE.Mesh(geo, mat);
        wall.position.set(x + w/2, 25, z + d/2);
        scene.add(wall);
    }
    createWall(50, 50, 400, 20); // 2Dコードの最初の壁

    const light = new THREE.CombinedCamera ? null : new THREE.HemisphereLight(0xffffff, 0x444444, 1);
    scene.add(light || new THREE.AmbientLight(0xffffff));

    // --- オンライン同期 (Achex) ---
    const socket = new WebSocket('wss://cloud.achex.ca/yajusenpaiikisug1');
    const players = {};

    socket.onopen = () => {
        socket.send(JSON.stringify({auth: playerId, password: "pass"}));
        socket.send(JSON.stringify({joinHub: gameName}));
    };

    socket.onmessage = (event) => {
        const json = JSON.parse(event.data);
        if (!json.msg) return;
        const data = JSON.parse(json.msg);

        if (data.id && data.id !== playerId) {
            if (!players[data.id]) {
                // 新規プレイヤー（3Dモデル）作成
                const geo = new THREE.CapsuleGeometry(10, 20, 4, 8);
                const mat = new THREE.MeshPhongMaterial({ color: data.color || 'blue' });
                const mesh = new THREE.Mesh(geo, mat);
                scene.add(mesh);
                players[data.id] = mesh;
            }
            // 位置同期
            players[data.id].position.set(data.x, 10, data.z);
        }
        if (data.quit) {
            scene.remove(players[data.quit]);
            delete players[data.quit];
        }
    };

    // --- 移動ロジック ---
    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    const onKeyDown = (e) => {
        if (e.code === 'ArrowUp' || e.code === 'KeyW') moveForward = true;
        if (e.code === 'ArrowDown' || e.code === 'KeyS') moveBackward = true;
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') moveLeft = true;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') moveRight = true;
    };
    const onKeyUp = (e) => {
        if (e.code === 'ArrowUp' || e.code === 'KeyW') moveForward = false;
        if (e.code === 'ArrowDown' || e.code === 'KeyS') moveBackward = false;
        if (e.code === 'ArrowLeft' || e.code === 'KeyA') moveLeft = false;
        if (e.code === 'ArrowRight' || e.code === 'KeyD') moveRight = false;
    };
    document.addEventListener('keydown', onKeyDown);
    document.addEventListener('keyup', onKeyUp);

    // --- メインループ ---
    const velocity = new THREE.Vector3();
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();

        if (controls.isLocked) {
            const speed = 200; // 移動速度
            velocity.set(0, 0, 0);

            if (moveForward) velocity.z -= speed * delta;
            if (moveBackward) velocity.z += speed * delta;
            if (moveLeft) velocity.x -= speed * delta;
            if (moveRight) velocity.x += speed * delta;

            controls.moveRight(velocity.x);
            controls.moveForward(-velocity.z);

            // Achexへ位置送信 (2Dの y を 3Dの z として送信)
            if (socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({
                    toH: gameName,
                    msg: JSON.stringify({
                        id: playerId,
                        x: camera.position.x,
                        z: camera.position.z,
                        name: playerName
                    })
                }));
            }
        }
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
