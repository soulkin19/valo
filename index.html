<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>iPad Keyboard FPS</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: sans-serif; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px; border: 2px solid #ff0;
            border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none;
        }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #ff0; pointer-events: none;
        }
        #msg {
            position: absolute; width: 100%; top: 40%; text-align: center;
            color: #fff; font-size: 20px; pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="msg">一度画面をタップして開始<br>(その後はSPACEで射撃)</div>
    <div id="crosshair"></div>
    <div id="ui">SCORE: <span id="score">0</span></div>

    <script type="importmap">
        {
            "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- シーン・カメラ・レンダラー ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 地面と光 ---
        scene.add(new THREE.GridHelper(100, 50, 0x4444ff, 0x222222));
        const light = new THREE.PointLight(0xffffff, 20, 100);
        scene.add(light);

        // --- 状態管理 ---
        let score = 0;
        const keys = {};
        const bullets = [];
        const bots = [];

        // --- iPad用：画面タップで入力を有効化 ---
        window.addEventListener('touchstart', () => {
            document.getElementById('msg').style.display = 'none';
        }, { once: true });

        // --- キーボード入力 (iPadの外部キーボード対応) ---
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space') shoot();
        });
        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        // --- 視点操作 (ドラッグでもキーボードでもない、iPadの「ポインタ」移動を想定) ---
        let lon = 0, lat = 0;
        window.addEventListener('mousemove', (e) => {
            if (Math.abs(e.movementX) < 100) { // 急激な飛びを防止
                lon -= e.movementX * 0.005;
                lat -= e.movementY * 0.005;
                lat = Math.max(-Math.PI/2, Math.min(Math.PI/2, lat));
            }
        });

        // --- 射撃ロジック ---
        function shoot() {
            const b = new THREE.Mesh(
                new THREE.SphereGeometry(0.2, 8, 8),
                new THREE.MeshBasicMaterial({ color: 0xffcc00 })
            );
            b.position.copy(camera.position);
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            b.velocity = dir.multiplyScalar(0.7);
            scene.add(b);
            bullets.push(b);
        }

        // --- ボット生成 ---
        for(let i=0; i<5; i++) {
            const bot = new THREE.Mesh(
                new THREE.BoxGeometry(1, 2, 1),
                new THREE.MeshStandardMaterial({ color: 0xff0000 })
            );
            bot.position.set(Math.random()*20-10, 1, -Math.random()*20-10);
            scene.add(bot);
            bots.push(bot);
        }

        // --- ループ ---
        function animate() {
            requestAnimationFrame(animate);

            // 視点の更新
            camera.quaternion.setFromEuler(new THREE.Euler(lat, lon, 0, 'YXZ'));

            // WASD移動
            const dir = new THREE.Vector3();
            if (keys['KeyW']) dir.z -= 0.1;
            if (keys['KeyS']) dir.z += 0.1;
            if (keys['KeyA']) dir.x -= 0.1;
            if (keys['KeyD']) dir.x += 0.1;
            camera.translateOnAxis(dir.normalize(), 0.1);
            camera.position.y = 1.6; // 高さを固定

            // 弾の移動と判定
            bullets.forEach((b, i) => {
                b.position.add(b.velocity);
                bots.forEach(bot => {
                    if (b.position.distanceTo(bot.position) < 1.2) {
                        bot.position.set(Math.random()*30-15, 1, -Math.random()*30);
                        score += 100;
                        document.getElementById('score').innerText = score;
                    }
                });
            });

            // ボットの接近
            bots.forEach(bot => {
                const moveDir = new THREE.Vector3().subVectors(camera.position, bot.position);
                moveDir.y = 0;
                bot.position.add(moveDir.normalize().multiplyScalar(0.03));
            });

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
