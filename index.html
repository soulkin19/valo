<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VALORANT 2D: ULTIMATE</title>
    <style>
        :root { --v-red: #ff4655; --v-blue: #00eeff; --v-dark: #0f1923; }
        body { margin: 0; background: var(--v-dark); overflow: hidden; font-family: 'Oswald', sans-serif; touch-action: none; }
        canvas { display: block; background: #1a2228; margin: auto; }
        
        #ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .hud-bottom { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 40px; }
        .stat-card { background: rgba(15, 25, 35, 0.9); border-bottom: 4px solid var(--v-red); padding: 10px 30px; color: white; text-align: center; }
        .stat-val { font-size: 32px; font-weight: bold; }
        
        #kill-feed { position: absolute; top: 20px; right: 20px; text-align: right; color: var(--v-red); font-size: 20px; }
        #flash-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; }
        
        #fs-btn { position: absolute; top: 10px; left: 10px; pointer-events: auto; background: var(--v-red); color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <button id="fs-btn">FULLSCREEN / START</button>
    <div id="flash-overlay"></div>
    <div id="ui-overlay">
        <div id="kill-feed"></div>
        <div class="hud-bottom">
            <div class="stat-card"><div>HEALTH</div><div id="hp-val" class="stat-val">100</div></div>
            <div class="stat-card"><div>FLASH [Q]</div><div id="q-val" class="stat-val">2</div></div>
            <div class="stat-card"><div>SMOKE [E]</div><div id="e-val" class="stat-val">2</div></div>
        </div>
    </div>
    <canvas id="game"></canvas>

<script>
/** @type {HTMLCanvasElement} */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const flashOverlay = document.getElementById('flash-overlay');

// iPad/PC画面サイズ調整
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.onresize = resize;
resize();

// --- ゲーム定数 ---
let player = { x: 100, y: 300, hp: 100, r: 15, smokes: 2, flashes: 2, recoil: 0, isWalking: false };
let bots = [
    {id: 1, x: 1200, y: 300, hp: 100, r: 15, blinded: 0, state: 'guard'},
    {id: 2, x: 1500, y: 800, hp: 100, r: 15, blinded: 0, state: 'guard'}
];
let walls = [
    {x: 400, y: 0, w: 50, h: 400}, {x: 400, y: 600, w: 50, h: 500},
    {x: 800, y: 300, w: 400, h: 50}, {x: 700, y: 700, w: 50, h: 300}
];
let bullets = [], smokes = [], entities = [], keys = {}, mouse = {x:0, y:0};

// --- 入力制御 ---
window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;
canvas.onmousemove = (e) => { mouse.x = e.clientX; mouse.y = e.clientY; };
canvas.ontouchmove = (e) => { mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY; e.preventDefault(); };

document.getElementById('fs-btn').onclick = () => {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    document.getElementById('fs-btn').style.display = 'none';
};

// 射撃とスキル
function fire() {
    if (player.hp <= 0) return;
    const angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
    // リコイル: 撃つほど上にずれる
    const spread = (player.recoil * 0.2) + (keys['w']||keys['a']||keys['s']||keys['d'] ? 0.1 : 0.01);
    const finalAngle = angle - (player.recoil * 0.05) + (Math.random()-0.5) * spread;
    
    bullets.push({x: player.x, y: player.y, vx: Math.cos(finalAngle)*25, vy: Math.sin(finalAngle)*25, owner: 'player'});
    player.recoil = Math.min(player.recoil + 1, 10);
}

canvas.onmousedown = (e) => { if(e.button === 0) fire(); };
canvas.ontouchstart = (e) => { fire(); e.preventDefault(); };

window.addEventListener('keydown', (e) => {
    if (e.key === 'q' && player.flashes > 0) { // フラッシュ
        entities.push({x: player.x, y: player.y, vx: Math.cos(Math.atan2(mouse.y-player.y, mouse.x-player.x))*12, vy: Math.sin(Math.atan2(mouse.y-player.y, mouse.x-player.x))*12, type: 'flash', timer: 40});
        player.flashes--;
    }
    if (e.key === 'e' && player.smokes > 0) { // スモーク
        smokes.push({x: mouse.x, y: mouse.y, r: 0, maxR: 90, life: 600});
        player.smokes--;
    }
});

// --- 視線・衝突判定 ---
function isWall(x, y) {
    return walls.some(w => x > w.x && x < w.x+w.w && y > w.y && y < w.y+w.h);
}

function canSee(a, b) {
    const dist = Math.hypot(b.x-a.x, b.y-a.y);
    const ang = Math.atan2(b.y-a.y, b.x-a.x);
    for(let d=0; d<dist; d+=15) {
        if (isWall(a.x+Math.cos(ang)*d, a.y+Math.sin(ang)*d)) return false;
    }
    return true;
}

// --- メインアップデート ---
function update() {
    // プレイヤー移動
    let spd = keys['shift'] ? 1.5 : 3.5;
    let dx=0, dy=0;
    if(keys['w']) dy -= spd; if(keys['s']) dy += spd;
    if(keys['a']) dx -= spd; if(keys['d']) dx += spd;
    if(!isWall(player.x+dx, player.y)) player.x += dx;
    if(!isWall(player.x, player.y+dy)) player.y += dy;
    if(dx===0 && dy===0) player.recoil = Math.max(0, player.recoil - 0.5);

    // エンティティ（フラッシュ）
    entities.forEach((ent, i) => {
        ent.x += ent.vx; ent.y += ent.vy; ent.timer--;
        if (ent.timer <= 0) {
            // 炸裂
            const dist = Math.hypot(player.x - ent.x, player.y - ent.y);
            if (dist < 400 && canSee(player, ent)) {
                flashOverlay.style.opacity = 1; // プレイヤー目潰し
            }
            bots.forEach(b => {
                if(Math.hypot(b.x-ent.x, b.y-ent.y) < 500 && canSee(b, ent)) b.blinded = 180;
            });
            entities.splice(i, 1);
        }
    });

    // 目潰し回復
    const curOpacity = parseFloat(flashOverlay.style.opacity) || 0;
    if (curOpacity > 0) flashOverlay.style.opacity = curOpacity - 0.01;

    // BOT AI
    bots.forEach(bot => {
        if (bot.hp <= 0) return;
        if (bot.blinded > 0) { bot.blinded--; return; }

        if (canSee(bot, player) && player.hp > 0) {
            if (Math.random() < 0.05) { // 射撃
                const ang = Math.atan2(player.y - bot.y, player.x - bot.x);
                bullets.push({x: bot.x, y: bot.y, vx: Math.cos(ang)*15, vy: Math.sin(ang)*15, owner: 'bot'});
            }
        }
    });

    // 弾丸処理
    bullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;
        if (isWall(b.x, b.y)) bullets.splice(i, 1);
        
        if (b.owner === 'player') {
            bots.forEach(bot => {
                const d = Math.hypot(b.x-bot.x, b.y-bot.y);
                if (bot.hp > 0 && d < bot.r) {
                    const isHead = d < 6; // 中心に近いほどヘッドショット
                    bot.hp -= isHead ? 100 : 35;
                    if (bot.hp <= 0) document.getElementById('kill-feed').innerText = isHead ? "HEADSHOT KILL" : "KILLED BOT";
                    bullets.splice(i, 1);
                }
            });
        } else {
            if (Math.hypot(b.x-player.x, b.y-player.y) < player.r) {
                player.hp -= 20;
                bullets.splice(i, 1);
            }
        }
    });

    // UI
    document.getElementById('hp-val').innerText = Math.max(0, player.hp);
    document.getElementById('q-val').innerText = player.flashes;
    document.getElementById('e-val').innerText = player.smokes;
}

// --- 描画 ---
function draw() {
    ctx.fillStyle = '#101823';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 壁
    ctx.fillStyle = '#2d3741';
    walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));

    // スモーク
    smokes.forEach(s => {
        if(s.r < s.maxR) s.r += 3;
        ctx.fillStyle = 'rgba(120, 130, 150, 0.8)';
        ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
    });

    // フラッシュ弾
    entities.forEach(ent => {
        ctx.fillStyle = 'white';
        ctx.beginPath(); ctx.arc(ent.x, ent.y, 8, 0, Math.PI*2); ctx.fill();
    });

    // プレイヤー
    if (player.hp > 0) {
        ctx.fillStyle = player.isWalking ? '#888' : '#00eeff';
        ctx.beginPath(); ctx.arc(player.x, player.y, player.r, 0, Math.PI*2); ctx.fill();
        // 照準線
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath(); ctx.moveTo(player.x, player.y); ctx.lineTo(mouse.x, mouse.y); ctx.stroke();
    }

    // BOT
    bots.forEach(bot => {
        if (bot.hp <= 0) return;
        ctx.fillStyle = bot.blinded > 0 ? 'white' : '#ff4655';
        ctx.beginPath(); ctx.arc(bot.x, bot.y, bot.r, 0, Math.PI*2); ctx.fill();
    });

    // 弾丸
    ctx.fillStyle = '#ffee00';
    bullets.forEach(b => ctx.fillRect(b.x-2, b.y-2, 4, 4));
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
