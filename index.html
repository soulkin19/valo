<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical FPS: Collision Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; touch-action: none; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; font-weight: bold; pointer-events: none; z-index: 10; text-shadow: 1px 1px 2px #000; }
        #dmg-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,0,0,0.3); pointer-events: none; z-index: 40; display: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid #0f0; border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; opacity: 0.6; }
        .ctrl { position: absolute; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #fff; background: rgba(255,0,0,0.2); border: 2px solid #f00; z-index: 20; user-select: none; }
        #fire-btn { bottom: 40px; right: 40px; width: 95px; height: 95px; font-size: 20px; background: rgba(255,0,0,0.4); }
        #ads-btn { bottom: 145px; right: 45px; width: 65px; height: 65px; font-size: 12px; }
        #heal-btn { bottom: 40px; right: 145px; width: 65px; height: 65px; font-size: 12px; border-color: #0f0; background: rgba(0,255,0,0.2); }
        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 110px; height: 110px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 1px solid #666; }
        #joy-stick { position: absolute; top: 30px; left: 30px; width: 50px; height: 50px; background: #fff; border-radius: 50%; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; z-index: 100; }
        select, button { padding: 12px; margin: 10px; width: 220px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="dmg-flash"></div>
<div id="menu" class="overlay">
    <h2 style="color:#f00;">SELECT WEAPON</h2>
    <select id="wpn-select"><option value="asval">AS VAL</option><option value="ak47">AK-47</option></select>
    <button onclick="start(1)">DEPLOY</button>
</div>
<div id="sec-menu" class="overlay" style="display:none;">
    <h2 style="color:#0f0;">PHASE 2 SECONDARY</h2>
    <select id="sec-select"><option value="missile">GUIDED MISSILE</option><option value="ash12">ASh-12</option></select>
    <button onclick="start(2)">RE-DEPLOY</button>
</div>

<div id="ui">HP: <span id="hp-val">100</span> | SCORE: <span id="score-val">0</span><br><span id="wpn-name">-</span> | <span id="status">READY</span></div>
<div id="crosshair"></div>
<div id="joy-base"><div id="joy-stick"></div></div>
<div id="fire-btn" class="ctrl">FIRE</div>
<div id="ads-btn" class="ctrl">ADS</div>
<div id="heal-btn" class="ctrl">HEAL</div>

<script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>
<script type="module">
    import * as THREE from 'three';

    let scene, camera, renderer, gun;
    let isPlaying = false, isAds = false, isHealing = false, score = 0, hp = 100;
    let wpn = 'asval', move = { f:0, r:0 }, look = { p:0, y:0 }, recoil = 0;
    let lastFire = 0, phase = 1, missile = null;
    let enemies = [], bullets = [], walls = [];
    const BOUND = 38;

    function init() {
        scene = new THREE.Scene(); scene.background = new THREE.Color(0x111111);
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const light = new THREE.PointLight(0xffffff, 600); light.position.set(0, 20, 0); scene.add(light);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), new THREE.MeshStandardMaterial({color: 0x1a1a1a}));
        floor.rotation.x = -Math.PI/2; scene.add(floor);

        for(let i=0; i<15; i++) {
            const wall = new THREE.Mesh(new THREE.BoxGeometry(6, 6, 6), new THREE.MeshStandardMaterial({color: 0x0a0a0a}));
            wall.position.set(Math.random()*60-30, 3, Math.random()*60-30);
            scene.add(wall); walls.push(wall);
        }

        gun = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.12, 0.6), new THREE.MeshStandardMaterial({color: 0x000}));
        scene.add(gun);
        animate();
    }

    window.start = (p) => {
        if(p===1) wpn = document.getElementById('wpn-select').value;
        else wpn = document.getElementById('sec-select').value;
        document.getElementById('wpn-name').innerText = wpn.toUpperCase();
        document.getElementById('menu').style.display = 'none';
        document.getElementById('sec-menu').style.display = 'none';
        isPlaying = true;
    };

    let touchX, touchY, moveId = null;
    window.addEventListener('touchstart', e => { for(let t of e.changedTouches) if(t.clientX < window.innerWidth/2) moveId = t.identifier; });
    window.addEventListener('touchmove', e => {
        for(let t of e.changedTouches) {
            if(t.identifier === moveId) {
                const rect = document.getElementById('joy-base').getBoundingClientRect();
                const dx = t.clientX - (rect.left + 55), dy = t.clientY - (rect.top + 55);
                const d = Math.min(Math.sqrt(dx*dx+dy*dy), 40);
                const a = Math.atan2(dy, dx);
                document.getElementById('joy-stick').style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
                move.f = -Math.sin(a)*(d/40); move.r = Math.cos(a)*(d/40);
            } else if(touchX) {
                look.y -= (t.clientX - touchX) * 0.005;
                let dp = (t.clientY - touchY) * 0.005;
                if(document.getElementById('fire-btn').matches(':active')) recoil = Math.max(0, recoil - dp*1.2);
                look.p -= dp;
            }
            touchX = t.clientX; touchY = t.clientY;
        }
    });
    window.addEventListener('touchend', e => { for(let t of e.changedTouches) if(t.identifier === moveId) { moveId = null; move.f=move.r=0; document.getElementById('joy-stick').style.transform = ''; } touchX = touchY = null; });
    
    document.getElementById('ads-btn').ontouchstart = (e) => { e.preventDefault(); isAds = !isAds; camera.fov = isAds ? 40 : 75; camera.updateProjectionMatrix(); };
    
    document.getElementById('heal-btn').ontouchstart = (e) => {
        e.preventDefault(); if(isHealing || hp >= 100) return;
        isHealing = true; let start = Date.now();
        document.getElementById('status').innerText = "WAITING...";
        const hInt = setInterval(() => {
            if(Date.now() - start > 3000) {
                document.getElementById('status').innerText = "HEALING";
                hp = Math.min(100, hp + 5);
                if(hp >= 100) { isHealing = false; document.getElementById('status').innerText = "READY"; clearInterval(hInt); }
            }
        }, 250);
    };

    function fire() {
        if(isHealing) return;
        const now = Date.now();
        if(now - lastFire < (wpn === 'asval' ? 65 : 150)) return;
        if(wpn === 'missile' && isAds && !missile) {
            missile = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 0.7), new THREE.MeshBasicMaterial({color: 0xf00}));
            missile.position.copy(camera.position); missile.velocity = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion).multiplyScalar(1.3);
            scene.add(missile);
        } else if(wpn !== 'missile') {
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.06), new THREE.MeshBasicMaterial({color: 0xff0}));
            b.position.copy(camera.position).add(new THREE.Vector3(0, -0.1, -0.3).applyQuaternion(camera.quaternion));
            b.velocity = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion).multiplyScalar(3.5);
            b.owner = 'p'; bullets.push(b); scene.add(b);
            recoil += (wpn === 'asval' ? 0.08 : 0.06);
        }
        lastFire = now;
    }
    document.getElementById('fire-btn').ontouchstart = (e) => { e.preventDefault(); fire(); };

    function animate() {
        requestAnimationFrame(animate);
        if(!isPlaying) return;
        if(document.getElementById('fire-btn').matches(':active')) fire();

        camera.rotation.set(look.p + recoil, look.y, 0, 'YXZ');
        recoil *= 0.85;

        // プレイヤー移動 & 衝突判定
        const oldP = camera.position.clone();
        const speed = isHealing ? 0.06 : 0.22;
        camera.translateX(move.r * speed); camera.translateZ(-move.f * speed);
        
        let collide = false;
        if(Math.abs(camera.position.x) > BOUND || Math.abs(camera.position.z) > BOUND) collide = true;
        walls.forEach(w => { if(camera.position.distanceTo(w.position) < 3.5) collide = true; });
        // 敵との衝突判定を追加
        enemies.forEach(e => { if(!e.userData.h && camera.position.distanceTo(e.position) < 2.0) collide = true; });
        
        if(collide) camera.position.copy(oldP);
        camera.position.y = 1.6;

        gun.position.copy(camera.position); gun.quaternion.copy(camera.quaternion);
        gun.translateX(isAds ? 0 : 0.22); gun.translateY(isAds ? -0.12 : -0.22); gun.translateZ(-0.4);

        if(missile) {
            const target = new THREE.Vector3(0,0,-1.5).applyQuaternion(camera.quaternion);
            missile.velocity.lerp(target, 0.12); missile.position.add(missile.velocity);
            missile.lookAt(missile.position.clone().add(missile.velocity));
            enemies.forEach((e, i) => { if(missile.position.distanceTo(e.position) < 4) { scene.remove(e); enemies.splice(i,1); score += 500; scene.remove(missile); missile=null; } });
            if(missile && missile.position.length() > 100) { scene.remove(missile); missile = null; }
        }

        // 敵AI：接近禁止距離（2.5m）を設定
        if(Math.random() < 0.03 && enemies.length < (phase===1?6:10)) {
            const h = (phase===2 && Math.random()<0.3);
            const e = new THREE.Mesh(new THREE.BoxGeometry(h?4:1.5, h?1:2.5, 1.5), new THREE.MeshStandardMaterial({color: h?0x0f0:0xf00}));
            e.position.set(Math.random()*60-30, h?12:1.25, Math.random()*60-30);
            e.userData = { h: h, hp: h?6:1 }; scene.add(e); enemies.push(e);
        }
        enemies.forEach(e => {
            const d = e.position.distanceTo(camera.position);
            const dir = new THREE.Vector3().subVectors(camera.position, e.position).normalize();
            const minNext = e.userData.h ? 15 : 2.5; // 2.5m以上離れている時だけ近づく
            
            if(d > minNext) {
                e.position.x += dir.x*0.09; e.position.z += dir.z*0.09;
            }
            if(Math.random()<0.012) {
                const eb = new THREE.Mesh(new THREE.SphereGeometry(0.12), new THREE.MeshBasicMaterial({color: 0xf0f}));
                eb.position.copy(e.position); eb.velocity = dir.multiplyScalar(0.6); eb.owner = 'e';
                bullets.push(eb); scene.add(eb);
            }
        });

        for(let i=bullets.length-1; i>=0; i--) {
            const b = bullets[i]; b.position.add(b.velocity);
            if(b.position.length() > 80) { scene.remove(b); bullets.splice(i,1); continue; }
            if(b.owner === 'p') {
                enemies.forEach((e, j) => { if(b.position.distanceTo(e.position) < 2) { e.userData.hp--; scene.remove(b); bullets.splice(i,1); if(e.userData.hp<=0){scene.remove(e); enemies.splice(j,1); score+=100;}}});
            } else if(b.position.distanceTo(camera.position) < 1.3) {
                hp -= 10; scene.remove(b); bullets.splice(i,1);
                const flash = document.getElementById('dmg-flash'); flash.style.display = 'block'; setTimeout(() => flash.style.display = 'none', 80);
                if(hp<=0) location.reload();
            }
        }

        if(phase===1 && score>=2000) { phase=2; isPlaying=false; document.getElementById('sec-menu').style.display='flex'; }
        document.getElementById('hp-val').innerText = Math.floor(hp); document.getElementById('score-val').innerText = score;
        renderer.render(scene, camera);
    }
    init();
</script>
</body>
</html>
