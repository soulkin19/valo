<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical FPS: Arsenal Expansion</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; background: #000; touch-action: none; }
        canvas { display: block; }
        #menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(10,10,10,0.95); display: flex; flex-direction: column;
            align-items: center; justify-content: center; color: #fff; z-index: 20;
        }
        .config-group { margin: 10px; width: 340px; padding: 15px; border-left: 3px solid #f00; background: #111; }
        select { width: 100%; padding: 10px; background: #222; color: #fff; border: 1px solid #444; font-size: 14px; outline: none; }
        #start-btn { margin-top: 20px; padding: 15px 80px; background: #f00; color: #fff; border: none; cursor: pointer; font-weight: bold; }
        
        #ui { position: absolute; top: 20px; left: 20px; color: #f00; font-size: 18px; font-weight: bold; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 24px; height: 24px; border: 1px solid #f00; transform: translate(-50%, -50%); pointer-events: none; }
        #fire-button { position: absolute; bottom: 50px; right: 50px; width: 110px; height: 110px; background: rgba(100,0,0,0.5); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; border: 2px solid #f00; }
        #joystick-container { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; background: rgba(255,255,255,0.05); border-radius: 50%; border: 1px solid #444; }
        #joystick-knob { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: #222; border-radius: 50%; border: 1px solid #f00; }
    </style>
</head>
<body>

<div id="menu">
    <h1 style="color:#f00;">WEAPON SELECTION</h1>
    <div class="config-group">
        <label>PRIMARY WEAPON</label>
        <select id="gun-type" onchange="toggleAmmoSelect()">
            <option value="m16">M16 (3-BURST)</option>
            <option value="asval">AS VAL (972+ RPM)</option>
            <option value="ak47">AK-47 (HIGH DMG)</option>
            <option value="awm">AWM (SNIPER)</option>
            <option value="s12k">S12K (SHOTGUN)</option>
        </select>
    </div>
    <div class="config-group" id="ammo-group" style="display:none;">
        <label>SHOTGUN AMMO</label>
        <select id="ammo-type">
            <option value="8mm">8mm BUCKSHOT (STANDARD)</option>
            <option value="dragon">DRAGON'S BREATH (FIRE/WIDE)</option>
            <option value="slug">SLUG (SINGLE/PRECISION)</option>
        </select>
    </div>
    <button id="start-btn">DEPLOY</button>
</div>

<div id="ui">SCORE: <span id="score">0</span> | <span id="w-info">-</span></div>
<div id="crosshair"></div>
<div id="joystick-container"><div id="joystick-knob"></div></div>
<div id="fire-button">FIRE</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    let selectedGun, selectedAmmo, isPlaying = false, isFiring = false;
    const FIELD_SIZE = 70;
    let score = 0, lastFireTime = 0, recoilY = 0, shake = 0, yaw = 0, pitch = 0;
    let moveF = 0, moveR = 0, lastX, lastY, moveTouchId = null;

    // シーン設定
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x222222);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(10, 20, 10);
    scene.add(sun);

    const floor = new THREE.Mesh(new THREE.PlaneGeometry(FIELD_SIZE, FIELD_SIZE), new THREE.MeshStandardMaterial({color: 0x444444}));
    floor.rotation.x = -Math.PI/2;
    scene.add(floor);

    const obstacles = [];
    for(let i=0; i<15; i++) {
        const box = new THREE.Mesh(new THREE.BoxGeometry(4, 4, 4), new THREE.MeshStandardMaterial({color: 0x111111}));
        box.position.set((Math.random()-0.5)*50, 2, (Math.random()-0.5)*50);
        scene.add(box);
        obstacles.push(box);
    }

    const gunGroup = new THREE.Group();
    const gunBody = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.2, 0.8), new THREE.MeshStandardMaterial({color: 0x050505}));
    gunGroup.add(gunBody);
    scene.add(gunGroup);

    const flash = new THREE.PointLight(0xffaa00, 0, 4);
    scene.add(flash);

    let enemies = [], bullets = [];

    // メニュー連動
    window.toggleAmmoSelect = () => {
        const isS12K = document.getElementById('gun-type').value === 's12k';
        document.getElementById('ammo-group').style.display = isS12K ? 'block' : 'none';
    };

    document.getElementById('start-btn').onclick = () => {
        selectedGun = document.getElementById('gun-type').value;
        selectedAmmo = document.getElementById('ammo-type').value;
        document.getElementById('w-info').innerText = `${selectedGun.toUpperCase()}${selectedGun === 's12k' ? ':'+selectedAmmo : ''}`;
        document.getElementById('menu').style.display = 'none';
        isPlaying = true;
    };

    async function fire() {
        const now = Date.now();
        let interval = 400;
        
        if(selectedGun === "asval") interval = 55;
        if(selectedGun === "m16") interval = 500;
        if(selectedGun === "ak47") interval = 120;
        if(selectedGun === "awm") interval = 1500;
        if(selectedGun === "s12k") interval = 500;

        if (now - lastFireTime < interval) return;

        if (selectedGun === "m16") {
            for(let i=0; i<3; i++) { spawnBullet(); recoilY += 0.05; await new Promise(r => setTimeout(r, 70)); }
        } else if (selectedGun === "s12k") {
            if(selectedAmmo === "slug") {
                spawnBullet(false, 0xffffff, 0.2, 1.5); // Slug: 大きくて白い
                recoilY += 0.35;
            } else if(selectedAmmo === "dragon") {
                for(let i=0; i<20; i++) spawnBullet(true, 0xff4400, 0.1, 0.1); // Dragon: 赤/短射程/多弾
                recoilY += 0.2;
            } else {
                for(let i=0; i<10; i++) spawnBullet(true); // 8mm
                recoilY += 0.25;
            }
        } else if (selectedGun === "awm") {
            spawnBullet(false, 0x00ffff, 0.1, 5.0); // Sniper: 超長射程
            recoilY += 0.8; // 強烈な単発反動
        } else { // AK47, ASVAL
            spawnBullet();
            recoilY += selectedGun === "ak47" ? 0.15 : 0.22;
        }
        
        flash.intensity = 10;
        setTimeout(() => flash.intensity = 0, 40);
        lastFireTime = Date.now();
    }

    function spawnBullet(isSpread = false, color = 0xffff00, size = 0.08, life = 1.0) {
        const b = new THREE.Mesh(new THREE.SphereGeometry(size), new THREE.MeshBasicMaterial({color: color}));
        b.position.copy(camera.position).add(new THREE.Vector3(0.3, -0.2, -0.6).applyQuaternion(camera.quaternion));
        const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
        
        if(isSpread) {
            const spread = selectedAmmo === "dragon" ? 0.4 : 0.2;
            dir.x += (Math.random()-0.5)*spread;
            dir.y += (Math.random()-0.5)*spread;
        }
        
        b.velocity = dir.normalize().multiplyScalar(2.5);
        b.life = life;
        bullets.push(b);
        scene.add(b);
    }

    // 操作
    const knob = document.getElementById('joystick-knob');
    window.addEventListener('touchstart', e => {
        for(let t of e.changedTouches) if(t.clientX < window.innerWidth/2) moveTouchId = t.identifier;
    });
    window.addEventListener('touchmove', e => {
        for(let t of e.changedTouches) {
            if(t.identifier === moveTouchId) {
                const rect = document.getElementById('joystick-container').getBoundingClientRect();
                const dx = t.clientX - (rect.left+60), dy = t.clientY - (rect.top+60);
                const d = Math.min(Math.sqrt(dx*dx+dy*dy), 50);
                const a = Math.atan2(dy, dx);
                knob.style.transform = `translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px)`;
                moveF = -Math.sin(a)*(d/50); moveR = Math.cos(a)*(d/50);
            } else if(lastX) {
                const dX = (t.clientX - lastX) * 0.005, dY = (t.clientY - lastY) * 0.005;
                yaw -= dX; 
                if(isFiring && dY > 0) recoilY = Math.max(0, recoilY - dY*2); // リコイル制御
                pitch -= dY;
                lastX = t.clientX; lastY = t.clientY;
            } else { lastX = t.clientX; lastY = t.clientY; }
        }
    });
    window.addEventListener('touchend', e => {
        for(let t of e.changedTouches) if(t.identifier === moveTouchId) { moveTouchId = null; moveF = moveR = 0; knob.style.transform = ''; }
        lastX = lastY = null;
    });

    document.getElementById('fire-button').ontouchstart = (e) => { e.preventDefault(); isFiring = true; };
    window.ontouchend = () => { isFiring = false; };

    function animate() {
        requestAnimationFrame(animate);
        if(!isPlaying) return;
        if(isFiring) fire();

        camera.rotation.set(pitch + recoilY, yaw, 0, 'YXZ');
        recoilY *= 0.85;

        const oldPos = camera.position.clone();
        camera.translateX(moveR * 0.18); camera.translateZ(-moveF * 0.18);
        obstacles.forEach(obs => { if(camera.position.distanceTo(obs.position) < 3) camera.position.copy(oldPos); });
        if(Math.abs(camera.position.x) > FIELD_SIZE/2 - 2 || Math.abs(camera.position.z) > FIELD_SIZE/2 - 2) camera.position.copy(oldPos);
        camera.position.y = 1.6;

        gunGroup.position.copy(camera.position); gunGroup.quaternion.copy(camera.quaternion);
        gunGroup.translateX(0.3); gunGroup.translateY(-0.25); gunGroup.translateZ(-0.5);
        flash.position.copy(gunGroup.position).add(new THREE.Vector3(0,0,-0.5).applyQuaternion(gunGroup.quaternion));

        // 敵
        if(Math.random() < 0.04 && enemies.length < 10) {
            const e = new THREE.Mesh(new THREE.BoxGeometry(1.5, 2.5, 1.5), new THREE.MeshStandardMaterial({color: 0xff0000}));
            e.position.set((Math.random()-0.5)*50, 1.25, (Math.random()-0.5)*50);
            scene.add(e); enemies.push(e);
        }
        enemies.forEach(e => {
            const d = new THREE.Vector3().subVectors(camera.position, e.position).normalize();
            e.position.x += d.x * 0.08; e.position.z += d.z * 0.08;
        });

        // 弾道
        for(let i=bullets.length-1; i>=0; i--) {
            bullets[i].position.add(bullets[i].velocity);
            bullets[i].life -= 0.02;
            if(bullets[i].life <= 0) { scene.remove(bullets[i]); bullets.splice(i, 1); continue; }
            enemies.forEach((e, j) => {
                if(bullets[i].position.distanceTo(e.position) < 1.8) {
                    scene.remove(e); enemies.splice(j, 1);
                    scene.remove(bullets[i]); bullets.splice(i, 1);
                    score += 100; document.getElementById('score').innerText = score;
                }
            });
        }
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
