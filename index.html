<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Tactical Heli-Hunt</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; font-family: sans-serif; }
        #hud { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; z-index: 10; }
        
        /* 移動用 */
        #move-joy {
            position: absolute; bottom: 50px; left: 40px;
            width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%;
        }
        #move-knob {
            position: absolute; top: 30px; left: 30px;
            width: 40px; height: 40px; background: rgba(255,255,255,0.4); border-radius: 50%;
        }

        /* 射撃ボタン（視点操作に干渉しないよう独立） */
        #fire-btn {
            position: absolute; bottom: 60px; right: 40px;
            width: 90px; height: 90px; background: rgba(255, 0, 0, 0.6);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; border: 4px solid #fff; z-index: 20;
        }

        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px; border: 2px solid #0f0;
            transform: translate(-50%, -50%); border-radius: 50%; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="hud">HP: <span id="hp">100</span> | HELI: <span id="ecount">1</span></div>
    <div id="crosshair"></div>
    <div id="move-joy"><div id="move-knob"></div></div>
    <div id="fire-btn">FIRE</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 初期設定 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a15);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 5); // 1.6m (目線の高さ)
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xaaaaaa));
        const sun = new THREE.DirectionalLight(0xffffff, 1);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // --- ステージ作成 ---
        const ground = new THREE.GridHelper(40, 40, 0x00ff00, 0x333333);
        scene.add(ground);

        // 遮蔽物 (コンテナ風の箱)
        const walls = [];
        function createWall(x, z, w, h, d) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshStandardMaterial({ color: 0x555555 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, h/2, z);
            scene.add(mesh);
            const box = new THREE.Box3().setFromObject(mesh);
            walls.push({ mesh, box });
        }
        createWall(5, -5, 4, 3, 2);  // 右前
        createWall(-6, -8, 3, 3, 6); // 左前
        createWall(0, -15, 8, 4, 2); // 正面奥

        // --- 敵ヘリ ---
        let heli = null;
        function spawnHeli() {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(3, 1, 5), new THREE.MeshStandardMaterial({color: 0x222222}));
            group.add(body);
            const rotor = new THREE.Mesh(new THREE.BoxGeometry(8, 0.1, 0.5), new THREE.MeshStandardMaterial({color: 0x000000}));
            rotor.position.y = 0.8;
            group.add(rotor);
            group.position.set(0, 12, -25);
            scene.add(group);
            return { mesh: group, rotor, hp: 100, lastShot: 0 };
        }
        heli = spawnHeli();

        // --- 操作系 ---
        let yaw = 0, pitch = 0, moveVec = { x: 0, y: 0 };
        let lastTouchId = null, lastTouchX = 0, lastTouchY = 0;
        let bullets = [], enemyBullets = [], playerHP = 100;

        // 移動
        const joy = document.getElementById('move-joy');
        const knob = document.getElementById('move-knob');
        joy.addEventListener('touchstart', e => e.stopPropagation());
        joy.addEventListener('touchmove', e => {
            const t = e.touches[0];
            const r = joy.getBoundingClientRect();
            let dx = t.clientX - (r.left + 50), dy = t.clientY - (r.top + 50);
            const d = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
            const a = Math.atan2(dy, dx);
            moveVec.x = (Math.cos(a) * d) / 40;
            moveVec.y = (Math.sin(a) * d) / 40;
            knob.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
        });
        joy.addEventListener('touchend', () => { moveVec = {x:0, y:0}; knob.style.transform = 'translate(0,0)'; });

        // 視点移動 (FIREボタン以外)
        window.addEventListener('touchstart', e => {
            for (let t of e.changedTouches) {
                if (t.target.id !== 'fire-btn' && t.clientX > window.innerWidth / 3) {
                    lastTouchId = t.identifier;
                    lastTouchX = t.clientX; lastTouchY = t.clientY;
                }
            }
        });
        window.addEventListener('touchmove', e => {
            for (let t of e.touches) {
                if (t.identifier === lastTouchId) {
                    yaw -= (t.clientX - lastTouchX) * 0.005;
                    pitch -= (t.clientY - lastTouchY) * 0.005;
                    pitch = Math.max(-1.4, Math.min(1.4, pitch));
                    lastTouchX = t.clientX; lastTouchY = t.clientY;
                }
            }
        });

        // 射撃
        document.getElementById('fire-btn').addEventListener('touchstart', e => {
            e.preventDefault();
            const b = new THREE.Mesh(new THREE.SphereGeometry(0.2), new THREE.MeshBasicMaterial({color: 0xffff00}));
            b.position.copy(camera.position);
            const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
            b.userData.vel = dir.multiplyScalar(1.5);
            bullets.push(b); scene.add(b);
        });

        // --- ループ ---
        function animate() {
            requestAnimationFrame(animate);
            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));

            // 移動と衝突判定
            if(moveVec.x !== 0 || moveVec.y !== 0) {
                const oldPos = camera.position.clone();
                const f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y = 0; f.normalize();
                const r = new THREE.Vector3().crossVectors(f, new THREE.Vector3(0,1,0)).negate();
                camera.position.addScaledVector(f, -moveVec.y * 0.15);
                camera.position.addScaledVector(r, -moveVec.x * 0.15);

                // エリア制限 (±20m)
                camera.position.x = Math.max(-19, Math.min(19, camera.position.x));
                camera.position.z = Math.max(-19, Math.min(19, camera.position.z));

                // 遮蔽物との衝突
                const pBox = new THREE.Box3().setFromCenterAndSize(camera.position, new THREE.Vector3(1, 2, 1));
                walls.forEach(w => { if(pBox.intersectsBox(w.box)) camera.position.copy(oldPos); });
            }

            // 自弾更新
            bullets.forEach((b, i) => {
                b.position.add(b.userData.vel);
                if(heli && b.position.distanceTo(heli.mesh.position) < 2.5) {
                    heli.hp -= 5; scene.remove(b); bullets.splice(i, 1);
                    if(heli.hp <= 0) { scene.remove(heli.mesh); heli = null; document.getElementById('ecount').innerText = 0; }
                }
                walls.forEach(w => { if(w.box.containsPoint(b.position)) { scene.remove(b); bullets.splice(i, 1); } });
            });

            // 敵ヘリAI
            if(heli) {
                heli.rotor.rotation.y += 0.4;
                heli.mesh.position.x = Math.sin(Date.now()*0.001) * 15;
                if(Date.now() - heli.lastShot > 1200) {
                    const eb = new THREE.Mesh(new THREE.BoxGeometry(0.2,0.2,0.8), new THREE.MeshBasicMaterial({color: 0xff0000}));
                    eb.position.copy(heli.mesh.position);
                    eb.lookAt(camera.position);
                    eb.userData.vel = new THREE.Vector3().subVectors(camera.position, heli.mesh.position).normalize().multiplyScalar(0.4);
                    enemyBullets.push(eb); scene.add(eb);
                    heli.lastShot = Date.now();
                }
            }

            // 敵弾更新
            enemyBullets.forEach((eb, i) => {
                eb.position.add(eb.userData.vel);
                if(eb.position.distanceTo(camera.position) < 1) {
                    playerHP -= 10; document.getElementById('hp').innerText = playerHP;
                    scene.remove(eb); enemyBullets.splice(i, 1);
                }
                walls.forEach(w => { if(w.box.containsPoint(eb.position)) { scene.remove(eb); enemyBullets.splice(i, 1); } });
            });

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
