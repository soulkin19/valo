<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>iPad FPS - Weapon System</title>
    <style>
        body { margin: 0; overflow: hidden; background: #eee; touch-action: none; font-family: 'Courier New', monospace; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px; border: 2px solid #333;
            border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none;
        }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #000; pointer-events: none;
            background: rgba(255,255,255,0.7); padding: 10px; border-radius: 5px;
        }
        #msg {
            position: absolute; width: 100%; top: 40%; text-align: center;
            color: #333; font-size: 20px; pointer-events: none; font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="msg">画面を一度タップして開始<br>[1-5]: 武器変更 / [R]: リロード</div>
    <div id="crosshair"></div>
    <div id="ui">
        SCORE: <span id="score">0</span><br>
        WEAPON: <span id="weapon-name">Pistol</span><br>
        AMMO: <span id="ammo">10</span> / <span id="max-ammo">10</span>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- シーン設定（背景を明るく） ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // 青空
        scene.fog = new THREE.Fog(0x87ceeb, 20, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- ライティング ---
        const sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
        sunLight.position.set(10, 20, 10);
        scene.add(sunLight);
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        // --- 地面 ---
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(200, 200),
            new THREE.MeshStandardMaterial({ color: 0x99cc99 }) // 明るい芝生色
        );
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);
        scene.add(new THREE.GridHelper(200, 40, 0x000000, 0x888888));

        // --- 武器データ ---
        const weapons = {
            1: { name: "Pistol", ammo: 10, maxAmmo: 10, speed: 0.8, color: 0xffff00, size: 0.2 },
            2: { name: "Rifle", ammo: 30, maxAmmo: 30, speed: 1.2, color: 0xff0000, size: 0.1 },
            3: { name: "Shotgun", ammo: 5, maxAmmo: 5, speed: 0.6, color: 0x0000ff, size: 0.3 },
            4: { name: "Sniper", ammo: 5, maxAmmo: 5, speed: 2.0, color: 0xffffff, size: 0.15 },
            5: { name: "Plasma", ammo: 50, maxAmmo: 50, speed: 0.5, color: 0x00ffff, size: 0.25 }
        };
        let currentWep = weapons[1];

        // --- 状態管理 ---
        let score = 0;
        const keys = {};
        const bullets = [];
        const bots = [];

        window.addEventListener('touchstart', () => {
            document.getElementById('msg').style.display = 'none';
        }, { once: true });

        // --- キー入力処理 ---
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            
            // 武器切り替え
            if (weapons[e.key]) {
                currentWep = weapons[e.key];
                updateUI();
            }

            // リロード
            if (e.code === 'KeyR') reload();

            // スペースで射撃
            if (e.code === 'Space') shoot();
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function updateUI() {
            document.getElementById('weapon-name').innerText = currentWep.name;
            document.getElementById('ammo').innerText = currentWep.ammo;
            document.getElementById('max-ammo').innerText = currentWep.maxAmmo;
            document.getElementById('score').innerText = score;
        }

        function reload() {
            if (currentWep.ammo === currentWep.maxAmmo) return;
            document.getElementById('msg').innerText = "RELOADING...";
            document.getElementById('msg').style.display = 'block';
            setTimeout(() => {
                currentWep.ammo = currentWep.maxAmmo;
                updateUI();
                document.getElementById('msg').style.display = 'none';
            }, 1000);
        }

        function shoot() {
            if (currentWep.ammo <= 0) {
                document.getElementById('msg').innerText = "OUT OF AMMO! PRESS R";
                document.getElementById('msg').style.display = 'block';
                return;
            }
            currentWep.ammo--;
            updateUI();

            const b = new THREE.Mesh(
                new THREE.SphereGeometry(currentWep.size, 8, 8),
                new THREE.MeshBasicMaterial({ color: currentWep.color })
            );
            b.position.copy(camera.position);
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            b.velocity = dir.multiplyScalar(currentWep.speed);
            scene.add(b);
            bullets.push(b);
        }

        // --- 敵の生成 ---
        for(let i=0; i<6; i++) {
            const bot = new THREE.Mesh(
                new THREE.BoxGeometry(1, 2, 1),
                new THREE.MeshStandardMaterial({ color: 0xcc0000 })
            );
            bot.position.set(Math.random()*40-20, 1, -Math.random()*30-5);
            scene.add(bot);
            bots.push(bot);
        }

        // --- 視点操作 ---
        let lon = 0, lat = 0;
        window.addEventListener('mousemove', (e) => {
            lon -= e.movementX * 0.004;
            lat -= e.movementY * 0.004;
            lat = Math.max(-Math.PI/2, Math.min(Math.PI/2, lat));
        });

        function animate() {
            requestAnimationFrame(animate);
            camera.quaternion.setFromEuler(new THREE.Euler(lat, lon, 0, 'YXZ'));

            // WASD移動
            const dir = new THREE.Vector3();
            if (keys['KeyW']) dir.z -= 0.1;
            if (keys['KeyS']) dir.z += 0.1;
            if (keys['KeyA']) dir.x -= 0.1;
            if (keys['KeyD']) dir.x += 0.1;
            camera.translateOnAxis(dir.normalize(), 0.1);
            camera.position.y = 1.6;

            // 弾丸更新
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.position.add(b.velocity);
                bots.forEach(bot => {
                    if (b.position.distanceTo(bot.position) < 1.5) {
                        bot.position.set(Math.random()*40-20, 1, -Math.random()*40);
                        score += 100;
                        updateUI();
                        scene.remove(b);
                        bullets.splice(i, 1);
                    }
                });
                if(b.position.length() > 60) {
                    scene.remove(b);
                    bullets.splice(i, 1);
                }
            }

            // ボット接近
            bots.forEach(bot => {
                const moveDir = new THREE.Vector3().subVectors(camera.position, bot.position);
                moveDir.y = 0;
                bot.position.add(moveDir.normalize().multiplyScalar(0.04));
            });

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
