<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>モバイル・ドッグファイト</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* スクロール禁止 */
            background-color: #87CEEB; /* 空の色 */
            touch-action: none; /* デフォルトのタッチアクションを無効化 */
            font-family: sans-serif;
        }
        canvas {
            display: block;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #333;
            font-size: 20px;
            font-weight: bold;
            pointer-events: none;
        }
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #333;
            display: none;
        }
        #gameOver h1 {
            font-size: 36px;
            margin: 0 0 20px 0;
            color: #d32f2f;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #1976d2;
            color: white;
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        button:active {
            background-color: #115293;
            transform: translateY(2px);
        }
    </style>
</head>
<body>

    <div id="ui">スコア: <span id="score">0</span></div>
    
    <div id="gameOver">
        <h1>GAME OVER</h1>
        <button id="restartBtn">もう一度プレイ</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverScreen = document.getElementById('gameOver');
        const restartBtn = document.getElementById('restartBtn');

        // 画面サイズを全画面に設定
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // ゲーム変数の初期化
        let score = 0;
        let frameCount = 0;
        let isGameOver = false;
        let animationId;

        // オブジェクトの配列
        let bullets = [];
        let enemies = [];
        let particles = [];

        // 自機のオブジェクト
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 100,
            width: 40,
            height: 40,
            color: '#1976d2'
        };

        // タッチ操作（自機の移動）
        canvas.addEventListener('touchmove', (e) => {
            if (isGameOver) return;
            e.preventDefault(); // スクロール防止
            const touch = e.touches[0];
            player.x = touch.clientX;
            // 画面外に出ないように制限
            player.y = Math.max(canvas.height / 2, Math.min(touch.clientY, canvas.height - player.height / 2));
        }, { passive: false });

        canvas.addEventListener('touchstart', (e) => {
            if (isGameOver) return;
            const touch = e.touches[0];
            player.x = touch.clientX;
            player.y = Math.max(canvas.height / 2, Math.min(touch.clientY, canvas.height - player.height / 2));
        }, { passive: false });

        // ゲームのリセット
        function resetGame() {
            score = 0;
            frameCount = 0;
            isGameOver = false;
            bullets = [];
            enemies = [];
            particles = [];
            player.x = canvas.width / 2;
            player.y = canvas.height - 100;
            scoreElement.innerText = score;
            gameOverScreen.style.display = 'none';
            gameLoop();
        }

        restartBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            resetGame();
        });

        // 当たり判定 (矩形)
        function checkCollision(rect1, rect2) {
            return (
                rect1.x - rect1.width/2 < rect2.x + rect2.width/2 &&
                rect1.x + rect1.width/2 > rect2.x - rect2.width/2 &&
                rect1.y - rect1.height/2 < rect2.y + rect2.height/2 &&
                rect1.y + rect1.height/2 > rect2.y - rect2.height/2
            );
        }

        // 爆発エフェクトの生成
        function createExplosion(x, y, color) {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: (Math.random() - 0.5) * 10,
                    life: 30,
                    color: color
                });
            }
        }

        // ゲームのメインループ
        function gameLoop() {
            if (isGameOver) return;

            // 画面のクリア
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            frameCount++;

            // 背景の雲（簡易的）を描画
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.beginPath();
            ctx.arc(canvas.width * 0.2, (frameCount * 0.5) % canvas.height, 30, 0, Math.PI * 2);
            ctx.arc(canvas.width * 0.8, (frameCount * 0.8 + 200) % canvas.height, 40, 0, Math.PI * 2);
            ctx.fill();

            // 自機の描画 (三角形の戦闘機)
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.moveTo(player.x, player.y - player.height / 2);
            ctx.lineTo(player.x - player.width / 2, player.y + player.height / 2);
            ctx.lineTo(player.x + player.width / 2, player.y + player.height / 2);
            ctx.fill();

            // 弾の自動発射 (10フレーム毎)
            if (frameCount % 10 === 0) {
                bullets.push({
                    x: player.x,
                    y: player.y - player.height / 2,
                    width: 6,
                    height: 15,
                    speed: 15,
                    color: '#ffeb3b'
                });
            }

            // 敵の自動生成 (難易度に応じて頻度上昇)
            let spawnRate = Math.max(20, 60 - Math.floor(score / 50));
            if (frameCount % spawnRate === 0) {
                enemies.push({
                    x: Math.random() * (canvas.width - 40) + 20,
                    y: -40,
                    width: 40,
                    height: 40,
                    speed: 3 + Math.random() * 3 + (score / 200), // スコアで加速
                    color: '#d32f2f'
                });
            }

            // 弾の更新と描画
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.y -= b.speed;
                
                ctx.fillStyle = b.color;
                ctx.fillRect(b.x - b.width/2, b.y - b.height/2, b.width, b.height);

                // 画面外の弾を削除
                if (b.y < 0) {
                    bullets.splice(i, 1);
                }
            }

            // 敵の更新と描画、および衝突判定
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.y += e.speed;

                // 敵機の描画 (逆三角形)
                ctx.fillStyle = e.color;
                ctx.beginPath();
                ctx.moveTo(e.x, e.y + e.height / 2);
                ctx.lineTo(e.x - e.width / 2, e.y - e.height / 2);
                ctx.lineTo(e.x + e.width / 2, e.y - e.height / 2);
                ctx.fill();

                // 画面外の敵を削除
                if (e.y > canvas.height + 50) {
                    enemies.splice(i, 1);
                    continue;
                }

                // 自機との衝突判定
                if (checkCollision(player, e)) {
                    createExplosion(player.x, player.y, player.color);
                    isGameOver = true;
                }

                // 弾との衝突判定
                for (let j = bullets.length - 1; j >= 0; j--) {
                    const b = bullets[j];
                    if (checkCollision(b, e)) {
                        createExplosion(e.x, e.y, e.color); // 爆発エフェクト
                        enemies.splice(i, 1);
                        bullets.splice(j, 1);
                        score += 10;
                        scoreElement.innerText = score;
                        break; // 1発の弾で1機の敵を破壊
                    }
                }
            }

            // パーティクル（爆発エフェクト）の更新と描画
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life--;

                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / 30; // だんだん透明に
                ctx.beginPath();
                ctx.arc(p.x, p.y, Math.random() * 5 + 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;

                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }

            if (isGameOver) {
                gameOverScreen.style.display = 'block';
                return; // ループ停止
            }

            animationId = requestAnimationFrame(gameLoop);
        }

        // ゲーム開始
        gameLoop();

    </script>
</body>
</html>
