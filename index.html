<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Simple JS FPS - Vs Bot</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px;
            border: 2px solid white; border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #instructions {
            position: absolute; top: 10px; left: 10px;
            color: white; background: rgba(0,0,0,0.5); padding: 10px;
        }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="instructions">クリックで開始 / WASDで移動 / クリックで射撃</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- 初期設定 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // 空の色
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 照明 ---
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7.5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // --- 地面 ---
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshPhongMaterial({ color: 0x555555 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // --- コントロール ---
        const controls = new PointerLockControls(camera, document.body);
        document.addEventListener('click', () => controls.lock());

        // --- ボット (敵) ---
        const botGeo = new THREE.BoxGeometry(1, 2, 1);
        const botMat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
        const bot = new THREE.Mesh(botGeo, botMat);
        bot.position.set(10, 1, -10);
        scene.add(bot);

        // --- 弾丸の処理 ---
        const bullets = [];
        const shoot = () => {
            const bGeo = new THREE.SphereGeometry(0.1, 8, 8);
            const bMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
            const bullet = new THREE.Mesh(bGeo, bMat);
            
            bullet.position.copy(camera.position);
            const direction = new THREE.Vector3();
            camera.getWorldDirection(direction);
            bullet.velocity = direction.multiplyScalar(0.5);
            
            scene.add(bullet);
            bullets.push(bullet);
        };

        window.addEventListener('mousedown', (e) => {
            if (controls.isLocked) shoot();
        });

        // --- 移動入力 ---
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
        const onKeyDown = (e) => {
            if (e.code === 'KeyW') moveForward = true;
            if (e.code === 'KeyS') moveBackward = true;
            if (e.code === 'KeyA') moveLeft = true;
            if (e.code === 'KeyD') moveRight = true;
        };
        const onKeyUp = (e) => {
            if (e.code === 'KeyW') moveForward = false;
            if (e.code === 'KeyS') moveBackward = false;
            if (e.code === 'KeyA') moveLeft = false;
            if (e.code === 'KeyD') moveRight = false;
        };
        document.addEventListener('keydown', onKeyDown);
        document.addEventListener('keyup', onKeyUp);

        // --- メインループ ---
        const velocity = new THREE.Vector3();
        function animate() {
            requestAnimationFrame(animate);

            if (controls.isLocked) {
                // プレイヤーの移動
                const speed = 0.1;
                if (moveForward) controls.moveForward(speed);
                if (moveBackward) controls.moveForward(-speed);
                if (moveLeft) controls.moveRight(-speed);
                if (moveRight) controls.moveRight(speed);

                // ボットのAI (単純にプレイヤーを追う)
                const botSpeed = 0.03;
                const dirToPlayer = new THREE.Vector3().subVectors(camera.position, bot.position);
                dirToPlayer.y = 0; // 浮かび上がらないように
                bot.position.add(dirToPlayer.normalize().multiplyScalar(botSpeed));

                // 弾丸の更新と当たり判定
                bullets.forEach((b, i) => {
                    b.position.add(b.velocity);
                    if (b.position.distanceTo(bot.position) < 1) {
                        bot.position.set(Math.random()*20-10, 1, Math.random()*20-10); // リスポーン
                        scene.remove(b);
                        bullets.splice(i, 1);
                    }
                    // 遠くに行ったら削除
                    if (b.position.length() > 100) {
                        scene.remove(b);
                        bullets.splice(i, 1);
                    }
                });
            }

            renderer.render(scene, camera);
        }
        animate();

        // ウィンドウリサイズ対応
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
