<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Advanced Mobile Shooter</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; font-family: sans-serif; }
        #hud { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
        
        /* 左側の移動用ジョイスティック */
        #move-joy-container {
            position: absolute; bottom: 50px; left: 40px;
            width: 100px; height: 100px; background: rgba(255,255,255,0.1); border-radius: 50%;
        }
        #move-joy-knob {
            position: absolute; top: 30px; left: 30px;
            width: 40px; height: 40px; background: rgba(255,255,255,0.4); border-radius: 50%;
        }

        /* 右下の射撃ボタン */
        #fire-btn {
            position: absolute; bottom: 60px; right: 40px;
            width: 80px; height: 80px; background: rgba(255, 50, 50, 0.6);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 16px; border: 3px solid #fff;
        }

        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 24px; height: 24px; border: 2px solid rgba(255,255,255,0.5);
            transform: translate(-50%, -50%); border-radius: 50%; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="hud">HP: <span id="hp">100</span> | TARGETS: <span id="ecount">3</span></div>
    <div id="crosshair"></div>
    <div id="move-joy-container"><div id="move-joy-knob"></div></div>
    <div id="fire-btn">FIRE</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- シーン・カメラ設定 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050510);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0x888888));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        const ground = new THREE.GridHelper(200, 50, 0x4444ff, 0x222222);
        scene.add(ground);

        // --- 操作変数 ---
        let moveVec = { x: 0, y: 0 };
        let yaw = 0, pitch = 0;
        let lastTouchX = 0, lastTouchY = 0;

        // 移動用ジョイスティックのロジック
        const joyContainer = document.getElementById('move-joy-container');
        const joyKnob = document.getElementById('move-joy-knob');
        
        joyContainer.addEventListener('touchstart', e => { e.stopPropagation(); }, {passive: false});
        joyContainer.addEventListener('touchmove', e => {
            const touch = e.touches[0];
            const rect = joyContainer.getBoundingClientRect();
            let dx = touch.clientX - (rect.left + 50);
            let dy = touch.clientY - (rect.top + 50);
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
            const angle = Math.atan2(dy, dx);
            
            const moveX = Math.cos(angle) * dist;
            const moveY = Math.sin(angle) * dist;
            joyKnob.style.transform = `translate(${moveX}px, ${moveY}px)`;
            
            moveVec.x = moveX / 40;
            moveVec.y = moveY / 40;
        });
        joyContainer.addEventListener('touchend', () => {
            joyKnob.style.transform = `translate(0,0)`;
            moveVec = { x: 0, y: 0 };
        });

        // 画面右半分のスライドで視点操作
        window.addEventListener('touchstart', e => {
            const touch = e.touches[0];
            if (touch.clientX > window.innerWidth / 2) {
                lastTouchX = touch.clientX;
                lastTouchY = touch.clientY;
            }
        });

        window.addEventListener('touchmove', e => {
            const touch = Array.from(e.touches).find(t => t.clientX > window.innerWidth / 2);
            if (touch) {
                const dx = touch.clientX - lastTouchX;
                const dy = touch.clientY - lastTouchY;
                yaw -= dx * 0.005;
                pitch -= dy * 0.005;
                pitch = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, pitch));
                lastTouchX = touch.clientX;
                lastTouchY = touch.clientY;
            }
        });

        // --- ゲームループ ---
        function animate() {
            requestAnimationFrame(animate);

            // 視点更新
            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));

            // 移動計算 (カメラの向きに合わせて前後左右に移動)
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            forward.y = 0; forward.normalize();
            const right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0,1,0)).negate();

            camera.position.addScaledVector(forward, -moveVec.y * 0.2);
            camera.position.addScaledVector(right, -moveVec.x * 0.2);

            renderer.render(scene, camera);
        }
        animate();

        // 射撃ボタンの動作（簡易）
        document.getElementById('fire-btn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            console.log("射撃！");
            // ここに弾丸生成ロジックを追加
        });
    </script>
</body>
</html>
