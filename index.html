<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>VALORANT Clone - Bot AI Update</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; background: #000; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 10px; height: 10px;
            border: 2px solid #00ff00;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #ui {
            position: absolute; bottom: 30px; left: 30px;
            color: white; text-shadow: 2px 2px 4px #000;
        }
        .stat { font-size: 32px; font-weight: bold; margin-bottom: 5px; }
        #hp-bar-container { width: 200px; height: 10px; background: #444; border: 2px solid #fff; }
        #hp-bar { width: 100%; height: 100%; background: #00ff88; transition: width 0.2s; }
        #msg {
            position: absolute; top: 50%; width: 100%; text-align: center;
            color: white; font-size: 24px; display: block; background: rgba(0,0,0,0.5); padding: 20px 0;
        }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="ui">
        <div class="stat">HP: <span id="hp-text">100</span></div>
        <div id="hp-bar-container"><div id="hp-bar"></div></div>
        <div class="stat" style="font-size: 20px; margin-top: 10px;">KILLS: <span id="kills">0</span></div>
    </div>
    <div id="msg">クリックしてエントリー<br><small>WASD: 移動 | SPACE: 射撃</small></div>

    <script type="importmap">
        {
            "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- ゲーム状態 ---
        let playerHP = 100;
        let killCount = 0;
        const bots = [];
        const walls = [];
        const clock = new THREE.Clock();

        // --- シーン構築 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambient);
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(5, 15, 5);
        scene.add(sun);

        // --- フィールド作成 ---
        function createBox(x, y, z, w, h, d, color) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({ color }));
            mesh.position.set(x, y + h/2, z);
            scene.add(mesh);
            walls.push(mesh);
            return mesh;
        }

        // 地面と壁
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: 0x222222 }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        createBox(0, 0, -20, 40, 4, 1, 0x333344); // 奥の壁
        createBox(-10, 0, 5, 4, 3, 4, 0xff4400);   // 遮蔽物A
        createBox(10, 0, -5, 3, 5, 3, 0x0077ff);   // 遮蔽物B
        createBox(0, 0, 15, 10, 2, 2, 0x555555);   // 低い壁

        // --- Bot AI クラス ---
        class Bot {
            constructor() {
                const group = new THREE.Group();
                const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1, 4, 8), new THREE.MeshStandardMaterial({ color: 0xff0044 }));
                body.position.y = 1;
                group.add(body);
                
                // 向きがわかるように「目」を追加
                const eyes = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.2, 0.2), new THREE.MeshStandardMaterial({ color: 0x000000 }));
                eyes.position.set(0, 1.3, -0.4);
                group.add(eyes);

                this.mesh = group;
                this.mesh.position.set((Math.random()-0.5)*30, 0, (Math.random()-0.5)*30);
                scene.add(this.mesh);
                
                this.lastShootTime = 0;
                this.velocity = new THREE.Vector3();
            }

            update(delta, playerPos) {
                const dist = this.mesh.position.distanceTo(playerPos);
                
                // 1. プレイヤーの方を向く
                this.mesh.lookAt(playerPos.x, 0, playerPos.z);

                // 2. 移動ロジック: 遠すぎたら近づき、近すぎたら止まる (VALORANTのBotっぽく)
                if (dist > 15) {
                    const dir = new THREE.Vector3().subVectors(playerPos, this.mesh.position).normalize();
                    this.mesh.position.addScaledVector(dir, 3 * delta);
                } 
                
                // 3. 射撃ロジック: 視線が通っていれば撃つ
                if (dist < 25 && Date.now() - this.lastShootTime > 1500) { // 1.5秒に1回
                    this.shoot(playerPos);
                    this.lastShootTime = Date.now();
                }
            }

            shoot(playerPos) {
                // レイキャストで壁に遮られていないか確認
                const ray = new THREE.Raycaster();
                const dir = new THREE.Vector3().subVectors(playerPos, this.mesh.position).normalize();
                ray.set(this.mesh.position.clone().add(new THREE.Vector3(0, 1.3, 0)), dir);
                
                const intersects = ray.intersectObjects(walls);
                if (intersects.length > 0 && intersects[0].distance < playerPos.distanceTo(this.mesh.position)) {
                    return; // 壁に当たった
                }

                // プレイヤーへのヒット（簡易判定）
                createTracer(this.mesh.position.clone().add(new THREE.Vector3(0, 1.3, 0)), playerPos, 0xff0000);
                damagePlayer(10);
            }
        }

        function spawnBot() { bots.push(new Bot()); }
        for(let i=0; i<3; i++) spawnBot();

        // --- プレイヤー操作 ---
        camera.position.set(0, 1.6, 10);
        const keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if(e.code === 'Space') shoot();
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);
        window.addEventListener('mousedown', () => { if(document.pointerLockElement) shoot(); });
        window.addEventListener('click', () => {
            document.body.requestPointerLock();
            document.getElementById('msg').style.display = 'none';
        });

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
            }
        });

        // --- 射撃 & ダメージ ---
        const raycaster = new THREE.Raycaster();
        function shoot() {
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const botMeshes = bots.map(b => b.mesh);
            const intersects = raycaster.intersectObjects([...walls, ...botMeshes], true);

            if (intersects.length > 0) {
                const hit = intersects[0];
                createTracer(camera.position.clone().sub(new THREE.Vector3(0,0.2,0)), hit.point, 0x00ff00);
                
                // Botに当たったか判定（親要素を辿る）
                let target = hit.object;
                while(target.parent && !bots.find(b => b.mesh === target)) target = target.parent;
                
                const botIdx = bots.findIndex(b => b.mesh === target);
                if (botIdx !== -1) {
                    scene.remove(bots[botIdx].mesh);
                    bots.splice(botIdx, 1);
                    killCount++;
                    document.getElementById('kills').innerText = killCount;
                    setTimeout(spawnBot, 2000);
                }
            }
        }

        function damagePlayer(amt) {
            playerHP -= amt;
            document.getElementById('hp-text').innerText = Math.max(0, playerHP);
            document.getElementById('hp-bar').style.width = Math.max(0, playerHP) + "%";
            if (playerHP <= 0) {
                alert("GAME OVER! Kills: " + killCount);
                location.reload();
            }
        }

        function createTracer(from, to, color) {
            const geom = new THREE.BufferGeometry().setFromPoints([from, to]);
            const line = new THREE.Line(geom, new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.7 }));
            scene.add(line);
            setTimeout(() => { scene.remove(line); geom.dispose(); }, 50);
        }

        // --- ループ ---
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            // プレイヤー移動
            const moveDir = new THREE.Vector3();
            if (keys['KeyW']) moveDir.z -= 1;
            if (keys['KeyS']) moveDir.z += 1;
            if (keys['KeyA']) moveDir.x -= 1;
            if (keys['KeyD']) moveDir.x += 1;
            moveDir.normalize().applyQuaternion(camera.quaternion);
            moveDir.y = 0;
            camera.position.addScaledVector(moveDir, 10 * delta);

            // Botの更新
            bots.forEach(bot => bot.update(delta, camera.position));

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
