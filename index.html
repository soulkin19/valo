<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3D FPS - Pure Auto Start</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 14px; height: 14px;
            border: 1px solid #0f0; border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none;
        }
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: #0f0; pointer-events: none; line-height: 1.5;
        }
        #alert {
            position: absolute; width: 100%; text-align: center;
            top: 20%; color: #f00; font-weight: bold; font-size: 20px;
            text-transform: uppercase; letter-spacing: 5px;
            animation: blink 0.5s infinite; pointer-events: none;
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="alert">WARNING: ENEMY APPROACHING</div>
    <div id="crosshair"></div>
    <div id="ui">
        SCORE: <span id="score">0</span><br>
        WASD: MOVE | CLICK: AIM & SHOOT
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- シーンとレンダラー ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000500);
        scene.fog = new THREE.Fog(0x000500, 2, 25);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- ライティング ---
        const flashLight = new THREE.SpotLight(0x00ff00, 5, 20, 0.5);
        camera.add(flashLight);
        camera.add(flashLight.target);
        flashLight.target.position.z = -1;
        scene.add(camera);

        // --- 地面 ---
        const grid = new THREE.GridHelper(100, 50, 0x004400, 0x002200);
        scene.add(grid);

        // --- 操作系 ---
        const controls = new PointerLockControls(camera, document.body);
        let keys = {};
        
        // 【重要】クリックなしでもキーボード入力を受け付ける
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // 最初のクリックでマウスロックとアラート消去、射撃を同時に行う
        window.addEventListener('mousedown', () => {
            if (!controls.isLocked) {
                controls.lock();
                document.getElementById('alert').style.display = 'none';
            }
            shoot();
        });

        // --- 敵 (ボット) ---
        const bots = [];
        function spawnBot() {
            const bot = new THREE.Mesh(
                new THREE.BoxGeometry(1, 2, 1),
                new THREE.MeshPhongMaterial({ color: 0xff0000, emissive: 0x550000 })
            );
            bot.position.set(Math.random()*30-15, 1, -Math.random()*20 - 10);
            scene.add(bot);
            bots.push(bot);
        }
        for(let i=0; i<5; i++) spawnBot();

        // --- 弾丸 ---
        const bullets = [];
        function shoot() {
            const b = new THREE.Mesh(
                new THREE.SphereGeometry(0.1, 6, 6),
                new THREE.MeshBasicMaterial({ color: 0x00ffff })
            );
            b.position.copy(camera.position);
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            b.velocity = dir.multiplyScalar(0.7);
            scene.add(b);
            bullets.push(b);
        }

        let score = 0;

        // --- メインループ (即座に開始) ---
        function animate() {
            requestAnimationFrame(animate);

            // 1. プレイヤー移動 (クリック前でもWASDが効く)
            const speed = 0.15;
            const moveVector = new THREE.Vector3();
            if (keys['KeyW']) moveVector.z -= speed;
            if (keys['KeyS']) moveVector.z += speed;
            if (keys['KeyA']) moveVector.x -= speed;
            if (keys['KeyD']) moveVector.x += speed;

            // PointerLockControlsのメソッドを借りて相対移動
            if (keys['KeyW']) controls.moveForward(speed);
            if (keys['KeyS']) controls.moveForward(-speed);
            if (keys['KeyA']) controls.moveRight(-speed);
            if (keys['KeyD']) controls.moveRight(speed);

            // 2. ボットの追跡 (即座にあなたを狙う)
            bots.forEach(bot => {
                const dir = new THREE.Vector3().subVectors(camera.position, bot.position);
                dir.y = 0;
                bot.position.add(dir.normalize().multiplyScalar(0.04));

                // 衝突判定 (接触でスコア減)
                if (bot.position.distanceTo(camera.position) < 1.2) {
                    bot.position.set(Math.random()*40-20, 1, -Math.random()*40);
                    score = Math.max(0, score - 50);
                    document.getElementById('score').innerText = score;
                }
            });

            // 3. 弾丸の更新
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.position.add(b.velocity);

                bots.forEach(bot => {
                    if (b.position.distanceTo(bot.position) < 1.1) {
                        bot.position.set(Math.random()*40-20, 1, -Math.random()*40);
                        scene.remove(b);
                        bullets.splice(i, 1);
                        score += 100;
                        document.getElementById('score').innerText = score;
                    }
                });

                if (b.position.length() > 50) {
                    scene.remove(b);
                    bullets.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
