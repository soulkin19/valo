<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>ヘリ撃墜ゲーム</title>
  <style>
    body { margin:0; overflow:hidden; font-family:sans-serif; background:#000; touch-action: none; }
    #ui {
      position: absolute; top: 10px; left: 10px; color: white;
      background: rgba(0,0,0,0.5); padding: 8px 12px; border-radius: 8px;
      pointer-events: none; z-index: 5; display: none;
    }
    #crosshair {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 40px; color: lime; pointer-events: none; z-index: 5; display: none;
    }
    #startScreen {
      position: absolute; inset: 0; background: rgba(0,0,0,0.9);
      color: white; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 100;
    }
    #startScreen button {
      margin: 15px; padding: 16px 32px; font-size: 20px; cursor: pointer;
      border: none; border-radius: 8px; background: #444; color: white;
    }
    #debugMsg {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: yellow; font-size: 30px; z-index: 200; pointer-events: none;
      display: none;
    }
    #info {
      position: absolute; bottom: 10px; left: 10px; color: #aaa; font-size: 14px;
      pointer-events: none; z-index: 5;
    }
  </style>
</head>
<body>

<div id="startScreen">
  <h1>ヘリコプターシューター</h1>
  <p>銃を選択して開始</p>
  <button data-weapon="Pistol">ピストル</button>
  <button data-weapon="Rifle">アサルトライフル</button>
  <button data-weapon="Rocket">ロケットランチャー</button>
</div>

<div id="ui">
  武器: <span id="weaponName">-</span>  |  スコア: <span id="score">0</span>
</div>

<div id="crosshair">+</div>
<div id="debugMsg">開始しました！</div>

<div id="info">モバイル：左半分ドラッグ＝移動　右半分ドラッグ＝視点　タップ＝射撃<br>PC：クリックで開始 → マウス視点・左クリック射撃</div>

<script type="module">
  import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js';

  // PointerLockControls はモバイルで使わないのでインポート省略（必要なら後で）

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x88aaff);
  scene.fog = new THREE.FogExp2(0x88aaff, 0.0005);

  const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 2000);
  camera.position.set(0, 1.6, 10);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(innerWidth, innerHeight);
  document.body.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  scene.add(new THREE.DirectionalLight(0xffffff, 1.1).position.set(80, 120, 60));

  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(2000, 2000),
    new THREE.MeshStandardMaterial({ color: 0x337733 })
  );
  ground.rotation.x = -Math.PI / 2;
  scene.add(ground);

  let currentWeapon = null;
  let score = 0;
  const helicopters = [];
  let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
  const velocity = new THREE.Vector3();

  const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

  // スタートボタン
  document.querySelectorAll('#startScreen button').forEach(btn => {
    const startFunc = (e) => {
      e.preventDefault();
      const type = btn.dataset.weapon;
      currentWeapon = type;
      document.getElementById('weaponName').textContent = type;
      document.getElementById('startScreen').style.display = 'none';
      document.getElementById('ui').style.display = 'block';
      document.getElementById('crosshair').style.display = 'block';

      // デバッグメッセージ一瞬表示
      const msg = document.getElementById('debugMsg');
      msg.style.display = 'block';
      setTimeout(() => { msg.style.display = 'none'; }, 1500);

      // フルスクリーン試行（モバイルで効く場合あり）
      if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen().catch(() => {});
      }
    };

    btn.addEventListener('click', startFunc);
    btn.addEventListener('touchend', startFunc, { passive: false });
  });

  // モバイル視点（右半分ドラッグ）
  let lookTouch = null;
  document.addEventListener('touchstart', e => {
    if (!currentWeapon) return;
    e.preventDefault();
    for (let t of e.changedTouches) {
      if (t.clientX > innerWidth / 2 && !lookTouch) {
        lookTouch = t.identifier;
        lookTouch = { id: t.identifier, x: t.clientX, y: t.clientY };
      }
    }
  }, { passive: false });

  document.addEventListener('touchmove', e => {
    if (!currentWeapon || !lookTouch) return;
    e.preventDefault();
    for (let t of e.touches) {
      if (t.identifier === lookTouch.id) {
        const dx = (t.clientX - lookTouch.x) * 0.006;
        const dy = (t.clientY - lookTouch.y) * 0.006;
        camera.rotation.y -= dx;
        camera.rotation.x -= dy;
        camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
        lookTouch.x = t.clientX;
        lookTouch.y = t.clientY;
      }
    }
  }, { passive: false });

  document.addEventListener('touchend', e => {
    for (let t of e.changedTouches) {
      if (lookTouch && t.identifier === lookTouch.id) lookTouch = null;
    }
  });

  // 移動（左半分）
  document.addEventListener('touchstart', e => {
    if (!currentWeapon) return;
    for (let t of e.touches) {
      if (t.clientX < innerWidth / 2) {
        const relX = (t.clientX - innerWidth/4) / (innerWidth/2);
        const relY = (t.clientY - innerHeight/2) / innerHeight;
        moveForward  = relY < -0.1;
        moveBackward = relY > 0.1;
        moveLeft     = relX < -0.2;
        moveRight    = relX > 0.2;
      }
    }
  }, { passive: false });

  document.addEventListener('touchend', () => {
    moveForward = moveBackward = moveLeft = moveRight = false;
  });

  // 射撃
  const raycaster = new THREE.Raycaster();
  function shoot() {
    if (!currentWeapon) return;
    raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
    const intersects = raycaster.intersectObjects(helicopters, true);
    if (intersects.length > 0) {
      let hit = intersects[0].object.parent;
      if (hit.userData.hp) {
        hit.userData.hp--;
        if (hit.userData.hp <= 0) {
          scene.remove(hit);
          helicopters.splice(helicopters.indexOf(hit), 1);
          score += 100;
          document.getElementById('score').textContent = score;
        }
      }
    }
  }

  document.addEventListener('touchstart', e => {
    if (currentWeapon && e.touches[0].clientX > innerWidth / 3) shoot();
  }, { passive: false });

  // 敵生成（簡易）
  function spawn() {
    if (!currentWeapon) return;
    const g = new THREE.Group();
    g.add(new THREE.Mesh(new THREE.BoxGeometry(4,2,8), new THREE.MeshStandardMaterial({color:0x222})));
    g.position.set((Math.random()-0.5)*300, 40 + Math.random()*60, -400);
    g.userData = { hp: currentWeapon === 'Rocket' ? 3 : 1, speed: 0.6 + Math.random()*0.4 };
    scene.add(g);
    helicopters.push(g);
  }
  setInterval(spawn, 3000);

  function animate() {
    requestAnimationFrame(animate);

    if (currentWeapon) {
      const speed = 0.2;
      velocity.set(
        (moveRight - moveLeft) * speed,
        0,
        (moveForward - moveBackward) * speed
      );

      const forward = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
      const right = new THREE.Vector3(1,0,0).applyQuaternion(camera.quaternion);

      camera.position.add(forward.multiplyScalar(velocity.z));
      camera.position.add(right.multiplyScalar(velocity.x));

      helicopters.forEach((h,i) => {
        h.position.z += h.userData.speed;
        if (h.position.distanceTo(camera.position) < 20) {
          alert('ゲームオーバー！スコア: ' + score);
          location.reload();
        }
        if (h.position.z > 200) {
          scene.remove(h);
          helicopters.splice(i,1);
        }
      });
    }

    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
  });
</script>
</body>
</html>
