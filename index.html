<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3D FPS Online with Achex</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px;
            border: 2px solid white; border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #instructions {
            position: absolute; top: 20px; left: 20px;
            color: white; background: rgba(0,0,0,0.5); padding: 10px;
        }
    </style>
</head>
<body>

<div id="crosshair"></div>
<div id="instructions">画面クリックで開始 (WASDで移動、クリックで発砲)</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>
<script src="https://achex.ca/js/achex.js"></script>

<script>
    // --- 1. 初期設定 ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb); // 空の色
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // --- 2. 照明と地面 ---
    const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
    scene.add(light);

    const grid = new THREE.GridHelper(100, 50);
    scene.add(grid);

    // --- 3. プレイヤーと操作 ---
    const controls = new THREE.PointerLockControls(camera, document.body);
    document.body.addEventListener('click', () => controls.lock());

    let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false;
    const velocity = new THREE.Vector3();
    const direction = new THREE.Vector3();

    const onKeyDown = (e) => {
        switch (e.code) {
            case 'KeyW': moveForward = true; break;
            case 'KeyA': moveLeft = true; break;
            case 'KeyS': moveBackward = true; break;
            case 'KeyD': moveRight = true; break;
        }
    };
    const onKeyUp = (e) => {
        switch (e.code) {
            case 'KeyW': moveForward = false; break;
            case 'KeyA': moveLeft = false; break;
            case 'KeyS': moveBackward = false; break;
            case 'KeyD': moveRight = false; break;
        }
    };
    document.addEventListener('keydown', onKeyDown);
    document.addEventListener('keyup', onKeyUp);

    // --- 4. オンライン同期 (Achex) ---
    const otherPlayers = {};
    const myId = "player_" + Math.floor(Math.random() * 100000);
    
    // Achexサーバーへの接続
    const net = new Achex("wss://achex.ca:4010");
    
    net.on('ready', () => {
        net.join("fps_room_123"); // 任意のルーム名
    });

    net.on('message', (msg) => {
        if (msg.auth === myId) return;

        // 他プレイヤーの作成と更新
        if (!otherPlayers[msg.auth]) {
            const geo = new THREE.BoxGeometry(1, 2, 1);
            const mat = new THREE.MeshPhongMaterial({ color: 0xff0000 });
            const mesh = new THREE.Mesh(geo, mat);
            scene.add(mesh);
            otherPlayers[msg.auth] = mesh;
        }
        
        if (msg.type === "move") {
            otherPlayers[msg.auth].position.set(msg.x, msg.y - 1, msg.z);
        }
    });

    // --- 5. 更新ループ ---
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();

        if (controls.isLocked) {
            velocity.x -= velocity.x * 10.0 * delta;
            velocity.z -= velocity.z * 10.0 * delta;

            direction.z = Number(moveForward) - Number(moveBackward);
            direction.x = Number(moveRight) - Number(moveLeft);
            direction.normalize();

            if (moveForward || moveBackward) velocity.z -= direction.z * 100.0 * delta;
            if (moveLeft || moveRight) velocity.x -= direction.x * 100.0 * delta;

            controls.moveRight(-velocity.x * delta);
            controls.moveForward(-velocity.z * delta);

            // 自分の位置を送信
            net.send({
                type: "move",
                x: camera.position.x,
                y: camera.position.y,
                z: camera.position.z,
                auth: myId
            }, "fps_room_123");
        }

        renderer.render(scene, camera);
    }
    animate();

    // ウィンドウリサイズ対応
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
