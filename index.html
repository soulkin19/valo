<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NY Interceptor Mobile</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; touch-action: none; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: #0f0; pointer-events: none; text-shadow: 0 0 5px #0f0; }
        #score { font-size: 24px; font-weight: bold; }
        #msg { font-size: 14px; color: #fff; margin-top: 5px; }
        .vignette { position: fixed; top: 0; left: 0; width: 100%; height: 100%; box-shadow: inset 0 0 100px rgba(0,0,0,0.9); pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <div id="score">SCORE: 0</div>
        <div id="msg">DRAG TO FLY / HIT THE TWIN TOWERS</div>
    </div>
    <div class="vignette"></div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 基本設定 ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050510, 0.015);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false }); // パフォーマンス優先
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // --- ライティング ---
        const hemiLight = new THREE.HemisphereLight(0x4444ff, 0xff5500, 0.6);
        scene.add(hemiLight);

        // --- 街の生成（リサイクル可能にする） ---
        const buildings = new THREE.Group();
        scene.add(buildings);

        function createCity() {
            buildings.clear();
            for (let i = 0; i < 60; i++) {
                const h = Math.random() * 15 + 5;
                const geo = new THREE.BoxGeometry(2, h, 2);
                const mat = new THREE.MeshPhongMaterial({ color: 0x111122 });
                const b = new THREE.Mesh(geo, mat);
                b.position.set(Math.random() * 80 - 40, h / 2, Math.random() * -300 - 50);
                buildings.add(b);
            }
        }
        createCity();

        // --- ターゲットビル ---
        const targetGroup = new THREE.Group();
        const tGeo = new THREE.BoxGeometry(5, 50, 5);
        const tMat = new THREE.MeshPhongMaterial({ color: 0x333344, emissive: 0x111122 });
        const tower1 = new THREE.Mesh(tGeo, tMat);
        const tower2 = new THREE.Mesh(tGeo, tMat);
        tower1.position.set(-4, 25, -150);
        tower2.position.set(4, 25, -150);
        targetGroup.add(tower1, tower2);
        scene.add(targetGroup);

        // --- 航空機 ---
        const plane = new THREE.Group();
        const pBody = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.2, 2), new THREE.MeshPhongMaterial({color: 0xffffff}));
        const pWing = new THREE.Mesh(new THREE.BoxGeometry(3, 0.05, 0.7), new THREE.MeshPhongMaterial({color: 0xffffff}));
        const engineLight = new THREE.PointLight(0x00ffff, 2, 10);
        engineLight.position.z = 1;
        plane.add(pBody, pWing, engineLight);
        scene.add(plane);

        // --- 状態管理 ---
        let score = 0;
        let targetX = 0, targetY = 5;
        let speed = 0.8;
        let isExploded = false;
        let shake = 0;
        const particles = [];

        // --- 入力制御 (Mouse & Touch) ---
        const handleInput = (x, y) => {
            targetX = ((x / window.innerWidth) * 2 - 1) * 15;
            targetY = (-(y / window.innerHeight) * 2 + 1) * 10 + 10;
        };
        window.addEventListener('mousemove', e => handleInput(e.clientX, e.clientY));
        window.addEventListener('touchmove', e => handleInput(e.touches[0].clientX, e.touches[0].clientY));

        // --- 爆発演出 ---
        function explode() {
            isExploded = true;
            shake = 1.5;
            score += 1000;
            document.getElementById('score').innerText = `SCORE: ${score}`;
            document.getElementById('msg').innerText = "CRITICAL HIT!";
            
            // スローモーション演出
            speed = 0.1;

            for (let i = 0; i < 100; i++) {
                const p = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshBasicMaterial({color: 0xffaa00}));
                p.position.copy(plane.position);
                p.userData.v = new THREE.Vector3((Math.random()-0.5)*1, (Math.random()-0.5)*1, (Math.random()-0.5)*1);
                scene.add(p);
                particles.push(p);
            }

            setTimeout(() => {
                reset();
            }, 3000);
        }

        function reset() {
            isExploded = false;
            speed = 0.8;
            plane.position.set(0, 5, 0);
            targetGroup.position.z -= 200; // 次のターゲットを遠くに
            createCity();
            document.getElementById('msg').innerText = "DRAG TO FLY";
        }

        // --- ループ ---
        function animate() {
            requestAnimationFrame(animate);

            if (!isExploded) {
                // 移動
                plane.position.x += (targetX - plane.position.x) * 0.08;
                plane.position.y += (targetY - plane.position.y) * 0.08;
                plane.position.z -= speed;

                // 回転（バンク角）
                plane.rotation.z = (plane.position.x - targetX) * 0.1;
                plane.rotation.x = (targetY - plane.position.y) * 0.05;

                // 衝突判定 (簡単な距離判定)
                const dx = Math.abs(plane.position.x - targetGroup.position.x);
                const dz = Math.abs(plane.position.z - (targetGroup.position.z - 150));
                if (dz < 3 && dx < 8 && plane.position.y < 50) {
                    explode();
                }
            }

            // カメラ追従 + シェイク
            camera.position.x = plane.position.x + (Math.random() - 0.5) * shake;
            camera.position.y = plane.position.y + 2 + (Math.random() - 0.5) * shake;
            camera.position.z = plane.position.z + 8;
            camera.lookAt(plane.position.x, plane.position.y, plane.position.z - 10);
            
            if (shake > 0) shake *= 0.9;

            // パーティクル更新
            particles.forEach((p, i) => {
                p.position.add(p.userData.v);
                p.scale.multiplyScalar(0.96);
                if (p.scale.x < 0.1) {
                    scene.remove(p);
                    particles.splice(i, 1);
                }
            });

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
