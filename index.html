<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>VALORANT Style Map - Three.js</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 12px; height: 12px;
            border: 2px solid #00ff00;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #ui {
            position: absolute; bottom: 30px; left: 30px;
            color: white; font-size: 28px; font-weight: bold;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.7);
        }
        #instructions {
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: #ccc; font-size: 16px; background: rgba(0,0,0,0.3); padding: 10px 0;
        }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="ui">KILLS: <span id="kills">0</span></div>
    <div id="instructions">クリックで開始 | WASD: 移動 | <b>SPACE: 射撃</b></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 基本設定 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const clock = new THREE.Clock();
        const walls = []; // 衝突判定用の壁リスト
        const bots = [];  // ターゲットリスト
        let killCount = 0;

        // --- ライティング ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        // --- フィールド・遮蔽物の作成 ---
        function createBox(x, y, z, w, h, d, color, isBot = false) {
            const geom = isBot ? new THREE.CapsuleGeometry(0.5, 1, 4, 8) : new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshStandardMaterial({ color: color });
            const mesh = new THREE.Mesh(geom, mat);
            mesh.position.set(x, y + h/2, z);
            scene.add(mesh);
            if (!isBot) walls.push(mesh);
            return mesh;
        }

        // 地面
        const floor = new THREE.Mesh(
            new THREE.PlaneGeometry(60, 60),
            new THREE.MeshStandardMaterial({ color: 0x333333 })
        );
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // 外壁 (囲い)
        createBox(0, 0, -30, 60, 5, 1, 0x444444); // 奥
        createBox(0, 0, 30, 60, 5, 1, 0x444444);  // 手前
        createBox(-30, 0, 0, 1, 5, 60, 0x444444); // 左
        createBox(30, 0, 0, 1, 5, 60, 0x444444);  // 右

        // 遮蔽物 (VALORANTっぽい箱や壁)
        createBox(-10, 0, -10, 4, 4, 4, 0x1177ff); // 青いコンテナ
        createBox(12, 0, 5, 3, 6, 3, 0x1177ff);    // 高い柱
        createBox(-5, 0, 15, 6, 3, 2, 0x666666);   // 低い壁
        createBox(15, 0, -15, 8, 4, 1, 0x666666);  // 横長の遮蔽
        createBox(0, 0, 0, 4, 2, 4, 0xffaa00);     // 中央の低い箱

        // --- Botの作成 ---
        function spawnBot() {
            const x = (Math.random() - 0.5) * 40;
            const z = (Math.random() - 0.5) * 40;
            // 壁の中にスポーンしないよう簡易チェック（中心付近に配置）
            const bot = createBox(x, 0.5, z, 1, 2, 1, 0xff4444, true);
            bots.push(bot);
        }
        for(let i=0; i<6; i++) spawnBot();

        // --- 操作系 ---
        camera.position.set(0, 1.6, 25);
        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if(e.code === 'Space') shoot(); // スペースで射撃
        });
        document.addEventListener('keyup', (e) => keys[e.code] = false);

        window.addEventListener('click', () => document.body.requestPointerLock());

        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === document.body) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
            }
        });

        // --- 衝突判定付きの移動 ---
        function movePlayer(delta) {
            const speed = 8 * delta;
            const prevPos = camera.position.clone();
            
            const direction = new THREE.Vector3();
            if (keys['KeyW']) direction.z -= 1;
            if (keys['KeyS']) direction.z += 1;
            if (keys['KeyA']) direction.x -= 1;
            if (keys['KeyD']) direction.x += 1;
            
            direction.normalize().applyQuaternion(camera.quaternion);
            direction.y = 0; // 飛行防止
            camera.position.addScaledVector(direction, speed);

            // 簡易的な壁判定 (各壁との距離をチェック)
            for (const wall of walls) {
                const wallBox = new THREE.Box3().setFromObject(wall);
                const playerBox = new THREE.Box3().setFromCenterAndSize(
                    camera.position, new THREE.Vector3(0.8, 1.8, 0.8)
                );
                if (wallBox.intersectsBox(playerBox)) {
                    camera.position.copy(prevPos); // ぶつかったら戻す
                }
            }
        }

        // --- 射撃システム ---
        const raycaster = new THREE.Raycaster();
        function shoot() {
            if (document.pointerLockElement !== document.body) return;

            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(bots);

            if (intersects.length > 0) {
                const target = intersects[0].object;
                scene.remove(target);
                bots.splice(bots.indexOf(target), 1);
                killCount++;
                document.getElementById('kills').innerText = killCount;
                setTimeout(spawnBot, 1000); // 1秒後にリスポーン
            }
            // 射撃エフェクト（反動など）をここに入れるとさらに良くなります
        }

        // --- メインループ ---
        function animate() {
            requestAnimationFrame(animate);
            movePlayer(clock.getDelta());
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
