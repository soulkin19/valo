<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3D FPS - Space Key Combat</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 14px; height: 14px;
            border: 1px solid #ff0; border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none;
        }
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: #ff0; pointer-events: none; line-height: 1.5;
        }
        #alert {
            position: absolute; width: 100%; text-align: center;
            top: 40%; color: #fff; font-size: 24px;
            text-transform: uppercase; letter-spacing: 3px;
            pointer-events: none;
        }
        .highlight { color: #f00; font-weight: bold; }
    </style>
</head>
<body>
    <div id="alert">PRESS <span class="highlight">[SPACE]</span> TO ENGAGE</div>
    <div id="crosshair"></div>
    <div id="ui">
        SCORE: <span id="score">0</span><br>
        WASD: MOVE | SPACE: AIM & SHOOT
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- シーン構築 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);
        scene.fog = new THREE.Fog(0x0a0a1a, 2, 30);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- ライティング ---
        const gunLight = new THREE.PointLight(0xffaa00, 0, 10); // 射撃時のマズルフラッシュ用
        camera.add(gunLight);
        scene.add(camera);
        scene.add(new THREE.AmbientLight(0x404040));

        // --- 地面 ---
        const grid = new THREE.GridHelper(100, 40, 0xff00ff, 0x222222);
        scene.add(grid);

        // --- 操作系 ---
        const controls = new PointerLockControls(camera, document.body);
        let keys = {};
        let score = 0;

        // 【変更点】スペースキーですべてを制御
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;

            if (e.code === 'Space') {
                if (!controls.isLocked) {
                    controls.lock(); // マウスをロック
                    document.getElementById('alert').style.display = 'none';
                }
                shoot(); // 射撃
            }
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // --- 敵管理 ---
        const bots = [];
        function spawnBot() {
            const bot = new THREE.Mesh(
                new THREE.BoxGeometry(1, 2, 1),
                new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x220000 })
            );
            bot.position.set(Math.random()*40-20, 1, -Math.random()*20-10);
            scene.add(bot);
            bots.push(bot);
        }
        for(let i=0; i<4; i++) spawnBot();

        // --- 弾丸管理 ---
        const bullets = [];
        function shoot() {
            // 弾の生成
            const b = new THREE.Mesh(
                new THREE.SphereGeometry(0.15, 8, 8),
                new THREE.MeshBasicMaterial({ color: 0xffcc00 })
            );
            b.position.copy(camera.position);
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            b.velocity = dir.multiplyScalar(0.8);
            
            // マズルフラッシュ演出
            gunLight.intensity = 5;
            setTimeout(() => gunLight.intensity = 0, 50);

            scene.add(b);
            bullets.push(b);
        }

        // --- メインループ ---
        function animate() {
            requestAnimationFrame(animate);

            // 移動 (WASD)
            const speed = 0.15;
            if (keys['KeyW']) controls.moveForward(speed);
            if (keys['KeyS']) controls.moveForward(-speed);
            if (keys['KeyA']) controls.moveRight(-speed);
            if (keys['KeyD']) controls.moveRight(speed);

            // ボットAI (即開始)
            bots.forEach(bot => {
                const dir = new THREE.Vector3().subVectors(camera.position, bot.position);
                dir.y = 0;
                bot.position.add(dir.normalize().multiplyScalar(0.05));

                // プレイヤー接触判定
                if (bot.position.distanceTo(camera.position) < 1.3) {
                    bot.position.set(Math.random()*40-20, 1, -Math.random()*30);
                    score = Math.max(0, score - 20);
                    document.getElementById('score').innerText = score;
                }
            });

            // 弾丸の更新
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.position.add(b.velocity);

                bots.forEach(bot => {
                    if (b.position.distanceTo(bot.position) < 1.1) {
                        bot.position.set(Math.random()*40-20, 1, -Math.random()*30);
                        scene.remove(b);
                        bullets.splice(i, 1);
                        score += 100;
                        document.getElementById('score').innerText = score;
                    }
                });

                if (b.position.distanceTo(camera.position) > 40) {
                    scene.remove(b);
                    bullets.splice(i, 1);
                }
            }

            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
